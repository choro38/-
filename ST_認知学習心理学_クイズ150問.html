<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認知・学習心理学 150問クイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:16px}
h1{font-size:17px;font-weight:700;color:#1F4E79;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #2E75B6}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px;margin:10px 0 16px}
.cb{background:#fff;border:1.5px solid #ccc;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;color:#333;cursor:pointer;text-align:left}
.cb:hover{background:#DEEAF1;border-color:#2E75B6}
.cb.on{background:#2E75B6;border-color:#2E75B6;color:#fff}
.bt{background:#1F4E79;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-right:8px;margin-bottom:8px}
.bt:hover{background:#154360}
.bt2{background:#fff;border:1.5px solid #2E75B6;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;color:#2E75B6;cursor:pointer;margin-right:8px;margin-bottom:8px}
.bt2:hover{background:#DEEAF1}
.pb{height:7px;background:#e0e0d8;border-radius:4px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:#2E75B6;border-radius:4px;transition:width .3s}
.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px;font-size:13px;color:#555}
.qc{background:#fff;border:1px solid #ddd;border-radius:12px;padding:18px;margin-bottom:10px}
.qm{font-size:11px;background:#DEEAF1;color:#1F4E79;display:inline-block;padding:2px 10px;border-radius:16px;margin-bottom:10px;font-weight:700}
.qt{font-size:14px;font-weight:700;line-height:1.65;margin-bottom:14px;color:#111}
.ch{display:block;width:100%;background:#f9f9f6;border:1.5px solid #d8d8d0;border-radius:8px;padding:10px 12px;font-size:13px;color:#222;cursor:pointer;text-align:left;margin-bottom:6px;line-height:1.5}
.ch:hover{background:#DEEAF1;border-color:#2E75B6}
.ch.ok{background:#EAF5E9;border-color:#2E7D32;color:#1B5E20;font-weight:700;cursor:default}
.ch.ng{background:#FFEBEE;border-color:#C62828;color:#B71C1C;cursor:default}
.ch.rv{background:#EAF5E9;border-color:#2E7D32;color:#1B5E20;font-weight:700;cursor:default}
.ch.off{pointer-events:none;opacity:.85}
.ex{background:#FFF9E6;border-left:4px solid #F9A825;border-radius:0 8px 8px 0;padding:10px 12px;font-size:12.5px;color:#444;margin-top:10px;line-height:1.6;display:none}
.ex.s{display:block}
.sc{background:#fff;border:1px solid #ddd;border-radius:12px;padding:28px;text-align:center}
.sb{font-size:48px;font-weight:800;color:#1F4E79;margin:8px 0}
.sl{font-size:14px;color:#555}
.sm{font-size:17px;font-weight:700;margin-top:6px;color:#333}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
var Q=[
{i:1,c:"第1回【認知・学習入門】",q:"メドニックによる「学習」の特徴として誤っているものはどれか。",o:["学習は結果として行動に変化を引き起こす","学習は練習または経験の結果として生じる","学習は一時的な変化である","学習は直接観察することができない"],a:2,e:"学習は「比較的永続的な変化」。一時的な変化は学習ではない。"},
{i:2,c:"第1回【認知・学習入門】",q:"次のうち「学習」に該当しないものはどれか。",o:["自転車の乗り方を練習して乗れるようになった","風邪をひいて一時的に集中力が低下した","恐怖体験から同じ状況を避けるようになった","毎日単語帳を繰り返し読んで単語を覚えた"],a:1,e:"病気による一時的な変化は学習ではない。"},
{i:3,c:"第1回【認知・学習入門】",q:"認知（cognition）の辞書的定義として最も適切なものはどれか。",o:["感情や欲求に基づいて行動を選択する過程","感覚入力が変形・貯蔵・再生・使用されるようなすべての過程","脳の神経細胞間でシナプス結合が形成される過程","他者の行動を観察して模倣する過程"],a:1,e:"「感覚入力が変形され、減じられ、精緻化され、貯蔵され、再生され、使用されるようなすべての過程」"},
{i:4,c:"第1回【認知・学習入門】",q:"学習心理学が臨床で応用されている技法として適切なものはどれか。",o:["応用行動分析（ABA）","精神分析","クライエント中心療法","ゲシュタルト療法"],a:0,e:"学習心理学から得た理論を利用した行動療法（応用行動分析等）は心理療法の一つ。"},
{i:5,c:"第1回【認知・学習入門】",q:"認知心理学が「情報処理システム」として人を捉えるようになった背景は何か。",o:["神経科学の発展","コンピューター科学の発展","遺伝子工学の発展","社会学の発展"],a:1,e:"1950年代以降、コンピューター科学の発展が情報処理アプローチに影響を与えた。"},
{i:6,c:"第1回【認知・学習入門】",q:"ジョハリの窓において「盲点の窓」の説明として正しいものはどれか。",o:["自分も他人も知っている自己","自分は知っているが他人は知らない自己","自分は気づいていないが他人は知っている自己","自分も他人も知らない自己"],a:2,e:"盲点の窓：自分は気づいていないが他人は知っている自己。"},
{i:7,c:"第1回【認知・学習入門】",q:"認知的不協和理論を提唱した人物として正しいのはどれか。",o:["パブロフ","フェスティンガー","スキナー","バンデューラ"],a:1,e:"Festinger（アメリカ・社会心理学者, 1957年）が提唱。"},
{i:8,c:"第1回【認知・学習入門】",q:"「学習」と「学修」の違いとして正しいのはどれか。",o:["学習はlearning、学修はstudying","学習は習い学ぶこと（learning）、学修は学び修めること（acquisition）","学習は学術的文脈のみで使用","学習と学修は同義"],a:1,e:"学習=learning、学修=acquisition。語学学習のパラドックスにも関連する重要な区別。"},
{i:9,c:"第2回【記憶の仕組み】",q:"記憶の二重貯蔵モデルを提唱した研究者はどれか。",o:["クレイクとタルビング","アトキンソンとシフリン","バデリー","エビングハウス"],a:1,e:"Atkinson & Shiffrin（1971）が提唱。短期貯蔵庫と長期貯蔵庫。"},
{i:10,c:"第2回【記憶の仕組み】",q:"短期貯蔵庫の容量として正しいのはどれか。",o:["3±1チャンク","5±2チャンク","7±2チャンク","10±2チャンク"],a:2,e:"7±2チャンク（5〜9ケタ）。維持リハーサルなしでは数十秒で消失。"},
{i:11,c:"第2回【記憶の仕組み】",q:"「初頭効果」が生じる理由として正しいのはどれか。",o:["短期貯蔵庫に保持されたままアクセスしやすいため","長期貯蔵庫に転送されやすいため","感情的に印象深いため","繰り返し提示されるため"],a:1,e:"初頭効果→長期貯蔵庫。新近効果→短期貯蔵庫。超頻出ひっかけ！"},
{i:12,c:"第2回【記憶の仕組み】",q:"「新近効果」の正しい漢字はどれか。",o:["親近効果","新近効果","深近効果","真近効果"],a:1,e:"「新近」が正しい。「親近」ではない。"},
{i:13,c:"第2回【記憶の仕組み】",q:"処理水準で最も深い処理に相当するのはどれか。",o:["文字の形態に注目する処理","単語の音韻に注目する処理","単語の意味や文脈に注目する処理","単語の文字数を数える処理"],a:2,e:"浅い→形態→音韻→深い→意味。深い処理ほど記憶成績が高まる。"},
{i:14,c:"第2回【記憶の仕組み】",q:"作動記憶のモデルを提唱した研究者はどれか。",o:["アトキンソンとシフリン","クレイクとタルビング","バデリー","エビングハウス"],a:2,e:"Baddeley（1992）が提唱。音韻ループ・視空間スケッチパッド・中央実行系。"},
{i:15,c:"第2回【記憶の仕組み】",q:"「符号化特定性原理」の説明として正しいのはどれか。",o:["処理の深さが記憶の定着度を決定する","記銘時の文脈と一致しないと検索に失敗すること","感情状態と一致した記憶が想起されやすいこと","記憶は時間経過とともに消失すること"],a:1,e:"記銘時の文脈（場所・音楽・匂い）が「検索手がかり」になる。"},
{i:16,c:"第2回【記憶の仕組み】",q:"「転送の失敗」と「検索の失敗」の違いとして正しいのはどれか。",o:["転送の失敗：取り出せない。検索の失敗：保存に失敗","転送の失敗：保存に失敗。検索の失敗：保存されているが取り出せない","両者は同じ現象","転送の失敗：短期記憶の問題。検索の失敗：感覚記憶の問題"],a:1,e:"転送の失敗＝短期→長期への保存に失敗。検索の失敗＝長期に保存されているが取り出せない。"},
{i:17,c:"第2回【記憶の仕組み】",q:"「精緻化」の意味として正しいのはどれか。",o:["情報をそのまま繰り返しつぶやくこと","意味や構造を理解して長期記憶への転送を促進すること","記憶した情報を選択的に忘却すること","感覚登録から短期貯蔵庫への移行を促進すること"],a:1,e:"精緻化＝意味や構造を理解すること。有意味化・体制化・物語化・イメージ化等が含まれる。"},
{i:18,c:"第3回【学習の基礎研究】",q:"古典的条件づけを発見・体系化した研究者はどれか。",o:["ワトソン","スキナー","パブロフ","ソーンダイク"],a:2,e:"ロシアの生理学者パブロフが消化腺の研究の中で発見・体系化。"},
{i:19,c:"第3回【学習の基礎研究】",q:"オペラント条件づけにおける行動の原因として正しいのはどれか。",o:["行動の直前の環境刺激","行動の直後の環境変化","行動と同時に生じる刺激","行動の10秒後の環境変化"],a:1,e:"オペラント＝「直後」の環境変化。「直前」はレスポンデント。国試頻出ひっかけ！"},
{i:20,c:"第3回【学習の基礎研究】",q:"「嫌子消失による強化（負の強化）」の例として正しいのはどれか。",o:["宿題をしたら先生に褒められた","頭が痛かったので薬を飲んだら痛みが消えた","ゲームを取り上げられた","廊下を走ったら転んで痛かった"],a:1,e:"嫌子（痛み）が消失→「薬を飲む」行動が強化される。負の強化＝嫌子消失で行動が増える。"},
{i:21,c:"第3回【学習の基礎研究】",q:"味覚嫌悪条件づけの特徴として誤っているものはどれか。",o:["たった1度の対呈示で条件反応が起こる","消化器系の不調は成立に関係しない","CS-US間隔が数時間以上でも成立する","消去抵抗が大きい"],a:1,e:"消化器系の不調は「連合選択性」によって味覚・嗅覚刺激と連合されやすく、成立に深く関係。"},
{i:22,c:"第3回【学習の基礎研究】",q:"シェイピングの説明として正しいのはどれか。",o:["何回かに1回だけ強化を行うスケジュール","目標に近い行動にのみ肯定的フィードバックをして最終目標に近づける方法","低頻度行動の後に高頻度行動の機会を与えること","消去後にCSのみ呈示すること"],a:1,e:"シェイピング＝逐次的接近法。分化強化を用いる。部分強化と混同しないこと！"},
{i:23,c:"第3回【学習の基礎研究】",q:"最も消去抵抗が強い強化スケジュールはどれか。",o:["固定比率（FR）","変動比率（VR）","固定間隔（FI）","変動間隔（VI）"],a:1,e:"VR（変動比率）が最も消去抵抗が強い。ギャンブルがやめられない理由。"},
{i:24,c:"第3回【学習の基礎研究】",q:"アルバート坊やの実験でCSとして用いられたのはどれか。",o:["大きな音","白ネズミ","積木","電気ショック"],a:1,e:"CS＝白ネズミ、US＝大きな音。積木（NS）には反応しなかった＝弁別刺激。"},
{i:25,c:"第3回【学習の基礎研究】",q:"プレマックの原理として正しいのはどれか。",o:["低頻度行動の後に高頻度行動の機会を与えると低頻度行動が増える","高頻度行動の後に低頻度行動の機会を与えると増える","消去後にCSを呈示すると自発的回復が起きる","条件づけ後に消去すると完全に消失する"],a:0,e:"低頻度行動（嫌いな野菜）の後に高頻度行動（好きなデザート）の機会→低頻度行動が増える。"},
{i:26,c:"第4回【知識の構造】",q:"プロトタイプ理論の説明として正しいのはどれか。",o:["抽象的な表象を想定せず個々の事例の集合が概念","典型的な特徴を集めた抽象的な表象（プロトタイプ）を想定する","概念がどのように説明されるかに着目する","類似性のみに注目してカテゴリーを理解する"],a:1,e:"プロトタイプ理論＝抽象的表象を想定。事例理論＝抽象的表象を想定しない。混同注意！"},
{i:27,c:"第4回【知識の構造】",q:"「プライミング効果」の説明として正しいのはどれか。",o:["記銘時の文脈と一致しないと検索に失敗すること","事前情報によってネットワークが活性化され後の情報処理が影響を受けること","深い処理で記憶成績が高まること","覚えた場所と同じ場所でテストすると成績が上がること"],a:1,e:"「医者」→「看護師」の認識が速くなる例が典型。"},
{i:28,c:"第4回【知識の構造】",q:"「二重符号化理論」の説明として正しいのはどれか。",o:["記憶は短期と長期の二つの貯蔵庫に保存される","見たもの・聞いたものをイメージと言語的意味の両方で保存・組み合わせている","意識的な記憶と無意識的な記憶の二種類がある","記銘と想起が二段階で行われる"],a:1,e:"写真のように保存するのではなく、イメージ＋言語的意味の両方で保存し組み合わせる。"},
{i:29,c:"第5回【知識獲得のメカニズム】",q:"「意味記憶」の説明として正しいのはどれか。",o:["自分が体験した具体的な出来事の記憶","文字・数字・単語の意味などの一般化された知識・情報に関する記憶","意識的に思い出さなくても利用可能な記憶","自転車の乗り方などの技術の記憶"],a:1,e:"意味記憶：長期記憶・陳述的記憶。対応脳部位：側頭葉内側部（海馬）・間脳。"},
{i:30,c:"第5回【知識獲得のメカニズム】",q:"エピソード記憶と意味記憶の関係として正しいのはどれか。",o:["完全に独立し相互に影響しない","経験回数が多くなるほどエピソード記憶は減少し意味記憶だけが残る","意味記憶はエピソード記憶に変換される","常に同時に存在する"],a:1,e:"相互に独立したものではなく、経験回数が多くなるほどエピソード記憶は減少し意味記憶だけが残る。"},
{i:31,c:"第5回【知識獲得のメカニズム】",q:"「顕在記憶」の説明として正しいのはどれか。",o:["意識的に思い出さなくても利用可能な記憶","言葉で表現可能で覚えた時の文脈を思い出す意識を伴う記憶","手続き記憶とも呼ばれる","非陳述的記憶とも呼ばれる"],a:1,e:"顕在記憶＝陳述的記憶（宣言記憶）。潜在記憶＝非陳述的記憶（手続き記憶等）。"},
{i:32,c:"第6回【出来事や経験の記憶】",q:"「スキーマ」の定義として正しいのはどれか。",o:["衝撃的な出来事の非常に鮮明な記憶","似た経験を繰り返す中でその共通部分をまとめた認知的枠組み","記憶を引き出す手がかりとなる環境刺激","感情に基づいて記憶が選択的に想起される現象"],a:1,e:"「いかにもありそうなもの」「○○とはこういうもの」のイメージや知識のこと。"},
{i:33,c:"第6回【出来事や経験の記憶】",q:"「フラッシュバルブ・メモリ」の説明として正しいのはどれか。",o:["感覚記憶に一時的に保存される鮮明な視覚像","重大で感情を強く動かされた出来事の非常に鮮明な記憶","抑圧された記憶が突然意識に上ってくる現象","睡眠中に記憶が強化・統合される現象"],a:1,e:"しかし客観的には正確でないことが多い。記銘・保持・想起の各段階で歪みが生じる。"},
{i:34,c:"第6回【出来事や経験の記憶】",q:"「気分一致効果」の説明として正しいのはどれか。",o:["失敗して嫌な気分の時に成功体験を思い出し前向きになること","嫌なことがあって落ち込んでいる時に過去の嫌な出来事を思い出しやすくなること","楽しい気分の時に難しい課題に取り組めること","怒っている時に攻撃的な行動が増えること"],a:1,e:"今の気分と同じ感情の記憶が想起されやすい。「活性化拡散」のために起きる。"},
{i:35,c:"第6回【出来事や経験の記憶】",q:"「気分不一致効果」の説明として正しいのはどれか。",o:["今の気分と同じ感情の記憶が想起されやすいこと","失敗して嫌な気分の時に挽回体験を思い出して前向きになること","楽しい気分の時に楽しかった記憶が浮かびやすいこと","気分変化に伴い想起内容も変わること"],a:1,e:"気分緩和動機が生じ、快感情の関連情報へ選択的に注意を向ける感情スキーマが発動。"},
{i:36,c:"第6回【出来事や経験の記憶】",q:"ロフタスとパーマー（1974）の実験で示されたのはどれか。",o:["衝撃的場面では中心情報をよく覚えている","質問の言葉の違いで実際にないガラスが割れたという報告が変わった","記憶の保持は時間経過で減少する","衝撃的な記憶は正確"],a:1,e:"「激突した」vs「ぶつかった」で報告が異なった→記憶は再構成される。"},
{i:37,c:"第7回【メタ認知】",q:"メタ認知を提唱した研究者はどれか。",o:["ピアジェ","フラヴェル","ウォルピ","バデリー"],a:1,e:"Flavell, J.H.（アメリカ・発達心理学者）が提唱。「メタ」＝「上位のもの」。"},

{i:121,c:"第5回【知識獲得のメカニズム】",q:"「間接プライミング効果」の教育応用として適切なのはどれか。",o:["テスト前日に全範囲を一気に復習","学習すべき概念と関連する概念をあらかじめ処理させておく","睡眠前に学習内容を反復","強い感情を伴う場面で学習"],a:1,e:"関連概念をあらかじめ処理→新しい概念の習得促進。教材配列が重要。"},
{i:122,c:"第5回【知識獲得のメカニズム】",q:"「行動主義心理学」が捉えた学習の定義として正しいのはどれか。",o:["学習を情報処理として捉える","学習を刺激と反応の連合として捉える","ネットワーク形成として捉える","スキーマの更新として捉える"],a:1,e:"認知心理学は「情報処理として捉える」。両立場はそれぞれに学習の重要な側面を表す。"},
{i:123,c:"第6回【出来事や経験の記憶】",q:"日常記憶の研究が生まれた背景として正しいのはどれか。",o:["実験室の研究が日常で役立たないという批判が起きた","実験室の結果が日常で完全に適用できると証明された","日常記憶の方が劣ることが明らかになった","コンピューター発展で研究可能になった"],a:0,e:"日常認知（everyday cognition）というアプローチが生まれた背景。"},
{i:124,c:"第6回【出来事や経験の記憶】",q:"「記憶の再構成」について正しいのはどれか。",o:["レコーダーに録音した再生と同じ","事実に基づいて他の部分を推量し「再構成」される","病的な状態でのみ生じる","高齢者にのみ起こる"],a:1,e:"人間の記憶の再生はレコーダーと異なる。日常記憶においても同様。"},
{i:125,c:"第7回【メタ認知】",q:"「プランニング段階のチェックリスト」に含まれない項目はどれか。",o:["この課題が求めていることは何か","私は何をすればよいか","どのような情報や方略が必要か","最も優れた人物は誰か"],a:3,e:"4項目：①課題の求め②何をすべきか③必要な情報・方略④必要な時間と資源。"},
{i:126,c:"第8回【言葉の発達と役割】",q:"「臨界期仮説」の説明として正しいのはどれか。",o:["特定の年齢を超えると外国語習得能力が完全になくなると証明された","年齢的限界があるという主張だが支持しない研究も多い","幼少期から始めた方が必ず有利","母語にも臨界期が存在"],a:1,e:"「どのような外国語能力を何のために身に着けるかを明確にすることが大事」"},
{i:127,c:"第8回【言葉の発達と役割】",q:"「コミュニカティブ・アプローチ」の特徴として正しいのはどれか。",o:["文法規則の体系的教授を優先","感情を抑制せず場面に合った感情を学習者に喚起する","母語訳を積極的に使用","反復練習を中心にした教授法"],a:1,e:"機能重視の教授法。映画やドラマなどの動画配信が有用。"},
{i:128,c:"第8回【言葉の発達と役割】",q:"手話学習と符号化の関係として正しいのはどれか。",o:["手話は視覚情報のみで身体の動きは無関係","ろう者が手を動かして手話的形態に情報を符号化すると記憶成績が上昇","手話は音韻ループを使用","手話の習得にLADが必要"],a:1,e:"看護やリハビリ領域の身体を使った支援は符号化効果が期待される。"},
{i:129,c:"第9回【学習意欲】",q:"青年期初期の学習意欲の特徴として正しいのはどれか。",o:["母親とのアタッチメントが基盤","メタ認知能力の発達で自学者として学習を進める","競争心の発達で相対評価が有効","内発的意欲が低下し他律的意欲が主になる"],a:1,e:"①自己理解に基づく人生目標設定②メタ認知能力の発達により自学者として。"},
{i:130,c:"第9回【学習意欲】",q:"自律的学習意欲の発現における「認知・感情」の役割として正しいのはどれか。",o:["学習環境の安全性を評価","面白さ・楽しさ・有能感・充実感が後続の自発的学習を促す","学習内容の難易度を評価","他者との比較で動機づけ"],a:1,e:"学習行動がうまく終了しない場合、動機が修正されて新たな学習行動が展開。"},
{i:131,c:"第9回【学習意欲】",q:"学習意欲の測定で「方向」と「エネルギー」に対応するのはどれか。",o:["方向→有能感。エネルギー→学習理由","方向→学習理由（自律的/他律的）。エネルギー→学習に対する有能感","方向→内発的。エネルギー→他律的","方向→動機。エネルギー→強化"],a:1,e:"学習理由は方向に対応。学習に対する有能感はエネルギー（意欲の力）に対応。"},
{i:132,c:"第10回【問題解決】",q:"誤学習行動を減らす4ステップで最初に行うことはどれか。",o:["予防策を取る","機能分析（その行動が生じる理由を知る）","分化強化と消去","弱化を適用"],a:1,e:"①機能分析→②予防策→③ダブルの対応→④最後の手段として弱化。"},
{i:133,c:"第10回【問題解決】",q:"エキスパートと初学者の問題解決の違いとして正しいのはどれか。",o:["エキスパートは手段—目標分析を積極的に用い初学者は直感的","エキスパートは物理的状態を適切に表象でき初学者は意識的な手段—目標分析に頼る","エキスパートは試行錯誤を多用。初学者はアルゴリズム","知識量は同じで処理速度が異なる"],a:1,e:"エキスパート＝問題を読んで物理的状態をイメージできる。初学者＝表象が難しい。"},
{i:134,c:"第11回【心理臨床と学習心理学】",q:"心理臨床の最も適切な定義はどれか。",o:["精神疾患患者のみへの薬物療法","心の問題や苦痛を抱える人に対する援助的関わりの総称","知能検査のみ","学校教育場面でのみの心理的支援"],a:1,e:"精神疾患の有無に関わらず。周囲への間接的援助も含む。"},
{i:135,c:"第11回【心理臨床と学習心理学】",q:"産業現場での心理臨床の正しい記述はどれか。",o:["2020年よりストレスチェック義務化","2015年12月よりストレスチェック義務化に伴う実施者としての役割","精神疾患患者のみ対象","チーム医療には不参加"],a:1,e:"産業保健面談・スクリーニング・心理カウンセリング・休職中支援・復職支援等。"},
{i:136,c:"第11回【心理臨床と学習心理学】",q:"「行動の誤学習」の例として最も適切なのはどれか。",o:["挨拶ができない","仕事が長続きしない","止めたいのにどうしても間食してしまう","言語発達が遅れている"],a:2,e:"不適切な行動が強化されて継続している状態。"},
{i:137,c:"第5回【知識獲得のメカニズム】",q:"「情動処理能力が高い者」と記憶成績の関係として正しいのはどれか。",o:["情動処理能力と記憶成績は無関係","符号化できた情動を検索手がかりとして活用できる者は記憶成績が良い","情動処理能力が高いと記憶成績が下がる","情動処理は短期記憶にのみ影響"],a:1,e:"符号化できていた情動を検索手がかりとして有効活用できる者は記憶成績が良い。"},
{i:138,c:"第2回【記憶の仕組み】",q:"「志向的忘却」の説明として正しいのはどれか。",o:["全ての記憶を等しく保持する仕組み","忘れてもよいと知らされた項目だけ選択的に記憶が失われること","記憶は全て自然に消滅する","強い感情の記憶だけが失われる"],a:1,e:"電話番号を調べて電話し終えた後は番号を忘れる。正常な記憶方略の一つ。"},
{i:139,c:"第4回【知識の構造】",q:"「知識の構造の3層モデル」（Collins & Quillian, 1969）で検索時間が長くなるのはどれか。",o:["概念間の意味的類似性が高い","ノードにたどり着くリンクの距離が長い","記憶した回数が少ない","感情的関連が強い"],a:1,e:"距離だけでなく意味・音の特徴もネットワーク化されている。"},
{i:140,c:"第4回【知識の構造】",q:"人の「意味記憶」は何によって成り立っているか。",o:["エピソード記憶と手続き記憶","概念とカテゴリー","顕在記憶と潜在記憶","短期記憶と長期記憶"],a:1,e:"概念はカテゴリーの事例に共通した特徴を抽象化したもの。"},
{i:141,c:"第6回【出来事や経験の記憶】",q:"大学院生の部屋実験で「ありそうにないもの」の正解が多い理由はどれか。",o:["スキーマに基づいて記憶を再構成したから","意外性を感じ注意をひかれたため意識的な符号化や精緻化（深い処理）が行われた","全ての物を等しく記憶していたから","長時間部屋にいたため記憶が強化された"],a:1,e:"「深い処理」をしたとも言える。意外性→注意→符号化・精緻化。"},
{i:142,c:"第9回【学習意欲】",q:"「反転項目」の例「勉強は苦手ですか」で有能感が高いのはどれか。",o:["「はい」","「いいえ」","「ややあてはまる」","「どちらでもない」"],a:1,e:"負の方向の質問に「いいえ」＝有能感が高い。回答傾向の歪みを防ぐ。"},
{i:143,c:"第1回【認知・学習入門】",q:"認知科学の説明として正しいのはどれか。",o:["認知心理学と同義","多様な隣接領域が合流した学際的・総合的な科学","脳の神経細胞だけを研究する学問","行動の変化のみを研究する行動主義"],a:1,e:"認知心理学よりも広範囲に定義される。"},
{i:144,c:"第2回【記憶の仕組み】",q:"「維持的リハーサル」の説明として正しいのはどれか。",o:["情報に意味を付与して転送を促進","記憶消失を防ぐため復唱したり思い浮かべる積極的活動","情報をグループ分けして体制化","情報を映像化してイメージで記憶"],a:1,e:"精緻化リハーサルの方が深い処理で長期記憶への転送効果が高い。"},
{i:145,c:"第2回【記憶の仕組み】",q:"処理水準理論の研究者と年代として正しいのはどれか。",o:["アトキンソンとシフリン（1971年）","クレイクとタルビング（1975年）","バデリー（1992年）","コリンズとキリアン（1969年）"],a:1,e:"形態→音韻→意味の処理水準が深いほど記憶成績が高まる。"},
{i:146,c:"第2回【記憶の仕組み】",q:"転送の失敗を防ぐために有効な記銘方略はどれか。",o:["無精緻化リハーサル","精緻化リハーサル（有意味化・体制化・物語化等）","感覚登録から注意を外す","短期貯蔵庫への情報量を増やす"],a:1,e:"精緻化リハーサルによって深い処理→長期貯蔵庫への転送が促進される。"},
{i:147,c:"第2回【記憶の仕組み】",q:"作動記憶の「中央実行系」の役割として正しいのはどれか。",o:["言語・音声情報を保持する","視覚・空間情報を保持する","従属システムを制御し長期記憶の情報へのアクセスを行う","感覚入力を一時的に保持する"],a:2,e:"音韻ループと視空間スケッチパッドという従属システムを制御し長期記憶の情報へのアクセスを行う。"},
{i:148,c:"第12回【協同の効果】",q:"協同における「説明」の効果として正しいのはどれか。",o:["話し合いさえすれば必ず理解が深まる","分かったことや概念について説明することで理解が深まる。疑問を話し合うグループが最も成績が高い","知っていることを発表するグループが最も効果的","全員が沈黙して個別に考えた方が深まる"],a:1,e:"一緒に説明を作り上げようとすることが重要。自分の知識不足や矛盾の明確化が一貫した説明の構築につながる。"},
{i:149,c:"第5回【知識獲得のメカニズム】",q:"「志向的忘却」について正しいのはどれか。",o:["全ての記憶を等しく保持する仕組み","忘れてもよいと知らされた項目だけ選択的に記憶が失われること","記憶は全て自然に消滅する","強い感情の記憶だけが失われる"],a:1,e:"正常な記憶方略の一つ。「有害な情報の選択的忘却」は複雑な自然環境における情報処理に必要な記憶方略。"},
{i:150,c:"第11回【心理臨床と学習心理学】",q:"「ルール支配行動」の具体例として正しいのはどれか。",o:["ベル音を聞いて唾液が出る","白線の外を歩くと危険なので白線の内側を歩く行動（行動直後の随伴性がなくても維持）","おもちゃの人形に暴力をふるう映像を見た子どもが同様の遊びをする","テスト前に集中的に学習する"],a:1,e:"「白線の中に入ったらホームに落下してしまう」等のルールが弁別刺激となり行動が維持される。"},
{i:151,c:"第13回【学習指導と学習心理学】",q:"「人はなぜ学習につまずくのか」の3つの原因として正しいのはどれか。",o:["記憶力・集中力・体力の不足","知識の問題・勉強方法の問題・効果的な勉強法に関する考え方の偏り","教師の質・教材の質・環境の質","年齢・性別・性格の問題"],a:1,e:"①知識の問題②学習効果を妨げる勉強方法③「学習観」の偏り。③が最も根本的だが価値観を変えるのは容易ではない。"},
{i:152,c:"第13回【学習指導と学習心理学】",q:"「手続き的知識」と「宣言的知識」の違いとして正しいのはどれか。",o:["手続き的知識＝言葉にしやすい知識。宣言的知識＝身体で覚える知識","手続き的知識＝自転車の運転・水泳等の身体に関わる知識。宣言的知識＝学校で学ぶような言葉にしやすい知識","手続き的知識＝長期記憶。宣言的知識＝短期記憶","手続き的知識と宣言的知識は同義"],a:1,e:"手続き的知識＝身体で覚える知識（how to）。宣言的知識＝言語化しやすい知識（what）。学習のつまずき①に関連。"},
{i:153,c:"第13回【学習指導と学習心理学】",q:"「教え手学習効果（仮想的教示）」の説明として正しいのはどれか。",o:["教師が教えることで教師自身の理解が深まる効果","他者に教えることで教えた側の学習が促進される効果","教材を使うことで学習効果が上がること","他者に質問することで理解が深まる効果"],a:1,e:"聞き手が「わからない」という様子を示し説明を加えることで教えた側の理解が深まることもわかっている。言葉にすることで定着が良くなる。"},
{i:154,c:"第13回【学習指導と学習心理学】",q:"「自己説明効果」の説明として正しいのはどれか。",o:["教師に説明してもらうことで理解が深まる効果","自分で説明を考えて自分に説明してみることで弱点を発見し理解が深まる学習方法","テストを受けることで記憶が定着する効果","グループで話し合うことで理解が深まる効果"],a:1,e:"「自分で説明できるだろうか？」と自分に説明してみる。不明点や疑問点を上手に質問できるようになる。"},
{i:155,c:"第13回【学習指導と学習心理学】",q:"「先行オーガナイザー」の説明として正しいのはどれか。",o:["授業の最後にまとめとして提示される情報","学習する内容よりも先に与えられ知識の構築を手助けするもの","テスト前に配布される模擬問題","授業中にリアルタイムで提供されるフィードバック"],a:1,e:"予習のすすめに関連。事前に教科書を一読しておくことで授業の内容をより多く吸収できる。予習した段階は「生分かり状態」。"},
{i:156,c:"第13回【学習指導と学習心理学】",q:"「援助要請（help-seeking）」について正しいのはどれか。",o:["他者に答えだけを聞くことが最も効果的な援助要請である","他者に助けを求め有効な学びに繋げること。ただし自立的か依存的かを区別する必要がある","援助要請は学習に悪影響を与えるため避けるべきである","援助要請は成人にのみ有効な学習方法である"],a:1,e:"算数の問題が分からない時、答えだけを聞くのではなくなぜその答えになるのかを質問する援助要請が自立的。"},
{i:157,c:"第13回【学習指導と学習心理学】",q:"「テスト効果」の説明として正しいのはどれか。",o:["テスト前に集中的に学習することで成績が上がること","勉強の途中に自分で思い出してみるステップを挟むと最終テストの成績が上昇すること","テストの回数が多いほど学習意欲が下がること","テストの難易度が高いほど学習効果が上がること"],a:1,e:"Roediger & Karpicke（2006）の研究。自分で思い出す（検索練習）が記憶の定着を促進する。"},
{i:158,c:"第13回【学習指導と学習心理学】",q:"「教訓帰納」の説明として正しいのはどれか。",o:["教科書の要約を作成する学習方法","問題を解いた後に「なぜ間違えたのか」を振り返り教訓として今後に活かす勉強方法","教師が生徒に教訓を伝える指導法","テスト結果を数値化して分析する方法"],a:1,e:"メタ認知的方略の一つ。正解していても「この問題を解くためのポイントは何か」と振り返る。After-Event Reviews。"},
{i:159,c:"第13回【学習指導と学習心理学】",q:"「アナロジー推論」の説明として正しいのはどれか。",o:["過去の全ての経験を網羅的に検索して問題解決すること","ある問題に直面した時それと似た問題を思い出しその類似性に基づいて問題を解決すること","全く新しい発想で問題を解決すること","教師の指示通りに問題を解くこと"],a:1,e:"初学者は表面的な類似性に着目しやすく、本質的な類似性を思い出しづらい。転移（1つの学習経験を次に活かすこと）とも関連。"},
{i:160,c:"第13回【学習指導と学習心理学】",q:"アクティブラーニング（AL）を実現するための2つのポイントとして正しいのはどれか。",o:["個人学習の時間を増やすことと厳しい評価基準を設けること","具体的な協力の仕方を教えることと1人では難しいが一緒ならなんとかなりそうな課題を設定すること","教師が一方的に講義することと暗記テストを実施すること","競争させることと成績で順位をつけること"],a:1,e:"①具体的な協力の仕方を教える②動機づけを想定した適切な難易度の課題設定。社会的手抜きが生じることが前提。"},
{i:161,c:"第13回【学習指導と学習心理学】",q:"「総括的評価」「診断的評価」「形成的評価」の違いとして正しいのはどれか。",o:["全て同じタイミングで実施される","総括的＝単元終了時のテスト。診断的＝新しい学習前の知識確認。形成的＝授業中のつまずき把握と支援","総括的＝授業前。診断的＝授業中。形成的＝授業後","総括的のみが成績に反映される"],a:1,e:"3つの評価のタイミングと役割を区別することが重要。"},
{i:162,c:"第13回【学習指導と学習心理学】",q:"「パフォーマンス評価」の注意点として誤っているものはどれか。",o:["児童生徒の現実的な課題になっているか","課題の遂行自体が目的にならないこと","相当高度な課題で学んだ知識や技能を総合して取り組む必要があること","簡単な暗記テストで代替できること"],a:3,e:"パフォーマンス評価は授業で学んだ事柄を生かして実生活で直面するような課題に取り組ませる評価方法。暗記テストとは異なる。"},
{i:163,c:"第13回【学習指導と学習心理学】",q:"評価の工夫としてテスト方法を変えることの意義として正しいのはどれか。",o:["テストの種類は学習に影響しない","空欄補充式は意味理解を重視するメッセージになる","記述式にすることで意味理解を重視するメッセージを伝えることができる","テストはできるだけ少なくする方が学習に効果的"],a:2,e:"空欄補充式だと「単純な丸暗記が大切」というメッセージに。意味理解を重視するなら記述式に変更する等の工夫が有効。"},
{i:164,c:"第13回【学習指導と学習心理学】",q:"「メタ認知的方略」の例として正しいのはどれか。",o:["とにかく丸暗記する","自分の思考を一段上から客観的に眺め「私は何が分かっていないのか」と振り返る勉強法","教科書をただ繰り返し読む","友達のノートをそのまま写す"],a:1,e:"「弱点を意識化」する上手な勉強法。教訓帰納もメタ認知的方略の一つ。"},
{i:165,c:"第14回【認知バイアス】",q:"「認知バイアス」の定義として正しいのはどれか。",o:["人の認知が常に正確で合理的であること","人の認知が一定方向へ歪むこと。情報を合理的に公平に処理するのではなく不正確で偏った扱いをすること","感覚器官の機能低下による知覚の歪み","意図的に情報を歪めて伝えること"],a:1,e:"バイアス＝「歪み」「偏り」の意味。能力の欠如ではなく自分で自分をだますシステムを元々備えている。"},
{i:166,c:"第14回【認知バイアス】",q:"「必要原因」と「十分原因」の違いとして正しいのはどれか。",o:["必要原因＝それさえあれば結果が起こる。十分原因＝それがないと結果が起こらない","必要原因＝それがないと結果が起こらない。十分原因＝それさえあれば結果が起こる","必要原因と十分原因は同義","必要原因は存在するが十分原因は存在しない"],a:1,e:"例：「水」はチューリップが咲くための必要原因。「水＋温度＋栄養」等を集めると十分原因になる。"},
{i:167,c:"第14回【認知バイアス】",q:"「基本的帰属錯誤」の説明として正しいのはどれか。",o:["行動の原因を推測する際、内的帰属よりも外的帰属を考える傾向","行動の原因を推測する際、外的帰属よりも内的帰属を考える傾向","自分の成功を外的要因に帰属させる傾向","他者の成功を内的要因に帰属させる傾向"],a:1,e:"人は行動の原因を推測する際、状況などの外的帰属よりも性格などの内的帰属を考える傾向がある。"},
{i:168,c:"第14回【認知バイアス】",q:"「自己奉仕バイアス」の説明として正しいのはどれか。",o:["自分にも他者にも公平に原因を帰属させるバイアス","悪いことは自分のせいではないと考える自己防衛バイアスと良いことは自分のおかげだと考える自己高揚バイアスの総称","常に自分を否定的に評価するバイアス","他者の成功を自分のおかげと考えるバイアス"],a:1,e:"自己防衛バイアス（悪いこと→自分のせいではない）と自己高揚バイアス（良いこと→自分のおかげ）。"},
{i:169,c:"第14回【認知バイアス】",q:"「ポジティブ・イリュージョン」の3つの要素として正しいのはどれか。",o:["錯誤相関・確証バイアス・ヒューリスティクス","平均以上効果・統制感の幻想・非現実的な楽観主義","気分一致効果・気分不一致効果・気分緩和動機","プライミング効果・処理水準・符号化特定性原理"],a:1,e:"①平均以上効果（自分を非現実的に肯定）②統制感の幻想（コントロールできない事に影響が及ぶと考える）③非現実的な楽観主義（良いこと過大・悪いこと過小に見積もる）。"},
{i:170,c:"第14回【認知バイアス】",q:"「内集団バイアス」の説明として正しいのはどれか。",o:["自分が所属しない集団の構成員に高い評価を与える傾向","自分の所属するクラブや団体などの構成員に高い評価を与えたり好意や協力を持って接する傾向","全ての集団に対して等しく評価する傾向","他者の集団の方が優れていると感じる傾向"],a:1,e:"自分の所属する集団（内集団）を好意的に評価するバイアス。多職種連携やチーム医療でも注意が必要。"},
{i:171,c:"第14回【認知バイアス】",q:"「抑うつの現実主義」の説明として正しいのはどれか。",o:["抑うつ傾向がある人はイリュージョンが強い","抑うつ傾向がある人はイリュージョンが弱く良い面も悪い面も偏ることなく認知する傾向がある","抑うつ者は全てをネガティブに認知する","抑うつ者は自己認知が不正確である"],a:1,e:"抑うつ者こそ自己認知が正確であるという事実。抑うつ的になるまで考え過ぎず前向きに行動してみる時もあってよい。"},
{i:172,c:"第14回【認知バイアス】",q:"「錯誤相関（相関の錯誤）」の説明として正しいのはどれか。",o:["実際に相関がある事象間の関係を正しく認知すること","肯定的で印象に残る事例のみにバイアスがかかり本来無関係な出来事に明確な関係があると錯覚すること","全ての情報を均等に処理すること","統計的に有意な相関のみを認知すること"],a:1,e:"例：「てるてる坊主をぶらさげたら雨がやんだ」「四つ葉のクローバーで幸運が舞い込む」。確証バイアスと関連。"},
{i:173,c:"第14回【認知バイアス】",q:"「確証バイアス」の説明として正しいのはどれか。",o:["自分の期待に反した情報（反証）を積極的に求める傾向","自分の期待や予測に合致した情報を求め反証にはほとんど注意を払わない情報処理の傾向","全ての情報を等しく重視する傾向","他者の意見に従って判断する傾向"],a:1,e:"知覚・記憶・思考などあらゆる認知プロセスに見られる強固な「クセ」。例：血液型性格判断を信じる人が合致する例のみを選択的に認知する。"},
{i:174,c:"第14回【認知バイアス】",q:"「代表性ヒューリスティクス」の説明として正しいのはどれか。",o:["情報を全て精査して判断する方法","不確実な内容について推論する時、典型例との類似点を基準に判断してしまいがちなこと","最初に与えられた情報を基準にして判断すること","身近な例に基づいて頻度を判断すること"],a:1,e:"間違いばかりではなく的確に早く適切な判断を導く面もある。「代表性」は経験を元に構成されていく概念。"},
{i:175,c:"第14回【認知バイアス】",q:"「利用可能性ヒューリスティクス」の説明として正しいのはどれか。",o:["全ての利用可能な情報を網羅的に処理すること","自分が知っているとか身近にそんな例があるといった利用しやすい情報に基づいて頻度を判断すること","典型例との類似性に基づいて判断すること","最初の基準点に引きずられて判断すること"],a:1,e:"適切な情報を使って合理的に推測するのではなく、利用しやすい情報に基づいて判断している。"},
{i:176,c:"第14回【認知バイアス】",q:"「アンカリングと調整のヒューリスティクス」の説明として正しいのはどれか。",o:["情報を精査して組み立てていく方法","与えられた基準点を手がかりとして考える性質。船が錨を下ろして位置を固定するという意味","全ての情報を均等に比較検討する方法","最新の情報のみに注目して判断する方法"],a:1,e:"人は素早く判断を下すために情報を精査せず与えられた基準点から判断する。"},
{i:177,c:"第14回【認知バイアス】",q:"ポジティブ気分の注意点として正しいのはどれか。",o:["ポジティブ気分の時はメッセージを深く処理でき騙されにくい","ポジティブ気分の時はメッセージを表面的にしか処理しておらず深く考えるのが苦手な状態で騙されやすい","ポジティブ気分は常に良い判断を導く","ポジティブ気分の時は分析的思考が促進される"],a:1,e:"ネガティブな気分の方が内容をよく分析し吟味するのが得意。ポジティブ気分は心地よいが注意が必要。"},
{i:178,c:"第14回【認知バイアス】",q:"「気分に応じた問題解決場面」について正しいのはどれか。",o:["ポジティブ気分は常に問題解決を促進する","ポジティブ気分はユニークな発想・創造的解決を促進し、ネガティブ気分は熟慮的・分析的な思考を導く","ネガティブ気分は常に問題解決を妨害する","気分は問題解決に影響しない"],a:1,e:"アイディア出し→ウキウキする音楽。緻密な作業→悲しげな音楽。課題に応じた気分の誘導が有効。"},
{i:179,c:"第14回【認知バイアス】",q:"「なぜ人の思考にバイアスがかかるのか」の3つの原則として正しいのはどれか。",o:["記憶力・判断力・注意力の限界","自分の安全や生存の確保・認知的経済性・自己を肯定し自己評価を高めようとする","教育の不足・経験の不足・知識の不足","遺伝的要因・環境的要因・文化的要因"],a:1,e:"原則①安全・生存の確保②認知的経済性③自己肯定・自己評価の向上。能力の欠如ではなく必要があって存在するバイアス。"},
{i:180,c:"第14回【認知バイアス】",q:"「確証バイアスが存在する理由」として正しいのはどれか。",o:["人の認知能力が劣っているため","単に誤りをもたらすだけでなく日々の膨大な情報を処理するために必要があって存在するバイアスでもある","進化の過程で不要になったが残存している","教育によって完全に除去できるバイアス"],a:1,e:"確証バイアスは人にとって欠かせない働きで必要があって存在する。文脈効果（ABCと13Bの例）もその一例。"}

];
var cats=["すべて"],cset=new Set();
Q.forEach(function(x){if(!cset.has(x.c)){cset.add(x.c);cats.push(x.c);}});
var cur="すべて",fl=[],ix=0,sc=0,tt=0,wr=[],ans=false;
function sf(a){for(var j=a.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var t=a[j];a[j]=a[k];a[k]=t;}return a;}
function menu(){
  var h='<p style="font-size:13px;color:#555;margin-bottom:10px">カテゴリーを選んでスタート</p><div class="cg">';
  for(var j=0;j<cats.length;j++){h+='<button class="cb'+(cats[j]===cur?' on':'')+'" onclick="sc2(\''+cats[j]+'\')">'+cats[j]+'</button>';}
  h+='</div><div>';
  h+='<button class="bt" onclick="go()">▶ '+(cur==="すべて"?"全問":"このカテゴリーで")+'スタート</button>';
  if(wr.length>0) h+='<button class="bt2" onclick="retry()">↩ 間違えた問題を復習（'+wr.length+'問）</button>';
  h+='</div>';
  document.getElementById("app").innerHTML='<h1>認知・学習心理学 選択問題クイズ</h1>'+h;
}
function sc2(c){cur=c;menu();}
function go(){
  fl=cur==="すべて"?Q.slice():Q.filter(function(x){return x.c===cur;});
  sf(fl);ix=0;sc=0;tt=0;wr=[];rq();
}
function retry(){fl=wr.slice();sf(fl);ix=0;sc=0;tt=0;wr=[];rq();}
function rq(){
  if(ix>=fl.length){res();return;}
  ans=false;var q=fl[ix],pc=Math.round(ix/fl.length*100);
  var lb=["①","②","③","④"];
  var h='<div class="pb"><div class="pf" style="width:'+pc+'%"></div></div>';
  h+='<div class="sr"><span>'+( ix+1)+' / '+fl.length+'問</span><span>正解率 '+(tt>0?Math.round(sc/tt*100):0)+'%（'+sc+'/'+tt+'）</span><button class="bt2" onclick="menu()" style="font-size:11px;padding:4px 10px">メニュー</button></div>';
  h+='<div class="qc"><div class="qm">'+q.c+'</div><p class="qt">Q'+q.i+'. '+q.q+'</p>';
  for(var j=0;j<q.o.length;j++){h+='<button class="ch" id="ch'+j+'" onclick="ck('+j+')">'+lb[j]+' '+q.o[j]+'</button>';}
  h+='<div class="ex" id="expl">💡 '+q.e+'</div></div>';
  h+='<div id="nxd" style="display:none;margin-top:10px"><button class="bt" onclick="nx()">次の問題 →</button></div>';
  document.getElementById("app").innerHTML='<h1>認知・学習心理学 選択問題クイズ</h1>'+h;
}
function ck(j){
  if(ans)return;ans=true;tt++;
  var q=fl[ix];
  for(var k=0;k<q.o.length;k++){document.getElementById("ch"+k).classList.add("off");}
  if(j===q.a){sc++;document.getElementById("ch"+j).className="ch ok";}
  else{document.getElementById("ch"+j).className="ch ng";document.getElementById("ch"+q.a).className="ch rv";wr.push(q);}
  document.getElementById("expl").className="ex s";
  document.getElementById("nxd").style.display="block";
}
function nx(){ix++;rq();}
function res(){
  var pc=Math.round(sc/tt*100);
  var ms=pc>=90?"🎉 すばらしい！":pc>=70?"👍 よくできました！":pc>=50?"📖 もう少し復習を":"💪 もう一度チャレンジ！";
  var h='<div class="sc"><p class="sl">'+(cur==="すべて"?"全カテゴリー":cur)+'</p><div class="sb">'+pc+'%</div><p class="sl">'+sc+' / '+tt+' 問正解</p><p class="sm">'+ms+'</p>';
  if(wr.length>0) h+='<p style="font-size:13px;color:#888;margin-top:8px">間違えた問題：'+wr.length+'問</p>';
  h+='<div style="margin-top:16px">';
  if(wr.length>0) h+='<button class="bt" onclick="retry()">↩ 間違えた問題を復習</button>';
  h+='<button class="bt" onclick="go()">▶ もう一度</button><button class="bt2" onclick="menu()">メニューへ</button></div></div>';
  document.getElementById("app").innerHTML='<h1>認知・学習心理学 選択問題クイズ</h1>'+h;
}
menu();
</script>
