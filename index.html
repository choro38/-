<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST クイズ道場</title>
<style>
  :root{
    --paper:#F5F3EC; --card:#FFFFFF; --ink:#26303F; --ink-soft:#5A6675;
    --line:#E4E0D5; --accent:#E88A5A; --marker:#F4CE5B; --marker-soft:#FBEEC2;
    --correct:#3E9C72; --correct-bg:#E8F5EE; --wrong:#D46A63; --wrong-bg:#FBEBE9;
    --miss:#E0913E; --miss-bg:#FBF1E2; --sel:#4A90D9; --sel-bg:#E9F1FB;
    --tag:#5B8AA6; --tag-bg:#EAF1F6; --shadow:0 4px 20px rgba(38,48,63,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",-apple-system,"Segoe UI",Meiryo,sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.7; -webkit-font-smoothing:antialiased; padding:16px; min-height:100vh;}
  .wrap{max-width:620px;margin:0 auto}
  .brand{text-align:center;padding:18px 0 6px}
  .brand h1{font-size:1.5rem;letter-spacing:.04em;font-weight:800}
  .brand h1 .accent{color:var(--accent)}
  .brand p{color:var(--ink-soft);font-size:.82rem;margin-top:2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:22px;margin-top:16px}
  .screen{display:none} .screen.active{display:block}
  h2.sec{font-size:.78rem;letter-spacing:.12em;color:var(--ink-soft);font-weight:700;margin-bottom:12px}
  .back{background:none;border:none;color:var(--tag);font-size:.85rem;cursor:pointer;font-family:inherit;padding:0;margin-bottom:12px}
  .subjects{display:grid;gap:11px}
  .subj-btn{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);
    border:1.5px solid var(--line);border-radius:15px;padding:16px 18px;cursor:pointer;font-size:1.05rem;color:var(--ink);transition:.15s;font-family:inherit}
  .subj-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .subj-btn .ic{font-size:1.8rem;line-height:1;flex-shrink:0}
  .subj-btn .nm{font-weight:700}
  .subj-btn .cnt{display:block;font-size:.76rem;color:var(--ink-soft);margin-top:2px}
  .subj-btn.empty{opacity:.62} .subj-btn.empty:hover{border-color:var(--line);transform:none}
  .modes{display:grid;gap:10px}
  .mode-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);
    border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;font-size:1rem;color:var(--ink);transition:.15s;font-family:inherit}
  .mode-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .mode-btn .big{font-size:1.5rem;line-height:1}
  .mode-btn .sub{display:block;font-size:.76rem;color:var(--ink-soft);margin-top:1px}
  .mode-btn strong{font-weight:700}
  .cat-list{margin-top:8px;display:grid;gap:7px}
  .cat-btn{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--card);
    border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;cursor:pointer;font-size:.9rem;color:var(--ink);transition:.15s;font-family:inherit;text-align:left}
  .cat-btn:hover{border-color:var(--tag);background:var(--tag-bg)}
  .cat-btn .n{font-size:.74rem;color:var(--ink-soft);background:var(--paper);border-radius:20px;padding:2px 9px;white-space:nowrap}
  .shuf{width:100%;border-radius:12px;padding:11px 14px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px;transition:.15s;border:1.5px solid var(--line)}
  .shuf.on{background:var(--correct-bg);border-color:#BFE3D0;color:var(--correct)}
  .shuf.off{background:var(--paper);color:var(--ink-soft)}
  .shuf-note{font-size:.72rem;color:var(--ink-soft);margin:-8px 0 14px;line-height:1.5}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0 12px;color:var(--ink-soft);font-size:.74rem;letter-spacing:.1em}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
  .counter{font-size:.82rem;color:var(--ink-soft);font-weight:600;white-space:nowrap}
  .counter b{color:var(--ink);font-size:1rem}
  .quit{background:none;border:none;color:var(--ink-soft);font-size:.8rem;cursor:pointer;text-decoration:underline;font-family:inherit}
  .bar{height:7px;background:var(--line);border-radius:20px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--marker),var(--accent));width:0;transition:width .35s ease}
  .tag{display:inline-block;font-size:.7rem;font-weight:700;color:var(--tag);background:var(--tag-bg);border-radius:20px;padding:3px 11px;margin-bottom:8px}
  .star-tag{background:var(--marker-soft);color:#9A7A1E;margin-left:6px}
  .multi-tag{background:#EDE7F6;color:#6A4CA5;margin-left:6px}
  .qtext{font-size:1.12rem;font-weight:700;line-height:1.6;margin:6px 0 6px}
  .qtext em{font-style:normal;background:linear-gradient(transparent 55%,var(--marker) 55%);padding:0 2px;font-weight:800}
  .multi-hint{font-size:.76rem;color:#6A4CA5;font-weight:700;margin-bottom:14px}
  .opts{display:grid;gap:9px}
  .opt{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;cursor:pointer;font-size:.98rem;color:var(--ink);transition:.13s;font-family:inherit;line-height:1.5}
  .opt:hover:not(:disabled){border-color:var(--accent);background:#FFF9F4}
  .opt:disabled{cursor:default}
  .opt .num{flex-shrink:0;width:25px;height:25px;border-radius:50%;background:var(--paper);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;border:1px solid var(--line)}
  .opt.selected{border-color:var(--sel);background:var(--sel-bg)}
  .opt.selected .num{background:var(--sel);color:#fff;border-color:var(--sel)}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt.correct .num{background:var(--correct);color:#fff;border-color:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
  .opt.wrong .num{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .opt.missed{border-color:var(--miss);background:var(--miss-bg)}
  .opt.missed .num{background:var(--miss);color:#fff;border-color:var(--miss)}
  .opt .body{flex:1;min-width:0}
  .opt .mk{margin-left:8px;font-weight:800;font-size:1rem;align-self:flex-start}
  .opt.correct .mk{color:var(--correct)} .opt.wrong .mk{color:var(--wrong)} .opt.missed .mk{color:var(--miss)}
  .opt-exp{display:none;font-size:.8rem;color:#555;line-height:1.55;margin-top:6px;padding-top:6px;border-top:1px dashed #ddd}
  .opt.correct .opt-exp,.opt.wrong .opt-exp,.opt.missed .opt-exp{display:block}
  .explain{margin-top:16px;border-radius:13px;padding:15px 16px;font-size:.9rem;line-height:1.7;display:none}
  .explain.show{display:block}
  .explain.ok{background:var(--correct-bg);border:1px solid #BFE3D0}
  .explain.ng{background:var(--wrong-bg);border:1px solid #F0CFCB}
  .explain .head{font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:7px}
  .explain.ok .head{color:var(--correct)} .explain.ng .head{color:var(--wrong)}
  .explain b{background:linear-gradient(transparent 55%,var(--marker) 55%);padding:0 1px}
  .judge,.next{margin-top:16px;width:100%;border:none;border-radius:13px;padding:15px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;display:none}
  .judge{background:var(--sel);color:#fff}
  .judge.show{display:block} .judge:disabled{background:#B7C4D4;cursor:default}
  .next{background:var(--ink);color:#fff} .next.show{display:block} .next:hover{background:#141c28}
  .score-ring{text-align:center;padding:8px 0 4px}
  .score-ring .pct{font-size:3.4rem;font-weight:800;line-height:1;color:var(--accent)}
  .score-ring .frac{color:var(--ink-soft);font-size:.95rem;margin-top:4px}
  .msg{text-align:center;font-size:1rem;font-weight:700;margin:14px 0 4px}
  .breakdown{margin-top:18px;display:grid;gap:8px}
  .brow{display:flex;align-items:center;gap:10px;font-size:.84rem}
  .brow .lbl{flex:1;min-width:0}
  .brow .mini{width:90px;height:6px;background:var(--line);border-radius:20px;overflow:hidden;flex-shrink:0}
  .brow .mini i{display:block;height:100%;background:var(--correct)}
  .brow .sc{width:40px;text-align:right;color:var(--ink-soft);flex-shrink:0;font-variant-numeric:tabular-nums}
  .actions{display:grid;gap:10px;margin-top:22px}
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:13px;padding:15px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);border-radius:13px;padding:14px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-ghost:disabled{opacity:.4;cursor:not-allowed}
  .empty-msg{background:var(--marker-soft);border:1px solid #EBD89A;border-radius:13px;padding:16px;font-size:.88rem;line-height:1.7;margin-top:4px}
  .empty-msg code{background:#fff;padding:1px 5px;border-radius:4px;font-size:.85em}
  .foot{text-align:center;color:var(--ink-soft);font-size:.72rem;padding:22px 0 8px;line-height:1.6}
  .kbd{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:5px;padding:0 6px;font-size:.72rem;margin:0 1px}
  @media(max-width:400px){.brand h1{font-size:1.3rem}.qtext{font-size:1.04rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>ST <span class="accent">クイズ道場</span></h1>
    <p id="brandSub">教科を選んでスタート　★は頻出ポイント</p>
  </div>

  <div id="subjects" class="screen active">
    <div class="card"><h2 class="sec">教科を選ぶ</h2><div class="subjects" id="subjList"></div></div>
  </div>

  <div id="start" class="screen">
    <div class="card">
      <button class="back" onclick="show('subjects')">← 教科を変える</button>
      <h2 class="sec" id="startTitle">出題メニューを選ぶ</h2>
      <button id="shufBtn" class="shuf on" onclick="toggleShuffle()">選択肢をシャッフル：ON</button>
      <div class="shuf-note">★位置で丸暗記するのを防ぎ、内容で判断する力が鍛えられます。じっくり復習したい時はOFFに。</div>
      <div class="modes">
        <button class="mode-btn" onclick="startQuiz('all')"><span class="big">📚</span><span><strong id="allLabel">全問チャレンジ</strong><span class="sub">全範囲を通しで。実力チェックに</span></span></button>
        <button class="mode-btn" onclick="startQuiz('random10')"><span class="big">⚡</span><span><strong>ランダム10問</strong><span class="sub">スキマ時間にサクッと</span></span></button>
        <button class="mode-btn" onclick="startQuiz('random20')"><span class="big">🎯</span><span><strong>ランダム20問</strong><span class="sub">まとまった演習に</span></span></button>
        <button class="mode-btn" id="starModeBtn" onclick="startQuiz('star')"><span class="big">⭐</span><span><strong>★頻出のみ（<span id="starCount"></span>問）</strong><span class="sub">直前対策・弱点つぶしに</span></span></button>
      </div>
      <div class="divider">分野別で解く</div>
      <div class="cat-list" id="catList"></div>
    </div>
  </div>

  <div id="quiz" class="screen">
    <div class="card">
      <div class="topbar"><span class="counter"><b id="cur">1</b> / <span id="tot">10</span>　<span id="live" style="color:var(--correct)"></span></span><button class="quit" onclick="confirmQuit()">中断</button></div>
      <div class="bar"><i id="prog"></i></div>
      <div id="tags"></div>
      <div class="qtext" id="qtext"></div>
      <div class="multi-hint" id="multiHint" style="display:none">✔ あてはまるものを<u>すべて</u>選んで「採点する」を押してください</div>
      <div class="opts" id="opts"></div>
      <button class="judge" id="judgeBtn" onclick="judgeMulti()">採点する</button>
      <div class="explain" id="explain"></div>
      <button class="next" id="nextBtn" onclick="nextQ()">次の問題へ →</button>
    </div>
  </div>

  <div id="result" class="screen">
    <div class="card">
      <div class="score-ring"><div class="pct" id="pct">0%</div><div class="frac" id="frac">0 / 0 問正解</div></div>
      <div class="msg" id="msg"></div>
      <div class="breakdown" id="breakdown"></div>
      <div class="actions">
        <button class="btn-ghost" id="reviewBtn" onclick="startReview()">間違えた問題だけ復習する</button>
        <button class="btn-primary" onclick="goStart()">メニューに戻る</button>
      </div>
    </div>
  </div>

  <div class="foot">PC操作：単一選択は数字キー <span class="kbd">1</span>–<span class="kbd">5</span>／複数選択は数字で選び <span class="kbd">Enter</span> で採点・次へ<br>さや先生の主席合格を応援しています 💪</div>
</div>

<script>
const SUBJECTS = [
  // ── 教科1：言語発達学（単一選択・100問）──
  { name:"言語発達学", icon:"🗣️", questions: [{"id": 1, "category": "第1・2回　言語の役割／ことばの3要素／言語と進化", "star": false, "q": "このコースで扱う「ことばの3つの要素」の組み合わせとして正しいものはどれか。", "options": ["音韻・意味・語用", "音声言語・言語・コミュニケーション意欲", "統語・意味・音韻", "発声・構音・共鳴", "語彙・文法・談話"], "answer": 1, "explanation": "このコース独自の枠組みでは、ことばの3要素は「音声言語・言語・コミュニケーション意欲」。一般言語学の音韻・意味・語用（選択肢1）とは**別物**なので要注意。★混同しやすい最重要ポイント。", "catShort": "言語の役割／ことばの3要素／言語と進化", "catOrder": 0}, {"id": 2, "category": "第1・2回　言語の役割／ことばの3要素／言語と進化", "star": true, "q": "音声言語コミュニケーションの特徴について、**誤っている**ものはどれか。", "options": ["音声言語だけで伝わる情報量には限界がある", "表情や身振りなどの非言語的手段も情報伝達を補う", "音声言語は聴覚を介して受信される", "音声言語はコミュニケーションのすべての情報を過不足なく伝える", "イントネーションや声の高低も意味の伝達に関与する"], "answer": 3, "explanation": "音声言語だけでは情報伝達に限界があり、非言語手段が補完する。「過不足なく伝える」は誤り。", "catShort": "言語の役割／ことばの3要素／言語と進化", "catOrder": 0}, {"id": 3, "category": "第1・2回　言語の役割／ことばの3要素／言語と進化", "star": false, "q": "ヒトが言語を獲得する基盤を進化の過程で得たことに関する説明として、最も適切なものはどれか。", "options": ["言語能力は計画的・目的的に進化した", "発音・発話に必要な各器官が進化の過程で変化した結果である", "直立二足歩行は言語進化とは無関係である", "咽頭・喉頭の形態は霊長類とヒトで同一である", "言語は他の動物にも同程度に備わっている"], "answer": 1, "explanation": "発音・発話に必要な各器官が進化の過程で変化した結果、ヒトは言語獲得の基盤を得た。進化は偶発的で、計画的（1）ではない。", "catShort": "言語の役割／ことばの3要素／言語と進化", "catOrder": 0}, {"id": 4, "category": "第1・2回　言語の役割／ことばの3要素／言語と進化", "star": false, "q": "非言語コミュニケーションのうち、**パラランゲージ（周辺言語）**に分類されるものはどれか。", "options": ["手の身振り", "顔の表情", "声の高さ・大きさ・話す速さ", "姿勢", "対人距離"], "answer": 2, "explanation": "パラランゲージ＝声の高さ・大きさ・話す速さなど「音声に付随する」要素。表情・身振り・姿勢・対人距離はボディランゲージ側。★分類混同に注意。", "catShort": "言語の役割／ことばの3要素／言語と進化", "catOrder": 0}, {"id": 5, "category": "第1・2回　言語の役割／ことばの3要素／言語と進化", "star": false, "q": "非言語コミュニケーションのうち、**ボディランゲージ（身体言語）**に分類されるものはどれか。", "options": ["イントネーション", "声質", "うなずきや身振り", "発話の間（ポーズ）", "声の抑揚"], "answer": 2, "explanation": "ボディランゲージ＝うなずき・身振りなど身体動作。1・2・4・5は声に関わるためパラランゲージ。", "catShort": "言語の役割／ことばの3要素／言語と進化", "catOrder": 0}, {"id": 6, "category": "第1・2回　言語の役割／ことばの3要素／言語と進化", "star": false, "q": "話しことばの主たる機能として最も適切なものはどれか。", "options": ["思考の調整", "知識の獲得", "目の前の相手との要求伝達・情報交換", : 31, "category": "第4回　発達論（遺伝と環境）", "star": true, "q": "「遺伝と環境は加算的に発達を規定し、相関しない」とする輻輳説を提唱した人物はどれか。", "options": ["シュテルン（Stern, W.）", "ルクセンブルガー（Luxenburger, H.）", "ジェンセン（Jensen, A. R.）", "ゲゼル（Gesell, A. L.）", "ワトソン（Watson, J. B.）"], "answer": 0, "explanation": "シュテルンの輻輳説（遺伝＋環境、加算的・相関しない）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 32, "category": "第4回　発達論（遺伝と環境）", "star": true, "q": "「環境の質がある水準（閾値）を超えると遺伝的な可能性が開花する」とする環境閾値説を唱えた人物はどれか。", "options": ["シュテルン（Stern, W.）", "ジェンセン（Jensen, A. R.）", "ルクセンブルガー（Luxenburger, H.）", "ロック（Locke, J.）", "ゲゼル（Gesell, A. L.）"], "answer": 1, "explanation": "ジェンセンの環境閾値説（環境が閾値を超えると遺伝が開花）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 33, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "遺伝と環境が「相互に働く（遺伝×環境）」とする立場はどれか。", "options": ["遺伝論", "環境論", "輻輳説", "相互作用説", "成熟優位説"], "answer": 3, "explanation": "相互作用説（遺伝×環境）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 34, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "「氏より育ち」という言葉が対応する立場はどれか。", "options": ["遺伝論", "環境論", "輻輳説", "相互作用説", "成熟優位説"], "answer": 1, "explanation": "「氏より育ち」＝環境論。「蛙の子は蛙」＝遺伝論。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 35, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "環境の重要性を示す事例として挙げられるものはどれか。", "options": ["いないいないばあ遊び", "アヴェロンの野生児", "視覚的断崖の実験", "マザリーズ", "三項関係の成立"], "answer": 1, "explanation": "アヴェロンの野生児、狼に育てられた子、カスパー・ハウザーは環境の重要性を示す事例。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 36, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "発達の3領域の説明として**誤っている**ものはどれか。", "options": ["身体的発達には運動スキルが含まれる", "認知発達には学習・記憶・思考が含まれる", "心理社会的発達には人格・情動・社会的関係が含まれる", "認知発達には感覚能力の成熟のみが含まれる", "これらの領域は相互に関連しながら発達する"], "answer": 3, "explanation": "認知発達＝学習・記憶・思考・推論・創造性など。「感覚能力の成熟のみ」は誤り（感覚・運動は身体的発達側）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 37, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "ルソー（Rousseau, J. J.）の「生得説」に最も近い考え方はどれか。", "options": ["知識の源泉は経験である", "発達を最も決定づけるのは受け継がれた天性である", "発達は人間が統制できる", "環境が閾値を超えると遺伝が開花する", "遺伝と環境は加算的に働く"], "answer": 1, "explanation": "ルソーの生得説＝発達を最も決定づけるのは受け継がれた天性。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 38, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "ルクセンブルガー（Luxenburger, H.）の図式化が示す考え方として正しいものはどれか。", "options": ["どの機能も遺伝と環境が影響するが、その寄与率は機能によって異なる", "遺伝だけが発達を決定する", "環境だけが発達を決定する", "遺伝と環境は相互に掛け算的に働く", "環境が閾値を超えないと遺伝は発現しない"], "answer": 0, "explanation": "ルクセンブルガーの図式化＝どの機能も遺伝と環境が影響するが寄与率が異なる（輻輳説の図式化）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 39, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "言語発達理論の4つの立場の組み合わせとして正しいものはどれか。", "options": ["学習論・生得論・認知論・社会認知論", "遺伝論・環境論・輻輳説・相互作用説", "音韻論・統語論・意味論・語用論", "感覚運動期・前操作期・具体的操作期・形式的操作期", "一次的ことば・二次的ことば・生活言語・学習言語"], "answer": 0, "explanation": "言語発達理論の4立場＝学習論・生得論・認知論・社会認知論。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 40, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "スキナー（Skinner, B. F., 米・心理学者）の言語行動理論の説明として最も適切なものはどれか。", "options": ["言語は生得的な普遍文法によって獲得される", "言語は認知発達に支えられて発達する", "言語は他者を介して強化された行動であり、オペラント条件づけで説明される", "言語は社会的相互作用の副産物である", "言語獲得には発達の最近接領域が必要である"], "answer": 2, "explanation": "スキナー＝言語は他者を介して強化された行動、オペラント条件づけで説明。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 41, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "スキナーの言語行動理論において、幼児期のことばの獲得に特に重要とされる要因はどれか。", "options": ["普遍文法", "模倣", "対象の永続性", "共同注意", "発達の最近接領域"], "answer": 1, "explanation": "スキナーは模倣を幼児期のことば獲得に特に重要とみなす。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 42, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "オペラント条件づけにおける「タクト（叙述言語行動）」の例として最も適切なものはどれか。", "options": ["「ちょうだい」と要求して物を得る", "犬を見て「わんわん！」と言い、「そうだね」と応答される", "母親の「バイバイ」をまねる", "泣いて要求を通す", "名前を呼ばれて振り向く"], "answer": 1, "explanation": "タクト（叙述言語行動）＝対象を見て言語化し応答・強化される（例「わんわん！」）。要求＝マンド、模倣＝エコイック。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 43, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "スキナーの理論で、言語発達を「発話が起こるセッティング・イベント／発話／発話がもたらす結果」の三者関係と捉える。この「結果」に相当するものはどれか。", "options": ["先行事象", "後続事象（強化）", "弁別刺激", "レディネス", "シェマ"], "answer": 1, "explanation": "三者関係の「結果」＝後続事象（強化）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 44, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "チョムスキー（Chomsky, N., 米・言語学者）が提唱した、生得的に備わる言語獲得の仕組みはどれか。", "options": ["LASS（Language Acquisition Support System）", "LAD（Language Acquisition Device：言語獲得装置）＝普遍文法", "ZPD（Zone of Proximal Development）", "MLU（Mean Length of Utterance）", "オペラント条件づけ"], "answer": 1, "explanation": "チョムスキー＝LAD（言語獲得装置）＝普遍文法が生得的に備わる。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 45, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "生成文法理論において、個別言語の多様性に対応するための「スイッチのようなもの」を何と呼ぶか。", "options": ["シェマ", "パラメーター", "モジュール", "フォーマット", "レディネス"], "answer": 1, "explanation": "パラメーター＝個別言語の多様性に対応するスイッチ。入力によって設定され個別文法が決まる。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 46, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "「刺激の貧困」という問題に対する生得論の主張として最も適切なものはどれか。", "options": ["入力される言語は常に完全で豊かである", "貧困な入力でも生得的な普遍文法があれば複雑な文法を獲得できる", "言語は環境からの強化のみで獲得される", "言語発達には認知発達が先行条件として必要である", "言語は社会的相互作用の副産物である"], "answer": 1, "explanation": "刺激の貧困＝貧困な入力でも生得的普遍文法があれば複雑な文法を獲得できる、というのが生得論の主張。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 47, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "認知論（ピアジェ理論に基づく立場）の基本的な主張はどれか。", "options": ["言語は強化された行動である", "言語の発達は認知発達によって支えられ準備されている", "言語は生得的な文法によって獲得される", "言語は社会的相互作用の副産物である", "言語獲得には母親のLASSが不可欠である"], "answer": 1, "explanation": "認知論＝言語の発達は認知発達に支えられ準備されている（ピアジェ理論が基盤）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 48, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "ピアジェ（Piaget, J., スイス・心理学者）の概念で、「既存の枠組みを変えずに新しい経験を取り込むこと」はどれか。", "options": ["調節（調整）", "同化", "シェマ", "循環反応", "対象の永続性"], "answer": 1, "explanation": "同化＝既存のシェマを変えずに新しい経験を取り込む（例：犬を見て「にゃんにゃん！」）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 49, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "「新しい事柄に適応するためにシェマ自体を変えること」を何というか。", "options": ["同化", "調節（調整）", "循環反応", "内面化", "保存"], "answer": 1, "explanation": "調節（調整）＝新しい事柄に適応するためシェマ自体を変える（「わんわん」と修正）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 50, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "ピアジェの感覚運動期において「対象の永続性の概念」を獲得するのはどの段階（月齢）か。", "options": ["第1段階（0〜1か月）", "第2段階（1〜4か月）", "第3段階（4〜8か月）", "第4段階（8〜12か月）", "第6段階（18〜24か月）"], "answer": 3, "explanation": "対象の永続性は第4段階（8〜12か月）で獲得（現在は生後5か月半頃から一部認識との研究もあり）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 51, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "ピアジェの感覚運動期・第6段階（18〜24か月）の特徴として最も適切なものはどれか。", "options": ["反射的行動", "第1次循環反応", "シェマの内面化（心の中で試してから行動し、試行錯誤しない）", "対象の永続性の獲得", "目的に合わせた手段を使う"], "answer": 2, "explanation": "第6段階（18〜24か月）＝シェマの内面化、心の中で試してから行動し試行錯誤しない。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 52, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "第1次循環反応（1〜4か月）の例として最も適切なものはどれか。", "options": ["おもちゃを投げて跳ね返りを見る", "指しゃぶりや同じ声を繰り返す", "対象の永続性を利用する", "心の中で試してから行動する", "目的と手段を組み合わせる"], "answer": 1, "explanation": "第1次循環反応（1〜4か月）＝自分の身体に限った感覚運動の繰り返し（指しゃぶり・同じ声）。1は第2次循環反応。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 53, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "「対象の永続性」を利用した遊びとして最も適切なものはどれか。", "options": ["いないいないばあ遊び", "しりとり", "ままごと", "積み木", "お絵かき"], "answer": 0, "explanation": "いないいないばあ遊び＝対象の永続性（見えなくても存在し続ける）を利用。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 54, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "「言語・思考・記憶の発達は社会的相互作用の中で促される」とし、発達の最近接領域（ZPD: Zone of Proximal Development）を提唱した人物はどれか。", "options": ["ピアジェ（Piaget, J.）", "ヴィゴツキー（Vygotsky, L., 旧ソ連・心理学者）", "ブルーナー（Bruner, J., 米・心理学者）", "チョムスキー（Chomsky, N.）", "スキナー（Skinner, B. F.）"], "answer": 1, "explanation": "ヴィゴツキー＝発達の最近接領域（ZPD）を提唱。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 55, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "発達の最近接領域（ZPD）の説明として最も適切なものはどれか。", "options": ["自分ひとりで解決できる水準", "他者の援助があればできる水準（現在の発達水準と潜在的水準の間）", "まだ全く到達できない水準", "成人と同等になった水準", "生得的に決まっている水準"], "answer": 1, "explanation": "ZPD＝自力で解決できる水準と、他者の援助があればできる水準の間の領域。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 56, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "ブルーナー（Bruner, J.）が提唱した、母親が子どもの言語発達を支えるサポートシステムはどれか。", "options": ["LAD（言語獲得装置）", "LASS（Language Acquisition Support System：言語獲得支援システム）", "ZPD（発達の最近接領域）", "普遍文法", "モジュール"], "answer": 1, "explanation": "ブルーナー＝LASS（言語獲得支援システム）。母親が言語獲得の足場となる場を作る。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 57, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "「足場かけ（スキャフォールディング）」の具体例として最も適切なものはどれか。", "options": ["子どもが自分ひとりでしりとりを完成させる", "語尾音を抽出できない年少児に、常に語尾音を教えながらしりとりに誘う", "オペラント条件づけで発話を強化する", "普遍文法のパラメーターを設定する", "対象の永続性を獲得させる"], "answer": 1, "explanation": "足場かけ＝語尾音抽出が難しい年少児に語尾音を常に教えながらしりとりに誘うなど、能力に合わせた援助。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 58, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "ヴィゴツキーの考えを受け継ぎ、言語発達理論へと発展させた人物はどれか。", "options": ["ピアジェ（Piaget, J.）", "チョムスキー（Chomsky, N.）", "ブルーナー（Bruner, J.）", "スキナー（Skinner, B. F.）", "ゲゼル（Gesell, A. L.）"], "answer": 2, "explanation": "ブルーナーがヴィゴツキーの考えを受け継ぎ言語発達理論へ発展させた。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 59, "category": "第7回　新生児期・前言語期のコミュニケーション", "star": true, "q": "マザリーズ（対乳児発話）の特徴として**誤っている**ものはどれか。", "options": ["ゆっくりしたテンポ", "高いピッチ", "誇張したイントネーション", "抽象的・複雑な内容を多く述べる", "少数の語や節を繰り返す"], "answer": 3, "explanation": "マザリーズは意味的制約により**具体的**なことを述べる。抽象的・複雑（4）は誤り。他にゆっくり・高ピッチ・誇張したイントネーション・反復が特徴。", "catShort": "新生児期・前言語期のコミュニケーション", "catOrder": 4}, {"id": 60, "category": "第7回　新生児期・前言語期のコミュニケーション", " れば何かが分かる", "correct": true, "exp": "視覚モダリティ特異的障害。触覚では対象を識別できる"}, {"text": "模写は素早く可能である", "correct": true, "exp": "知覚レベルは保たれているため形の模写は比較的速やかに行える"}]}, {"id": 67, "category": "失認（視覚）", "catShort": "失認（視覚）", "catOrder": 7, "star": false, "stem": "色彩失認の特徴として正しいものはどれか？", "choices": [{"text": "色盲に含まれる", "correct": false, "exp": "色彩失認は後天性脳損傷による色の認識障害。色盲（先天性）ではない"}, {"text": "色の名前が言えない", "correct": true, "exp": "色彩失認では色の名称化（呼称）が障害される"}, {"text": "言われた色を指差すことは可能", "correct": false, "exp": "色の視覚的認識自体が障害されているため指差しもできない"}, {"text": "色知覚検査では異常がない", "correct": true, "exp": "色彩失認は色の知覚（色盲検査）は正常。色の意味処理が障害される"}, {"text": "左一側病変で全視野に症状が出現する", "correct": true, "exp": "左後頭葉の一側損傷で両側視野に出現（脳梁経由で右半球の色情報も左で処理）"}]}, {"id": 68, "category": "失認（視覚）", "catShort": "失認（視覚）", "catOrder": 7, "star": false, "stem": "図形模写がスムーズに可能な視覚失認はどれか？", "choices": [{"text": "相貌失認", "correct": true, "exp": "相貌失認では物品・図形の知覚は保たれており図形模写はスムーズ"}, {"text": "色彩失認", "correct": true, "exp": "色彩失認は色の認識障害。形の模写には影響しない"}, {"text": "統覚型視覚失認", "correct": false, "exp": "統覚型では形の知覚処理が障害されているため図形模写も困難"}, {"text": "連合型視覚失認", "correct": true, "exp": "連合型では知覚レベルは保たれているため図形模写はスムーズ"}, {"text": "聴覚失認", "correct": false, "exp": "聴覚失認は音の認識障害。図形模写は関係なく可能"}]}, {"id": 69, "category": "失認（聴覚）", "catShort": "失認（聴覚）", "catOrder": 8, "star": false, "stem": "聴覚失認の特徴として当てはまるものはどれか？", "choices": [{"text": "言語音と環境音の認知が障害される", "correct": true, "exp": "聴覚失認（広義）では言語音・環境音の両方の認識が障害される"}, {"text": "失語症を伴うことがある", "correct": true, "exp": "純粋語聾（言語音の失認）は失語症と合併することがある"}, {"text": "純粋語聾が含まれる", "correct": true, "exp": "純粋語聾（pure word deafness）は言語音のみの失認。聴覚失認の一亜型"}, {"text": "皮質聾を伴うことがある", "correct": false, "exp": "皮質聾は一次聴覚野の両側損傷による聴覚の完全消失（聴覚失認とは区別）"}, {"text": "両側内側膝状体の損傷で起こる", "correct": false, "exp": "内側膝状体の両側損傷では聴覚情報の伝達障害。皮質聾に近い"}]}, {"id": 70, "category": "失認（聴覚）", "catShort": "失認（聴覚）", "catOrder": 8, "star": false, "stem": "狭義の聴覚失認の特徴として当てはまるものはどれか？", "choices": [{"text": "純音聴力検査は低下しない", "correct": true, "exp": "聴覚失認は純音聴力（末梢聴覚機能）は保たれている"}, {"text": "環境音が聞こえないと訴え // ===== 問題を共通形式へ正規化（単一 options/answer 形式にも対応）=====
function normalize(q){
  let choices, multi, qExp=q.explanation||'';
  if(q.choices){                       // 複数選択形式
    choices=q.choices.map(c=>({text:c.text, correct:!!c.correct, exp:c.exp||''}));
  }else{                               // 単一選択形式（options/answer）
    choices=q.options.map((t,i)=>({text:t, correct:i===q.answer, exp:''}));
  }
  multi = choices.filter(c=>c.correct).length>1;
  return {raw:q, stem:q.stem||q.q||'', choices, multi, qExp,
          catShort:q.catShort||q.category||'', catOrder:q.catOrder||0, star:!!q.star};
}

// ===== 状態 =====
let ALL=[];
let queue=[], idx=0, correct=0, answered=false, wrongList=[], results=[];
let shuffleOpts=true;
let curChoices=[], selected=new Set(), curMulti=false;

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function fmt(s){return (s||'').replace(/\*\*(.+?)\*\*/g,'<em>$1</em>');}

function buildSubjectScreen(){
  const wrap=document.getElementById('subjList'); wrap.innerHTML='';
  SUBJECTS.forEach((s,i)=>{
    const n=s.questions.length, star=s.questions.filter(q=>q.star).length;
    const b=document.createElement('button');
    b.className='subj-btn'+(n===0?' empty':'');
    b.innerHTML=`<span class="ic">${s.icon||'📘'}</span><span><span class="nm">${s.name}</span>`+
      `<span class="cnt">${n>0? n+'問'+(star?'　★頻出'+star+'問':'') : '準備中（問題はまだありません）'}</span></span>`;
    b.onclick=()=>selectSubject(i);
    wrap.appendChild(b);
  });
}
function selectSubject(i){
  const s=SUBJECTS[i];
  ALL=s.questions;
  document.getElementById('startTitle').textContent=s.icon+' '+s.name;
  document.getElementById('brandSub').textContent=s.name+'　★は頻出ポイント';
  if(ALL.length===0){ showEmptySubject(s); return; }
  buildStartMenu(); show('start');
}
function showEmptySubject(s){
  document.getElementById('shufBtn').style.display='none';
  document.querySelector('#start .shuf-note').style.display='none';
  document.querySelector('#start .modes').style.display='none';
  document.querySelector('#start .divider').style.display='none';
  document.getElementById('catList').innerHTML=
    `<div class="empty-msg">この教科（<b>${s.name}</b>）はまだ問題がありません。<br>`+
    `Claudeに「${s.name}の問題を作って」と頼んで、できた問題を <code>index.html</code> の SUBJECTS 内「${s.name}」の questions:[ ] に貼れば、ここで解けます📚</div>`;
  show('start');
}
function buildStartMenu(){
  document.getElementById('shufBtn').style.display='';
  document.querySelector('#start .shuf-note').style.display='';
  document.querySelector('#start .modes').style.display='';
  document.querySelector('#start .divider').style.display='';
  document.getElementById('allLabel').textContent='全'+ALL.length+'問チャレンジ';
  const starN=ALL.filter(q=>q.star).length;
  document.getElementById('starCount').textContent=starN;
  document.getElementById('starModeBtn').style.display = starN>0 ? '' : 'none';
  const cats=[];
  ALL.forEach(q=>{const cs=q.catShort||q.category; if(!cats.find(c=>c.name===cs)) cats.push({name:cs,order:q.catOrder||0});});
  cats.sort((a,b)=>a.order-b.order);
  const catList=document.getElementById('catList'); catList.innerHTML='';
  cats.forEach(c=>{
    const n=ALL.filter(q=>(q.catShort||q.category)===c.name).length;
    const b=document.createElement('button'); b.className='cat-btn';
    b.innerHTML=`<span class="lbl">${c.name}</span><span class="n">${n}問</span>`;
    b.onclick=()=>startQuiz('cat',c.name);
    catList.appendChild(b);
  });
}
function toggleShuffle(){
  shuffleOpts=!shuffleOpts;
  const b=document.getElementById('shufBtn');
  b.textContent='選択肢をシャッフル：'+(shuffleOpts?'ON':'OFF');
  b.className='shuf '+(shuffleOpts?'on':'off');
}
function startQuiz(mode,arg){
  let pool;
  if(mode==='all') pool=ALL.slice();
  else if(mode==='random10') pool=shuffle(ALL).slice(0,10);
  else if(mode==='random20') pool=shuffle(ALL).slice(0,20);
  else if(mode==='star') pool=ALL.filter(q=>q.star);
  else if(mode==='cat') pool=ALL.filter(q=>(q.catShort||q.category)===arg);
  if(mode==='all'||mode==='star'||mode==='cat') pool.sort((a,b)=>(a.id||0)-(b.id||0));
  beginWith(pool);
}
function startReview(){ beginWith(wrongList.slice()); }
function beginWith(pool){
  queue=pool; idx=0; correct=0; wrongList=[]; results=[];
  document.getElementById('tot').textContent=queue.length;
  show('quiz'); renderQ();
}
function goStart(){ buildStartMenu(); show('start'); }
function confirmQuit(){ if(confirm('クイズを中断してメニューに戻りますか？')) goStart(); }

function renderQ(){
  answered=false; selected=new Set();
  const N=normalize(queue[idx]);
  curMulti=N.multi;
  document.getElementById('cur').textContent=idx+1;
  document.getElementById('prog').style.width=((idx)/queue.length*100)+'%';
  document.getElementById('live').textContent = idx>0 ? ('正解 '+correct) : '';
  let t=`<span class="tag">${N.catShort}</span>`;
  if(N.star) t+=`<span class="tag star-tag">★頻出</span>`;
  if(N.multi) t+=`<span class="tag multi-tag">複数選択</span>`;
  document.getElementById('tags').innerHTML=t;
  document.getElementById('qtext').innerHTML=fmt(N.stem);
  document.getElementById('multiHint').style.display = N.multi ? '' : 'none';
  // 選択肢（シャッフル対応）。curChoicesは表示順の {text,correct,exp}
  const base=N.choices.map((c,i)=>({...c,_i:i}));
  curChoices = shuffleOpts ? shuffle(base) : base;
  const ow=document.getElementById('opts'); ow.innerHTML='';
  curChoices.forEach((c,pos)=>{
    const btn=document.createElement('button');
    btn.className='opt'; btn.dataset.pos=pos;
    btn.innerHTML=`<span class="num">${pos+1}</span><span class="body"><span>${fmt(c.text)}</span>`+
      (c.exp?`<span class="opt-exp">${fmt(c.exp)}</span>`:``)+`</span><span class="mk"></span>`;
    btn.onclick=()=> curMulti ? toggleSel(pos) : chooseSingle(pos);
    ow.appendChild(btn);
  });
  document.getElementById('explain').className='explain';
  document.getElementById('explain').innerHTML='';
  const jb=document.getElementById('judgeBtn');
  if(N.multi){ jb.className='judge show'; jb.disabled=true; jb.textContent='採点する'; }
  else jb.className='judge';
  const nb=document.getElementById('nextBtn'); nb.classList.remove('show');
  nb.textContent=(idx===queue.length-1)?'結果を見る →':'次の問題へ →';
}

// 単一選択：タップ即採点
function chooseSingle(pos){
  if(answered) return; answered=true;
  const btns=document.querySelectorAll('#opts .opt');
  btns.forEach(b=>b.disabled=true);
  const correctPos=curChoices.findIndex(c=>c.correct);
  const ok = pos===correctPos;
  finalizeResult(ok);
  btns[correctPos].classList.add('correct');
  btns[correctPos].querySelector('.mk').textContent='✓';
  if(!ok){ btns[pos].classList.add('wrong'); btns[pos].querySelector('.mk').textContent='✕'; }
  const N=normalize(queue[idx]);
  const ex=document.getElementById('explain');
  ex.className='explain show '+(ok?'ok':'ng');
  ex.innerHTML=`<div class="head">${ok?'⭕ 正解！':'❌ 不正解'}　正解は ${correctPos+1}</div>`+
    (N.qExp?`<div>${fmt(N.qExp)}</div>`:``);
  afterAnswerUI();
}

// 複数選択：トグル→採点
function toggleSel(pos){
  if(answered) return;
  const btn=document.querySelectorAll('#opts .opt')[pos];
  if(selected.has(pos)){ selected.delete(pos); btn.classList.remove('selected'); }
  else{ selected.add(pos); btn.classList.add('selected'); }
  document.getElementById('judgeBtn').disabled = selected.size===0;
}
function judgeMulti(){
  if(answered) return; answered=true;
  const btns=document.querySelectorAll('#opts .opt');
  btns.forEach(b=>b.disabled=true);
  document.getElementById('judgeBtn').style.display='none';
  let ok=true;
  curChoices.forEach((c,pos)=>{
    const b=btns[pos], mk=b.querySelector('.mk'), sel=selected.has(pos);
    b.classList.remove('selected');
    if(c.correct && sel){ b.classList.add('correct'); mk.textContent='✓'; }
    else if(c.correct && !sel){ b.classList.add('missed'); mk.textContent='△'; ok=false; }
    else if(!c.correct && sel){ b.classList.add('wrong'); mk.textContent='✕'; ok=false; }
  });
  finalizeResult(ok);
  const nCorrect=curChoices.filter(c=>c.correct).length;
  const ex=document.getElementById('explain');
  ex.className='explain show '+(ok?'ok':'ng');
  ex.innerHTML=`<div class="head">${ok?'⭕ 正解！':'❌ 不正解'}</div>`+
    `<div>正解は <b>${nCorrect}個</b>（✓＝正しく選択／△＝選び逃し／✕＝誤って選択）。各選択肢の解説は上に表示しています。</div>`;
  afterAnswerUI();
}

function finalizeResult(ok){
  if(ok) correct++; else wrongList.push(queue[idx]);
  results.push({q:queue[idx], ok});
}
function afterAnswerUI(){
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('prog').style.width=((idx+1)/queue.length*100)+'%';
}
function nextQ(){ if(idx<queue.length-1){ idx++; renderQ(); } else finish(); }

function finish(){
  const total=queue.length, pct=Math.round(correct/total*100);
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('frac').textContent=`${correct} / ${total} 問正解`;
  let m;
  if(pct>=90) m='お見事！主席レベルの仕上がりです🌸';
  else if(pct>=75) m='合格ラインをしっかり突破！この調子です✨';
  else if(pct>=60) m='あと一歩。間違えた問題を復習して定着させましょう💡';
  else m='今が伸びどき。復習で必ず伸びます。一緒にいきましょう🔥';
  document.getElementById('msg').textContent=m;
  const bd=document.getElementById('breakdown'); bd.innerHTML='';
  const byCat={};
  results.forEach(r=>{const c=r.q.catShort||r.q.category;if(!byCat[c])byCat[c]={ok:0,n:0};byCat[c].n++;if(r.ok)byCat[c].ok++;});
  Object.keys(byCat).sort((a,b)=>{
    const oa=ALL.find(q=>(q.catShort||q.category)===a),ob=ALL.find(q=>(q.catShort||q.category)===b);
    return (oa?oa.catOrder:0)-(ob?ob.catOrder:0);
  }).forEach(c=>{
    const o=byCat[c], p=Math.round(o.ok/o.n*100);
    const row=document.createElement('div');row.className='brow';
    row.innerHTML=`<span class="lbl">${c}</span><span class="mini"><i style="width:${p}%"></i></span><span class="sc">${o.ok}/${o.n}</span>`;
    bd.appendChild(row);
  });
  const rb=document.getElementById('reviewBtn');
  rb.disabled = wrongList.length===0;
  rb.textContent = wrongList.length===0 ? '全問正解！復習はありません 🎉' : `間違えた ${wrongList.length} 問だけ復習する`;
  show('result');
}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('quiz').classList.contains('active'))return;
  const nMax=curChoices.length;
  if(!answered && e.key>='1' && e.key<=String(Math.min(9,nMax))){
    const pos=+e.key-1; if(pos<nMax){ curMulti?toggleSel(pos):chooseSingle(pos); }
  }else if(!answered && curMulti && e.key==='Enter'){
    if(selected.size>0) judgeMulti();
  }else if(answered && e.key==='Enter'){ nextQ(); }
});

buildSubjectScreen();
</script>
