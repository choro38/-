
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{padding:1rem 0;max-width:640px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.title{font-size:15px;font-weight:500;color:var(--text-primary)}
.stats{display:flex;gap:8px}
.stat{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border)}
.stat.ok{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.stat.ng{background:#FCEBEB;color:#791F1F;border-color:#F7C1C1}
.stat.total{background:var(--surface-1);color:var(--text-secondary);border-color:var(--border)}
.mode-bar{display:flex;gap:6px;margin-bottom:1rem}
.mode-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface-1);color:var(--text-secondary);cursor:pointer;transition:all .15s}
.mode-btn.active{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.progress-bar{height:4px;background:var(--surface-1);border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:#378ADD;border-radius:2px;transition:width .3s}
.card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:1rem;position:relative}
.card:hover{border-color:var(--border-strong)}
.card-label{font-size:11px;color:var(--text-muted);margin-bottom:1rem;letter-spacing:.05em}
.card-text{font-size:17px;color:var(--text-primary);line-height:1.6;font-weight:400}
.card-hint{font-size:12px;color:var(--text-muted);margin-top:1.25rem}
.card.flipped{background:#E6F1FB;border-color:#85B7EB}
.card.flipped .card-text{color:#042C53}
.card.flipped .card-label{color:#185FA5}
.btn-row{display:flex;gap:8px;margin-bottom:1rem}
.btn{flex:1;padding:10px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:transparent;font-size:14px;cursor:pointer;transition:all .15s;color:var(--text-primary)}
.btn:hover{background:var(--surface-1)}
.btn.ok{border-color:#3B6D11;color:#27500A;background:#EAF3DE}
.btn.ok:hover{background:#C0DD97}
.btn.ng{border-color:#A32D2D;color:#791F1F;background:#FCEBEB}
.btn.ng:hover{background:#F7C1C1}
.nav-row{display:flex;gap:8px;align-items:center;justify-content:center}
.nav-btn{padding:8px 16px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:transparent;font-size:13px;cursor:pointer;color:var(--text-primary);transition:all .15s}
.nav-btn:hover{background:var(--surface-1)}
.nav-btn:disabled{opacity:.35;cursor:default}
.counter{font-size:13px;color:var(--text-secondary);padding:0 8px}
.complete{text-align:center;padding:2rem;background:var(--surface-1);border-radius:12px;border:0.5px solid var(--border)}
.complete h3{font-size:18px;font-weight:500;margin-bottom:.5rem}
.complete p{font-size:14px;color:var(--text-secondary);margin-bottom:1.25rem;line-height:1.6}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;background:#FCEBEB;color:#791F1F;border:0.5px solid #F7C1C1;position:absolute;top:12px;right:12px}
</style>

<div class="app">
  <div class="header">
    <span class="title">病理学 2023年度テスト</span>
    <div class="stats">
      <span class="stat total" id="s-total">全49問</span>
      <span class="stat ok" id="s-ok">正解 0</span>
      <span class="stat ng" id="s-ng">苦手 0</span>
    </div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('all')">全問</button>
    <button class="mode-btn" onclick="setMode('weak')">苦手のみ</button>
    <button class="mode-btn" onclick="shuffle()"><i class="ti ti-arrows-shuffle" aria-hidden="true"></i> シャッフル</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="main"></div>
</div>

<script>
const ALL = [
["イタイイタイ病の原因物質は何か","カドミウム"],
["血友病の遺伝様式は何か","伴性潜性遺伝（X染色体連鎖劣性）"],
["くる病の主な症状は何か","骨変形（ビタミンD欠乏→骨石灰化障害）"],
["献体を用いて全身を系統的に解剖することを何というか","系統解剖"],
["ダウン症候群の常染色体は何本か（常染色体のみ）","45本（全染色体は47本）"],
["膵臓B細胞が障害される糖尿病の型は何か","インスリン依存型（1型糖尿病）"],
["閉塞性黄疸で増加するビリルビンは何か","直接ビリルビン（抱合型）"],
["手術中の迅速診断に用いる標本は何か","凍結標本（凍結切片）"],
["細胞の容積が増加する変化を何というか","肥大"],
["外科手術の清潔な切開創の治癒形式は何か","一次治癒"],
["シェーライン・ヘノッホ紫斑病の機序は何か","アレルギー性血管炎"],
["炎症の5徴候をすべて答えよ","発赤・発熱・腫脹・疼痛・機能障害"],
["急性期の炎症に主に関与する細胞は何か","好中球"],
["アフタ性口内炎の組織学的特徴は何か","線維性（偽膜形成）"],
["肥満細胞（マスト細胞）と関係するIgは何か","IgE（Ⅰ型アレルギー）"],
["母体から胎児への感染経路を何というか","垂直感染"],
["シュニッツラー転移とはどこへの播種か","直腸膀胱窩（またはダグラス窩）への播種性転移"],
["アニリンによる職業癌は何か","膀胱癌"],
["女性に多い癌を1つあげよ","甲状腺癌（他：乳癌）"],
["心筋梗塞の原因血管として最も多いものは何か","左冠状動脈前下行枝"],
["アウエル小体が見られる疾患は何か","急性骨髄性白血病（AML）"],
["腺癌が多いのはどちらの性か","女性"],
["う蝕（虫歯）は何に分類されるか","感染症"],
["マロリーワイス症候群でみられる病変は何か","食道胃接合部の縦走裂傷"],
["ウィルムス腫瘍（腎芽腫）の特徴は何か","被膜を有する"],
["動脈血の減少・途絶を何というか","虚血"],
["頭部外傷に多い頭蓋内出血の種類は何か","硬膜下血腫"],
["水腎症で腎実質に起こる萎縮の種類は何か","圧迫性萎縮"],
["肝臓で作られたコレステロールを末梢細胞へ運ぶのは何か","LDL（悪玉コレステロール）"],
["子宮に発生する腫瘍で最も多いものは何か","子宮筋腫（良性・平滑筋腫）"],
["組織を薄くスライスする器具は何か","ミクロトーム"],
["ACTHが高くなる疾患は何か","クッシング病"],
["高山病の物理的因子は何か","気圧（低気圧）"],
["視神経が障害される疾患は何か","緑内障"],
["くも膜下出血の最多原因は何か","先天性動脈瘤の破裂"],
["門脈圧亢進症の合併症を2つあげよ","痔核・食道静脈瘤"],
["生理的な空洞に好中球が溜まった状態を何というか","蓄膿"],
["炎症メディエーターで疼痛を誘発するものは何か","ブラジキニン"],
["血液凝固因子の産生障害を起こす疾患は何か","肝障害"],
["凝固壊死の代表疾患は何か","心筋梗塞"],
["喉頭癌の好発部位はどこか","声帯（声門部）"],
["肉芽組織の構成要素を2つあげよ","線維芽細胞・新生毛細血管"],
["一酸化炭素とヘモグロビンの結合力は酸素の何倍か","200〜400倍"],
["インフルエンザが引き起こす肺炎の種類は何か","出血性肺炎"],
["二次性高血圧で最も多い原因臓器は何か","腎臓"],
["非上皮性の悪性腫瘍の総称は何か","肉腫"],
["膀胱癌の病期分類上の特徴は何か","表在性癌"],
["精上皮腫（セミノーマ）はどちらに分類されるか","良性腫瘍"],
["神経線維腫症の遺伝様式は何か","常染色体顕性遺伝（NF1）"]
];

let deck=[], idx=0, flipped=false, mode='all';
let scores={}, weak=new Set();

function init(){
  scores={};
  weak=new Set();
  buildDeck();
  render();
  updateStats();
}

function buildDeck(){
  let src = mode==='weak' ? ALL.filter((_,i)=>weak.has(i)) : [...ALL];
  if(src.length===0 && mode==='weak'){src=[...ALL];}
  deck=src.map((q,i)=>({q:q[0],a:q[1],orig:ALL.indexOf(q)}));
  idx=0; flipped=false;
}

function shuffle(){
  buildDeck();
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  render(); updateStats();
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{
    b.classList.toggle('active',['all','weak'][i]===m||(i===2&&false));
  });
  buildDeck(); render(); updateStats();
}

function flip(){
  if(deck.length===0)return;
  flipped=!flipped;
  render();
}

function answer(correct){
  const cur=deck[idx];
  if(correct){
    weak.delete(cur.orig);
    scores[cur.orig]='ok';
  } else {
    weak.add(cur.orig);
    scores[cur.orig]='ng';
  }
  flipped=false;
  idx++;
  render();
  updateStats();
}

function nav(d){
  idx=Math.max(0,Math.min(deck.length-1,idx+d));
  flipped=false;
  render();
}

function updateStats(){
  const ok=Object.values(scores).filter(v=>v==='ok').length;
  const ng=weak.size;
  document.getElementById('s-ok').textContent='正解 '+ok;
  document.getElementById('s-ng').textContent='苦手 '+ng;
  document.getElementById('s-total').textContent=(mode==='weak'?'苦手':'全')+deck.length+'問';
  const pct=deck.length?Math.round(idx/deck.length*100):0;
  document.getElementById('prog').style.width=pct+'%';
}

function render(){
  const el=document.getElementById('main');
  if(deck.length===0){
    el.innerHTML='<div class="complete"><h3>苦手問題はありません</h3><p>全問正解済みです！</p><button class="nav-btn" onclick="setMode(\'all\')">全問に戻る</button></div>';
    return;
  }
  if(idx>=deck.length){
    const ok=Object.values(scores).filter(v=>v==='ok').length;
    const ng=weak.size;
    el.innerHTML=`<div class="complete">
      <h3>セット完了！</h3>
      <p>正解 <strong>${ok}</strong> 問 ／ 苦手 <strong>${ng}</strong> 問<br>${ng>0?'苦手モードで繰り返し練習しましょう。':' 全問マスターしました！'}</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="nav-btn" onclick="idx=0;flipped=false;render()">もう一度</button>
        ${ng>0?'<button class="nav-btn" onclick="setMode(\'weak\')">苦手のみ練習</button>':''}
        <button class="nav-btn" onclick="shuffle()">シャッフル</button>
      </div>
    </div>`;
    return;
  }
  const cur=deck[idx];
  const isWeak=weak.has(cur.orig);
  el.innerHTML=`
    <div class="card${flipped?' flipped':''}" onclick="flip()">
      ${isWeak?'<span class="tag">苦手</span>':''}
      <div class="card-label">${flipped?'解答':'問題'} ${idx+1} / ${deck.length}</div>
      <div class="card-text">${flipped?cur.a:cur.q}</div>
      <div class="card-hint">${flipped?'':'タップで答えを表示'}</div>
    </div>
    ${flipped?`
    <div class="btn-row">
      <button class="btn ng" onclick="answer(false)"><i class="ti ti-x" aria-hidden="true"></i> 苦手</button>
      <button class="btn ok" onclick="answer(true)"><i class="ti ti-check" aria-hidden="true"></i> 正解</button>
    </div>`:''}
    <div class="nav-row">
      <button class="nav-btn" onclick="nav(-1)" ${idx===0?'disabled':''} aria-label="前へ"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <span class="counter">${idx+1} / ${deck.length}</span>
      <button class="nav-btn" onclick="nav(1)" ${idx>=deck.length-1?'disabled':''} aria-label="次へ"><i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    </div>`;
  updateStats();
}

init();
</script>
