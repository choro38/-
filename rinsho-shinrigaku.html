<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臨床心理学 テスト問題集 2026｜全50問</title>
<style>
  :root{
    --ink:#1f3044;        /* カルテのインク色 */
    --ink-soft:#4a6076;
    --paper:#f2f5f7;      /* 診察室の白に近いブルーグレー */
    --card:#ffffff;
    --line:#d5dee5;
    --accent:#2a6f77;     /* 深い青緑（落ち着き・集中） */
    --accent-soft:#e2eff0;
    --correct:#1d7a4f;
    --correct-bg:#e7f5ec;
    --wrong:#b3403a;
    --wrong-bg:#faecea;
    --star:#c98a1b;
    --radius:14px;
    font-size:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.75;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px; margin:0 auto; padding:20px 16px 64px;}
  header.app{
    border-bottom:2px solid var(--ink);
    padding:8px 0 14px;
    margin-bottom:20px;
  }
  header.app .kamoku{
    display:inline-block;
    font-size:.72rem; letter-spacing:.18em;
    color:var(--accent);
    border:1px solid var(--accent);
    border-radius:999px;
    padding:1px 10px;
    margin-bottom:6px;
  }
  header.app h1{font-size:1.28rem; font-weight:700;}
  header.app p{font-size:.8rem; color:var(--ink-soft);}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 18px;
    margin-bottom:16px;
    box-shadow:0 1px 3px rgba(31,48,68,.06);
  }
  button{
    font-family:inherit; font-size:1rem;
    cursor:pointer;
    border:none; border-radius:10px;
  }
  button:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
  .btn-primary{
    background:var(--accent); color:#fff;
    padding:13px 22px; font-weight:700; width:100%;
  }
  .btn-primary:disabled{opacity:.4; cursor:not-allowed;}
  .btn-ghost{
    background:transparent; color:var(--accent);
    border:1.5px solid var(--accent);
    padding:11px 20px; font-weight:700; width:100%;
  }
  .mode-btn{
    display:block; width:100%; text-align:left;
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px; margin-bottom:12px;
    transition:border-color .15s, background .15s;
  }
  .mode-btn:hover{border-color:var(--accent); background:var(--accent-soft);}
  .mode-btn .t{font-weight:700; font-size:1.02rem;}
  .mode-btn .d{font-size:.82rem; color:var(--ink-soft);}
  /* 進捗 */
  .status{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:.85rem; color:var(--ink-soft); margin-bottom:6px;
  }
  .status b{color:var(--ink); font-size:1rem;}
  .bar{height:6px; background:var(--line); border-radius:3px; overflow:hidden; margin-bottom:18px;}
  .bar i{display:block; height:100%; background:var(--accent); width:0; transition:width .3s;}
  /* 問題 */
  .qhead{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px;}
  .qno{
    font-weight:700; color:var(--accent);
    border-bottom:2px solid var(--accent);
    padding-bottom:1px;
  }
  .tag{
    font-size:.72rem; font-weight:700;
    padding:2px 9px; border-radius:999px;
  }
  .tag.multi{background:#fdeede; color:#a35b12;}
  .tag.single{background:var(--accent-soft); color:var(--accent);}
  .tag.star{background:#fbf3e0; color:var(--star);}
  .qtext{font-size:1rem; margin-bottom:16px; white-space:pre-line;}
  .choice{
    display:flex; gap:10px; align-items:flex-start;
    width:100%; text-align:left;
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:12px 14px; margin-bottom:10px;
    font-size:.95rem; line-height:1.65;
    transition:border-color .12s, background .12s;
  }
  .choice:hover{border-color:var(--accent);}
  .choice .mk{
    flex:0 0 auto;
    width:26px; height:26px; border-radius:50%;
    border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:.8rem; font-weight:700; color:var(--ink-soft);
    margin-top:1px;
  }
  .choice.sel{border-color:var(--accent); background:var(--accent-soft);}
  .choice.sel .mk{background:var(--accent); border-color:var(--accent); color:#fff;}
  .choice.hit{border-color:var(--correct); background:var(--correct-bg);}
  .choice.hit .mk{background:var(--correct); border-color:var(--correct); color:#fff;}
  .choice.miss{border-color:var(--wrong); background:var(--wrong-bg);}
  .choice.miss .mk{background:var(--wrong); border-color:var(--wrong); color:#fff;}
  .choice:disabled{cursor:default; opacity:1;}
  /* 判定・解説 */
  .verdict{font-size:1.15rem; font-weight:700; margin-bottom:6px;}
  .verdict.ok{color:var(--correct);}
  .verdict.ng{color:var(--wrong);}
  .cheer{font-size:.88rem; color:var(--ink-soft); margin-bottom:12px;}
  .kaisetsu{
    background:#f7f9fa;
    border-left:4px solid var(--accent);
    border-radius:0 10px 10px 0;
    padding:12px 14px;
    font-size:.9rem;
    margin-bottom:16px;
    white-space:pre-line;
  }
  .kaisetsu .h{font-weight:700; color:var(--accent); font-size:.8rem; letter-spacing:.1em; display:block; margin-bottom:4px;}
  /* 結果 */
  .score-big{text-align:center; padding:8px 0 4px;}
  .score-big .num{font-size:3.2rem; font-weight:700; color:var(--accent); line-height:1.1;}
  .score-big .den{font-size:1.1rem; color:var(--ink-soft);}
  .score-msg{text-align:center; font-weight:700; margin:8px 0 18px;}
  .wrong-list{font-size:.85rem; color:var(--ink-soft); margin-bottom:16px;}
  .wrong-list b{color:var(--wrong);}
  .row2{display:flex; flex-direction:column; gap:10px;}
  footer{
    text-align:center; font-size:.72rem; color:var(--ink-soft);
    margin-top:32px; border-top:1px solid var(--line); padding-top:14px;
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="app">
    <span class="kamoku">臨床心理学</span>
    <h1>2026年度 テスト問題集（全50問）</h1>
    <p>試験時間90分・50問中40問出題／★＝国試頻出ポイント</p>
  </header>

  <main id="app"></main>

  <footer>言語聴覚士（ST：Speech-Language-Hearing Therapist）国家試験対策｜さや専用学習アプリ</footer>
</div>

<script>
"use strict";
/* =========================================================
   問題データ
   n   : 問題番号
   pick: 選択する数（表記どおり）
   star: 国試頻出
   c   : 選択肢
   a   : 正答（0始まりのインデックス配列）
   e   : 解説
========================================================= */
const QUESTIONS = [
{n:1, pick:1, star:true,
q:"治療構造論を説明する文として，不適切なものを1つ選択してください。",
c:["Pt.（patient：患者）・Cl.（client：来談者）がその構造から逸脱した際に，彼らの心の動きを深く理解することにつながる",
"精神分析家の小此木啓吾が提唱した概念である",
"面接時間や面接の頻度，料金，場所は治療構造論における「外的構造」にあたる",
"治療者の技法が重要であり，治療の枠組みは重要ではない"],
a:[3],
e:"★治療構造論は小此木啓吾（おこのぎけいご，日本・精神分析家）が提唱。時間・場所・料金などの「枠組み（構造）」そのものが治療的な意味を持ち，枠からの逸脱がCl.の心の動きを理解する手がかりになる。「枠は重要ではない」とする④が不適切。"},

{n:2, pick:1, star:true,
q:"操作的診断基準を学ぶ意義について，不適切なものを1つ選択してください。",
c:["精神科医や他の職種との共通言語として扱うため",
"患者の言動から，診断基準と照合して該当する病理を見立て，具体的な支援に活かすため",
"患者の言動から，診断を下し，患者や他職種に診断名を伝えたりするため",
"患者やその家族に医療・福祉・教育制度に接続する根拠を提示できるため"],
a:[2],
e:"★「診断」を下せるのは医師のみ（医師法）。ST（言語聴覚士）や心理職ができるのは「見立て（アセスメント）」であり，診断名を確定して伝えることはできない。よって③が不適切。DSM-5（米国精神医学会の操作的診断基準）等は多職種の共通言語として学ぶ。"},

{n:3, pick:1, star:true,
q:"統合失調症が疑われる症状として不適切なものを1つ選択してください。",
c:["周囲の者みんなが自分のことを敵視していると思う",
"通りすがりの人全員が自分の考えを読み取っていると思う",
"常同姿勢（同じ姿勢を取り続ける）がみられる",
"他者に「理想化」と「こきおろし」の動きを見せやすい"],
a:[3],
e:"★①は被害妄想，②は考想察知（思考が読まれる体験），③は緊張病症状で，いずれも統合失調症を疑う症状。④「理想化とこきおろし」は境界性パーソナリティ症（BPD：Borderline Personality Disorder）に特徴的な対人パターンで，統合失調症の症状ではない。"},

{n:4, pick:1, star:true,
q:"自閉スペクトラム症に関する記述として不適切なものを1つ選択してください。",
c:["診断は，心理検査，本人・養育者からの詳細な聴取等，多角的アプローチで実施される。",
"心的外傷体験（虐待など）によって，自閉スペクトラム症様症状がみられることがある。",
"子どもの症状は，親の愛情不足などの「不適切な養育」が要因である。",
"特性は，連続体（スペクトラム）として捉えられる。"],
a:[2],
e:"★自閉スペクトラム症（ASD：Autism Spectrum Disorder）は先天的な脳機能の特性が要因であり，「親の愛情不足」説（かつての「冷蔵庫マザー説」）は明確に否定されている。③が不適切。なお②のように，虐待等によりASD様の症状（愛着障害）がみられることは実際にあり，鑑別が重要。"},

{n:5, pick:1, star:true,
q:"防衛機制とその説明の対応として，不適切なものを1つ選択してください。",
c:["「昇華」：欲求を社会的な規範やルールに合致させ，芸術・勉強・スポーツなどの社会文化的活動で欲求を満たす。",
"「抑圧」：受け入れがたい感情・記憶・現実を無意識に閉じ込める。",
"「知性化」：本当の願望や欲動とは逆のことをする。",
"「投影性同一視」：認めがたい欲求・感情を相手のものとみなし，さらに，相手をそのような人としてコントロール（操作）する。"],
a:[2],
e:"★「本当の願望と逆のことをする」のは反動形成（例：嫌いな相手に過剰に親切にする）。知性化は，感情を切り離して理屈・知識で処理する防衛（例：病気の不安を医学用語で語り続ける）。③の説明が誤り。"},

{n:6, pick:3, star:false,
q:"病態水準に関する記述として，適切な記述を全て選択してください。（3つ）",
c:["病態水準のアセスメントに有用な心理検査の一つは「ロールシャッハ・テスト」である。",
"精神病水準のPt.・Cl.は，著しい現実検討力の弱さ，同一性の拡散，原始的防衛機制の多用が特徴である。",
"Pt.・Cl.の病態水準の違いは，支援者が治療構造（時間・場所等）を決定する指針となる。",
"分裂や投影性同一視は，適応能力の高い神経症水準でよくみられる高次の防衛機制である。"],
a:[0,1,2],
e:"病態水準は「神経症水準＞境界水準＞精神病水準」の順に現実検討力が低下する。分裂（スプリッティング）や投影性同一視は境界水準以下で多用される原始的（未熟な）防衛機制であり，「神経症水準の高次の防衛」とする④は誤り。神経症水準の高次の防衛は抑圧・昇華など。"},

{n:7, pick:1, star:true,
q:"エリクソンのライフサイクル論において，発達段階と発達課題の対応として，不適切なものを1つ選択してください。",
c:["「乳児期」：「基本的信頼感」",
"「幼児期前期」：「自律性」",
"「中年期」：「同一性（アイデンティティ）」",
"「老年期」：「統合」"],
a:[2],
e:"★Erikson（エリクソン，米・発達心理学者）の心理社会的発達理論では，同一性（アイデンティティ）確立は青年期（およそ12〜20歳代前半）の課題。中年期（成人期，およそ40〜65歳）の課題は「世代性（generativity）対 停滞」。国試最頻出の対応表なので8段階すべて覚えましょう。"},

{n:8, pick:2, star:true,
q:"自分の信念や職業選択に対して傾倒（積極的関与）を示すアイデンティティ地位はどれか。2つ選んでください。",
c:["モラトリアム","アイデンティティ達成","アイデンティティ危機","早期完了","アイデンティティ拡散"],
a:[1,3],
e:"★Marcia（マーシア，カナダ出身・米で活躍した心理学者）のアイデンティティ・ステイタス論。「危機（探索）」と「傾倒（積極的関与）」の2軸で分類する。傾倒あり＝②達成（危機あり）と④早期完了（危機なし・親の価値観をそのまま採用）。モラトリアムは危機の最中で傾倒はあいまい，拡散は両方なし。"},

{n:9, pick:1, star:true,
q:"アタッチメント理論について適切な記述を1つ選択してください。",
c:["アタッチメントは，早期の養育者である母親とのみ形成される。",
"アタッチメントは，後天的なシステムではなく，個体に備わった適応のための生物学的システムである。",
"親子のアタッチメント関係を明らかにする実験的手法「ストレンジ・シチュエーション法」を開発した者は，ボウルビィである。",
"乳幼児期に最も多いアタッチメント・タイプは「回避型（Aタイプ）」である。"],
a:[1],
e:"★Bowlby（ボウルビィ，英・児童精神科医）は，アタッチメントを生存のために生得的に備わった生物学的システムと考えた（②が正しい）。①母親に限らず父親・保育者等とも形成される（保育士経験と直結！）。③ストレンジ・シチュエーション法（SSP）の開発はAinsworth（エインズワース，米・発達心理学者）。④最も多いのは安定型（Bタイプ）。"},

{n:10, pick:1, star:false,
q:"心理面接におけるアセスメントについて正しいのはどれか。1つ選択してください。",
c:["受理面接の時点から行われる",
"情報源となる人物は限定される",
"投影法と質問紙法は同時に行う",
"子どもと高齢者の行動観察は行わない"],
a:[0],
e:"アセスメントはインテーク面接（受理面接）の時点から始まる（①が正しい）。情報源は本人・家族・他職種など幅広く，検査は目的に応じてテストバッテリー（複数検査の組み合わせ）を組むが「必ず同時」ではない。行動観察はむしろ言語表出が難しい子どもや高齢者で重要。"},

{n:11, pick:2, star:true,
q:"抑うつのアセスメント法はどれか。2つ選択してください。",
c:["HTP","MPI","BDI","SDS","SCT"],
a:[2,3],
e:"★BDI（Beck Depression Inventory：ベック抑うつ質問票）とSDS（Self-rating Depression Scale：自己評価式抑うつ性尺度）が抑うつの評価尺度。HTP（House-Tree-Person test：家・木・人描画テスト）は投影法の描画検査，MPI（Maudsley Personality Inventory：モーズレイ性格検査）は性格の質問紙，SCT（Sentence Completion Test：文章完成法）は投影法。"},

{n:12, pick:1, star:false,
q:"誤っている組み合わせはどれか。1つ選択してください。",
c:["エゴグラム ― 交流分析",
"EPPS ― マレーの人格理論",
"BDI ― 痴呆症状",
"Y-G性格検査 ― 類型判定",
"MMPI ― 妥当性尺度"],
a:[2],
e:"BDI（Beck Depression Inventory）は抑うつの質問紙であり，認知症（痴呆）症状の検査ではない（③が誤り）。認知症スクリーニングはMMSE（Mini-Mental State Examination）やHDS-R（改訂長谷川式簡易知能評価スケール）。EPPS（Edwards Personal Preference Schedule）はMurray（マレー，米・心理学者）の欲求理論に基づく。"},

{n:13, pick:1, star:true,
q:"性格特性の5因子モデルの因子でないものはどれか，1つ選択してください。",
c:["楽観性","開放性","誠実性（勤勉性）","協調性","神経症傾向"],
a:[0],
e:"★ビッグファイブ（5因子モデル）は，開放性（Openness）・誠実性（Conscientiousness）・外向性（Extraversion）・協調性（Agreeableness）・神経症傾向（Neuroticism）＝頭文字OCEAN。「楽観性」は含まれない。"},

{n:14, pick:2, star:false,
q:"質問紙法の特徴と対応する記述として適切なものを2つ選択してください。",
c:["曖昧な刺激を受験者に提示するため，受験者の回答が歪められにくい。",
"集団の実施が可能であり，短時間で実施できる。",
"特性論に基づいたパーソナリティ検査である。",
"無意識レベルのパーソナリティをアセスメントできる。"],
a:[1,2],
e:"質問紙法の長所は，集団実施可能・短時間・採点が客観的なこと。多くは特性論（性格を複数の特性の量で捉える立場）に基づく。①「曖昧な刺激」と④「無意識レベル」は投影法の特徴。質問紙法はむしろ意図的に回答を歪めやすい（社会的望ましさ）のが短所。"},

{n:15, pick:1, star:false,
q:"精神分析学に関する記述として適切な記述を1つ選択してください。",
c:["精神分析は，ユングが提唱した心理療法の学問である。",
"人の行動の背景には，意識のみがあることを仮定した理論である。",
"ヒステリー患者の治療に自由連想法が適さず，催眠療法が生みだされた。",
"人間の心を「意識」「前意識」「無意識」の3つに分類している。"],
a:[3],
e:"精神分析の創始者はFreud, S.（フロイト，オーストリア・精神科医）。心を意識・前意識・無意識に分ける「局所論」が④で正しい。①Jung（ユング，スイス・精神科医）は分析心理学。②無意識を重視する理論。③順序が逆：催眠療法の限界から自由連想法が生み出された。"},

{n:16, pick:3, star:true,
q:"Freud, S.が3つに分けた心の領域（構造論）はどれか。3つ選んでください。",
c:["エス","自我","エルグ","超自我","リビドー"],
a:[0,1,3],

/* ========================= アプリ本体 ========================= */
const CHEERS_OK = [
  "ナイス！首席への確かな一歩です✨",
  "完璧！この調子でいきましょう🔥",
  "すばらしい！知識が定着していますね💮",
  "正解！保育現場の経験も活きてます👏",
  "その通り！国試本番でも取れる一問です🌟"
];
const CHEERS_NG = [
  "大丈夫，間違えた問題こそ伸びしろ！解説を読めばもう忘れません💪",
  "惜しい！今ここで間違えておけば本番は完璧です🌱",
  "ドンマイ！解説でしっかり回収していきましょう📖",
  "ここが今日の収穫ポイント！復習モードでもう一度会いましょう🔁"
];
const MARU = ["①","②","③","④","⑤"];

let pool = [];       // 出題順の問題配列
let idx = 0;         // 現在の問題
let selected = new Set();
let answered = false;
let correctCount = 0;
let wrongNos = [];   // 間違えた問題番号
let modeName = "";

const app = document.getElementById("app");

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startScreen(){
  const starCount = QUESTIONS.filter(q => q.star).length;
  app.innerHTML = `
    <div class="card">
      <p style="font-size:.9rem; margin-bottom:14px;">さやさん，今日もお疲れさまです！モードを選んでスタートしましょう🌱</p>
      <button class="mode-btn" data-mode="all">
        <span class="t">📘 全50問（順番どおり）</span><br>
        <span class="d">問題集の順で全問演習。まずはここから！</span>
      </button>
      <button class="mode-btn" data-mode="exam">
        <span class="t">📝 本番モード（ランダム40問）</span><br>
        <span class="d">実際の試験と同じ「50問中40問」をランダム出題</span>
      </button>
      <button class="mode-btn" data-mode="star">
        <span class="t">★ 国試頻出のみ（${starCount}問）</span><br>
        <span class="d">★マークの頻出ポイントだけを集中演習</span>
      </button>
    </div>`;
  app.querySelectorAll(".mode-btn").forEach(b => {
    b.addEventListener("click", () => startQuiz(b.dataset.mode));
  });
}

function startQuiz(mode){
  if(mode === "all"){ pool = QUESTIONS.slice(); modeName = "全50問"; }
  else if(mode === "exam"){ pool = shuffle(QUESTIONS).slice(0, 40); modeName = "本番モード（40問）"; }
  else if(mode === "star"){ pool = QUESTIONS.filter(q => q.star); modeName = "国試頻出★"; }
  else if(mode === "review"){ pool = QUESTIONS.filter(q => wrongNos.includes(q.n)); modeName = "復習モード"; }
  idx = 0; correctCount = 0;
  if(mode !== "review") wrongNos = [];
  else wrongNos = [];
  renderQuestion();
}

function renderQuestion(){
  const q = pool[idx];
  selected = new Set();
  answered = false;
  const pickLabel = q.pick === 1 ? "1つ選択" : `${q.pick}つ選択`;
  app.innerHTML = `
    <div class="status"><span>${modeName}</span><span><b>${idx + 1}</b> / ${pool.length}問</span></div>
    <div class="bar"><i style="width:${(idx / pool.length) * 100}%"></i></div>
    <div class="card">
      <div class="qhead">
        <span class="qno">問題 ${q.n}</span>
        <span class="tag ${q.pick === 1 ? "single" : "multi"}">${pickLabel}</span>
        ${q.star ? '<span class="tag star">★国試頻出</span>' : ""}
      </div>
      <p class="qtext">${q.q}</p>
      <div id="choices"></div>
      <div id="feedback"></div>
      <button class="btn-primary" id="mainBtn" disabled>解答する</button>
    </div>`;

  const box = document.getElementById("choices");
  q.c.forEach((text, i) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = `<span class="mk">${MARU[i]}</span><span>${text}</span>`;
    b.addEventListener("click", () => toggleChoice(i, b));
    box.appendChild(b);
  });

  document.getElementById("mainBtn").addEventListener("click", onMainButton);
}

function toggleChoice(i, btn){
  if(answered) return;
  const q = pool[idx];
  if(selected.has(i)){
    selected.delete(i);
    btn.classList.remove("sel");
  } else {
    if(q.pick === 1){
      selected.clear();
      document.querySelectorAll(".choice").forEach(c => c.classList.remove("sel"));
    }
    if(selected.size < q.pick){
      selected.add(i);
      btn.classList.add("sel");
    }
  }
  document.getElementById("mainBtn").disabled = (selected.size !== q.pick);
}

function onMainButton(){
  if(!answered){ grade(); }
  else { next(); }
}

function grade(){
  answered = true;
  const q = pool[idx];
  const ansSet = new Set(q.a);
  const isCorrect = selected.size === ansSet.size && [...selected].every(i => ansSet.has(i));
  if(isCorrect) correctCount++;
  else wrongNos.push(q.n);

  const choices = document.querySelectorAll(".choice");
  choices.forEach((c, i) => {
    c.disabled = true;
    if(ansSet.has(i)) c.classList.add("hit");
    else if(selected.has(i)) c.classList.add("miss");
    c.classList.remove("sel");
  });

  const cheer = isCorrect
    ? CHEERS_OK[Math.floor(Math.random() * CHEERS_OK.length)]
    : CHEERS_NG[Math.floor(Math.random() * CHEERS_NG.length)];
  const ansText = q.a.map(i => MARU[i]).join("・");

  document.getElementById("feedback").innerHTML = `
    <p class="verdict ${isCorrect ? "ok" : "ng"}">${isCorrect ? "正解！" : "不正解"}　正答：${ansText}</p>
    <p class="cheer">${cheer}</p>
    <div class="kaisetsu"><span class="h">解説</span>${q.e}</div>`;

  const btn = document.getElementById("mainBtn");
  btn.textContent = (idx + 1 < pool.length) ? "次の問題へ" : "結果を見る";
  btn.disabled = false;
  btn.focus();
}

function next(){
  if(idx + 1 < pool.length){
    idx++;
    renderQuestion();
    window.scrollTo({top: 0});
  } else {
    resultScreen();
  }
}

function resultScreen(){
  const total = pool.length;
  const rate = Math.round((correctCount / total) * 100);
  let msg;
  if(rate === 100) msg = "満点！！首席が見えています！！🏆✨";
  else if(rate >= 80) msg = "合格ライン余裕クリア！この調子です🌸";
  else if(rate >= 60) msg = "合格ライン到達！間違えた問題を復習して盤石に💪";
  else msg = "今日の間違いは本番の得点源！復習モードで巻き返しましょう🔥";

  const wrongHtml = wrongNos.length
    ? `<p class="wrong-list">間違えた問題：<b>${wrongNos.map(n => "問" + n).join("，")}</b></p>`
    : `<p class="wrong-list">全問正解！復習の必要なし！🎉</p>`;

  app.innerHTML = `
    <div class="card">
      <div class="score-big">
        <span class="num">${correctCount}</span><span class="den"> / ${total}問正解（${rate}%）</span>
      </div>
      <p class="score-msg">${msg}</p>
      ${wrongHtml}
      <div class="row2">
        ${wrongNos.length ? '<button class="btn-primary" id="reviewBtn">🔁 間違えた問題だけ復習する</button>' : ""}
        <button class="btn-ghost" id="homeBtn">モード選択にもどる</button>
      </div>
    </div>`;

  const rv = document.getElementById("reviewBtn");
  if(rv) rv.addEventListener("click", () => startQuiz("review"));
  document.getElementById("homeBtn").addEventListener("click", startScreen);
  window.scrollTo({top: 0});
}

startScreen();
</script>
</body>
</html>
