<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>言語発達学 クイズ道場</title>
<style>
  :root{
    --paper:#F5F3EC; --card:#FFFFFF; --ink:#26303F; --ink-soft:#5A6675;
    --line:#E4E0D5; --accent:#E88A5A; --marker:#F4CE5B; --marker-soft:#FBEEC2;
    --correct:#3E9C72; --correct-bg:#E8F5EE; --wrong:#D46A63; --wrong-bg:#FBEBE9;
    --tag:#5B8AA6; --tag-bg:#EAF1F6; --shadow:0 4px 20px rgba(38,48,63,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",-apple-system,"Segoe UI",Meiryo,sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.7;
    -webkit-font-smoothing:antialiased; padding:16px; min-height:100vh;
  }
  .wrap{max-width:620px;margin:0 auto}
  .brand{text-align:center;padding:18px 0 6px}
  .brand h1{font-size:1.5rem;letter-spacing:.04em;font-weight:800}
  .brand h1 .accent{color:var(--accent)}
  .brand p{color:var(--ink-soft);font-size:.82rem;margin-top:2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:22px;margin-top:16px}
  .screen{display:none} .screen.active{display:block}

  /* start */
  h2.sec{font-size:.78rem;letter-spacing:.12em;color:var(--ink-soft);font-weight:700;text-transform:none;margin-bottom:10px}
  .modes{display:grid;gap:10px}
  .mode-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);
    border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;font-size:1rem;
    color:var(--ink);transition:.15s;font-family:inherit}
  .mode-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .mode-btn .big{font-size:1.5rem;line-height:1}
  .mode-btn .sub{display:block;font-size:.76rem;color:var(--ink-soft);margin-top:1px}
  .mode-btn strong{font-weight:700}
  .cat-list{margin-top:8px;display:grid;gap:7px}
  .cat-btn{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--card);
    border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;cursor:pointer;font-size:.9rem;
    color:var(--ink);transition:.15s;font-family:inherit;text-align:left}
  .cat-btn:hover{border-color:var(--tag);background:var(--tag-bg)}
  .cat-btn .n{font-size:.74rem;color:var(--ink-soft);background:var(--paper);border-radius:20px;padding:2px 9px;white-space:nowrap}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0 12px;color:var(--ink-soft);font-size:.74rem;letter-spacing:.1em}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}

  /* quiz */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
  .counter{font-size:.82rem;color:var(--ink-soft);font-weight:600;white-space:nowrap}
  .counter b{color:var(--ink);font-size:1rem}
  .quit{background:none;border:none;color:var(--ink-soft);font-size:.8rem;cursor:pointer;text-decoration:underline;font-family:inherit}
  .bar{height:7px;background:var(--line);border-radius:20px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--marker),var(--accent));width:0;transition:width .35s ease}
  .tag{display:inline-block;font-size:.7rem;font-weight:700;color:var(--tag);background:var(--tag-bg);
    border-radius:20px;padding:3px 11px;margin-bottom:12px}
  .star-tag{background:var(--marker-soft);color:#9A7A1E;margin-left:6px}
  .qtext{font-size:1.12rem;font-weight:700;line-height:1.6;margin-bottom:18px}
  .qtext em{font-style:normal;background:linear-gradient(transparent 55%,var(--marker) 55%);padding:0 2px;font-weight:800}
  .opts{display:grid;gap:9px}
  .opt{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;background:var(--card);
    border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;cursor:pointer;font-size:.98rem;
    color:var(--ink);transition:.13s;font-family:inherit;line-height:1.5}
  .opt:hover:not(:disabled){border-color:var(--accent);background:#FFF9F4}
  .opt:disabled{cursor:default}
  .opt .num{flex-shrink:0;width:25px;height:25px;border-radius:50%;background:var(--paper);color:var(--ink-soft);
    display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;border:1px solid var(--line)}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt.correct .num{background:var(--correct);color:#fff;border-color:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
  .opt.wrong .num{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .opt .mk{margin-left:auto;font-weight:800;font-size:1rem;align-self:center}
  .opt.correct .mk{color:var(--correct)} .opt.wrong .mk{color:var(--wrong)}
  .explain{margin-top:16px;border-radius:13px;padding:15px 16px;font-size:.9rem;line-height:1.7;display:none}
  .explain.show{display:block}
  .explain.ok{background:var(--correct-bg);border:1px solid #BFE3D0}
  .explain.ng{background:var(--wrong-bg);border:1px solid #F0CFCB}
  .explain .head{font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:7px}
  .explain.ok .head{color:var(--correct)} .explain.ng .head{color:var(--wrong)}
  .explain b{background:linear-gradient(transparent 55%,var(--marker) 55%);padding:0 1px}
  .next{margin-top:16px;width:100%;background:var(--ink);color:#fff;border:none;border-radius:13px;
    padding:15px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;display:none}
  .next.show{display:block} .next:hover{background:#141c28}

  /* result */
  .score-ring{text-align:center;padding:8px 0 4px}
  .score-ring .pct{font-size:3.4rem;font-weight:800;line-height:1;color:var(--accent)}
  .score-ring .frac{color:var(--ink-soft);font-size:.95rem;margin-top:4px}
  .msg{text-align:center;font-size:1rem;font-weight:700;margin:14px 0 4px}
  .breakdown{margin-top:18px;display:grid;gap:8px}
  .brow{display:flex;align-items:center;gap:10px;font-size:.84rem}
  .brow .lbl{flex:1;min-width:0}
  .brow .mini{width:90px;height:6px;background:var(--line);border-radius:20px;overflow:hidden;flex-shrink:0}
  .brow .mini i{display:block;height:100%;background:var(--correct)}
  .brow .sc{width:40px;text-align:right;color:var(--ink-soft);flex-shrink:0;font-variant-numeric:tabular-nums}
  .actions{display:grid;gap:10px;margin-top:22px}
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:13px;padding:15px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);border-radius:13px;padding:14px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-ghost:disabled{opacity:.4;cursor:not-allowed}
  .foot{text-align:center;color:var(--ink-soft);font-size:.72rem;padding:22px 0 8px;line-height:1.6}
  .kbd{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:5px;padding:0 6px;font-size:.72rem;margin:0 1px}
  @media(max-width:400px){.brand h1{font-size:1.3rem}.qtext{font-size:1.04rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>言語発達学 <span class="accent">クイズ道場</span></h1>
    <p>全100問・国試5択形式　★は頻出ポイント</p>
  </div>

  <!-- START -->
  <div id="start" class="screen active">
    <div class="card">
      <h2 class="sec">出題メニューを選ぶ</h2>
      <div class="modes">
        <button class="mode-btn" onclick="startQuiz('all')">
          <span class="big">📚</span>
          <span><strong>全100問チャレンジ</strong><span class="sub">全範囲を通しで。実力チェックに</span></span>
        </button>
        <button class="mode-btn" onclick="startQuiz('random10')">
          <span class="big">⚡</span>
          <span><strong>ランダム10問</strong><span class="sub">スキマ時間にサクッと</span></span>
        </button>
        <button class="mode-btn" onclick="startQuiz('random20')">
          <span class="big">🎯</span>
          <span><strong>ランダム20問</strong><span class="sub">まとまった演習に</span></span>
        </button>
        <button class="mode-btn" onclick="startQuiz('star')">
          <span class="big">⭐</span>
          <span><strong>★頻出のみ（<span id="starCount"></span>問）</strong><span class="sub">直前対策・弱点つぶしに</span></span>
        </button>
      </div>
      <div class="divider">分野別で解く</div>
      <div class="cat-list" id="catList"></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div class="card">
      <div class="topbar">
        <span class="counter"><b id="cur">1</b> / <span id="tot">10</span>　<span id="live" style="color:var(--correct)"></span></span>
        <button class="quit" onclick="confirmQuit()">中断</button>
      </div>
      <div class="bar"><i id="prog"></i></div>
      <div id="tags"></div>
      <div class="qtext" id="qtext"></div>
      <div class="opts" id="opts"></div>
      <div class="explain" id="explain"></div>
      <button class="next" id="nextBtn" onclick="nextQ()">次の問題へ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen">
    <div class="card">
      <div class="score-ring">
        <div class="pct" id="pct">0%</div>
        <div class="frac" id="frac">0 / 0 問正解</div>
      </div>
      <div class="msg" id="msg"></div>
      <div class="breakdown" id="breakdown"></div>
      <div class="actions">
        <button class="btn-ghost" id="reviewBtn" onclick="startReview()">間違えた問題だけ復習する</button>
        <button class="btn-primary" onclick="goStart()">メニューに戻る</button>
      </div>
    </div>
  </div>

  <div class="foot">
    PC操作：数字キー <span class="kbd">1</span>–<span class="kbd">5</span> で解答、<span class="kbd">Enter</span> で次へ<br>
    さや先生の主席合格を応援しています 💪
  </div>
</div>

伝と環境）", "star": true, "q": "「遺伝と環境は加算的に発達を規定し、相関しない」とする輻輳説を提唱した人物はどれか。", "options": ["シュテルン（Stern, W.）", "ルクセンブルガー（Luxenburger, H.）", "ジェンセン（Jensen, A. R.）", "ゲゼル（Gesell, A. L.）", "ワトソン（Watson, J. B.）"], "answer": 0, "explanation": "シュテルンの輻輳説（遺伝＋環境、加算的・相関しない）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 32, "category": "第4回　発達論（遺伝と環境）", "star": true, "q": "「環境の質がある水準（閾値）を超えると遺伝的な可能性が開花する」とする環境閾値説を唱えた人物はどれか。", "options": ["シュテルン（Stern, W.）", "ジェンセン（Jensen, A. R.）", "ルクセンブルガー（Luxenburger, H.）", "ロック（Locke, J.）", "ゲゼル（Gesell, A. L.）"], "answer": 1, "explanation": "ジェンセンの環境閾値説（環境が閾値を超えると遺伝が開花）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 33, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "遺伝と環境が「相互に働く（遺伝×環境）」とする立場はどれか。", "options": ["遺伝論", "環境論", "輻輳説", "相互作用説", "成熟優位説"], "answer": 3, "explanation": "相互作用説（遺伝×環境）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 34, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "「氏より育ち」という言葉が対応する立場はどれか。", "options": ["遺伝論", "環境論", "輻輳説", "相互作用説", "成熟優位説"], "answer": 1, "explanation": "「氏より育ち」＝環境論。「蛙の子は蛙」＝遺伝論。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 35, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "環境の重要性を示す事例として挙げられるものはどれか。", "options": ["いないいないばあ遊び", "アヴェロンの野生児", "視覚的断崖の実験", "マザリーズ", "三項関係の成立"], "answer": 1, "explanation": "アヴェロンの野生児、狼に育てられた子、カスパー・ハウザーは環境の重要性を示す事例。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 36, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "発達の3領域の説明として**誤っている**ものはどれか。", "options": ["身体的発達には運動スキルが含まれる", "認知発達には学習・記憶・思考が含まれる", "心理社会的発達には人格・情動・社会的関係が含まれる", "認知発達には感覚能力の成熟のみが含まれる", "これらの領域は相互に関連しながら発達する"], "answer": 3, "explanation": "認知発達＝学習・記憶・思考・推論・創造性など。「感覚能力の成熟のみ」は誤り（感覚・運動は身体的発達側）。", "catShort": "発達論（遺伝と環境）", "catOrder": 2}, {"id": 37, "category": "第4回　発達論（遺伝と環境）", "star": false, "q": "ルソー（Rousseau, J. J.）の「生得説」に最も近い考え方はどれか。", "options": ["知識の源泉は経験である", "発達を最も決定づけるのは受け継がれた天性である", "発達は人間が統制できる", "環境が閾値を超えると遺伝が開花する", "遺伝と環境は加算的に働く"], "answer": 1, "explanation": "ルソーの生得説 相当するものはどれか。", "options": ["先行事象", "後続事象（強化）", "弁別刺激", "レディネス", "シェマ"], "answer": 1, "explanation": "三者関係の「結果」＝後続事象（強化）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 44, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "チョムスキー（Chomsky, N., 米・言語学者）が提唱した、生得的に備わる言語獲得の仕組みはどれか。", "options": ["LASS（Language Acquisition Support System）", "LAD（Language Acquisition Device：言語獲得装置）＝普遍文法", "ZPD（Zone of Proximal Development）", "MLU（Mean Length of Utterance）", "オペラント条件づけ"], "answer": 1, "explanation": "チョムスキー＝LAD（言語獲得装置）＝普遍文法が生得的に備わる。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 45, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "生成文法理論において、個別言語の多様性に対応するための「スイッチのようなもの」を何と呼ぶか。", "options": ["シェマ", "パラメーター", "モジュール", "フォーマット", "レディネス"], "answer": 1, "explanation": "パラメーター＝個別言語の多様性に対応するスイッチ。入力によって設定され個別文法が決まる。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 46, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "「刺激の貧困」という問題に対する生得論の主張として最も適切なものはどれか。", "options": ["入力される言語は常に完全で豊かである", "貧困な入力でも生得的な普遍文法があれば複雑な文法を獲得できる", "言語は環境からの強化のみで獲得される", "言語発達には認知発達が先行条件として必要である", "言語は社会的相互作用の副産物である"], "answer": 1, "explanation": "刺激の貧困＝貧困な入力でも生得的普遍文法があれば複雑な文法を獲得できる、というのが生得論の主張。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 47, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "認知論（ピアジェ理論に基づく立場）の基本的な主張はどれか。", "options": ["言語は強化された行動である", "言語の発達は認知発達によって支えられ準備されている", "言語は生得的な文法によって獲得される", "言語は社会的相互作用の副産物である", "言語獲得には母親のLASSが不可欠である"], "answer": 1, "explanation": "認知論＝言語の発達は認知発達に支えられ準備されている（ピアジェ理論が基盤）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 48, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "ピアジェ（Piaget, J., スイス・心理学者）の概念で、「既存の枠組みを変えずに新しい経験を取り込むこと」はどれか。", "options": ["調節（調整）", "同化", "シェマ", "循環反応", "対象の永続性"], "answer": 1, "explanation": "同化＝既存のシェマを変えずに新しい経験を取り込む（例：犬を見て「にゃんにゃん！」）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 49, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "「新しい事柄に適応するためにシェマ自体を変えること」を何というか。", "options": ["同化", "調節（調整）", "循環反応", "内面化", "保存"], "answer": 1, "explanation": "調節（調整）＝新しい事柄に適応するためシェマ自体を変える（「わんわん」と修正）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 50, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "ピアジェの感覚運動期において「対象の永続性の概念」を獲得するのはどの段階（月齢）か。", "options": ["第1段階（0〜1か月）", "第2段階（1〜4か月）", "第3段階（4〜8か月）", "第4段階（8〜12か月）", "第6段階（18〜24か月）"], "answer": 3, "explanation": "対象の永続性は第4段階（8〜12か月）で獲得（現在は生後5か月半頃から一部認識との研究もあり）。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 51, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "ピアジェの感覚運動期・第6段階（18〜24か月）の特徴として最も適切なものはどれか。", "options": ["反射的行動", "第1次循環反応", "シェマの内面化（心の中で試してから行動し、試行錯誤しない）", "対象の永続性の獲得", "目的に合わせた手段を使う"], "answer": 2, "explanation": "第6段階（18〜24か月）＝シェマの内面化、心の中で試してから行動し試行錯誤しない。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 52, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "第1次循環反応（1〜4か月）の例として最も適切なものはどれか。", "options": ["おもちゃを投げて跳ね返りを見る", "指しゃぶりや同じ声を繰り返す", "対象の永続性を利用する", "心の中で試してから行動する", "目的と手段を組み合わせる"], "answer": 1, "explanation": "第1次循環反応（1〜4か月）＝自分の身体に限った感覚運動の繰り返し（指しゃぶり・同じ声）。1は第2次循環反応。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 53, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "「対象の永続性」を利用した遊びとして最も適切なものはどれか。", "options": ["いないいないばあ遊び", "しりとり", "ままごと", "積み木", "お絵かき"], "answer": 0, "explanation": "いないいないばあ遊び＝対象の永続性（見えなくても存在し続ける）を利用。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 54, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "「言語・思考・記憶の発達は社会的相互作用の中で促される」とし、発達の最近接領域（ZPD: Zone of Proximal Development）を提唱した人物はどれか。", "options": ["ピアジェ（Piaget, J.）", "ヴィゴツキー（Vygotsky, L., 旧ソ連・心理学者）", "ブルーナー（Bruner, J., 米・心理学者）", "チョムスキー（Chomsky, N.）", "スキナー（Skinner, B. F.）"], "answer": 1, "explanation": "ヴィゴツキー＝発達の最近接領域（ZPD）を提唱。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 55, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "発達の最近接領域（ZPD）の説明として最も適切なものはどれか。", "options": ["自分ひとりで解決できる水準", "他者の援助があればできる水準（現在の発達水準と潜在的水準の間）", "まだ全く到達できない水準", "成人と同等になった水準", "生得的に決まっている水準"], "answer": 1, "explanation": "ZPD＝自力で解決できる水準と、他者の援助があればできる水準の間の領域。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 56, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": true, "q": "ブルーナー（Bruner, J.）が提唱した、母親が子どもの言語発達を支えるサポートシステムはどれか。", "options": ["LAD（言語獲得装置）", "LASS（Language Acquisition Support System：言語獲得支援システム）", "ZPD（発達の最近接領域）", "普遍文法", "モジュール"], "answer": 1, "explanation": "ブルーナー＝LASS（言語獲得支援システム）。母親が言語獲得の足場となる場を作る。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 57, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "「足場かけ（スキャフォールディング）」の具体例として最も適切なものはどれか。", "options": ["子どもが自分ひとりでしりとりを完成させる", "語尾音を抽出できない年少児に、常に語尾音を教えながらしりとりに誘う", "オペラント条件づけで発話を強化する", "普遍文法のパラメーターを設定する", "対象の永続性を獲得させる"], "answer": 1, "explanation": "足場かけ＝語尾音抽出が難しい年少児に語尾音を常に教えながらしりとりに誘うなど、能力に合わせた援助。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 58, "category": "第5・6回　言語発達理論（学習論・生得論・認知論・社会認知論）", "star": false, "q": "ヴィゴツキーの考えを受け継ぎ、言語発達理論へと発展させた人物はどれか。", "options": ["ピアジェ（Piaget, J.）", "チョムスキー（Chomsky, N.）", "ブルーナー（Bruner, J.）", "スキナー（Skinner, B. F.）", "ゲゼル（Gesell, A. L.）"], "answer": 2, "explanation": "ブルーナーがヴィゴツキーの考えを受け継ぎ言語発達理論へ発展させた。", "catShort": "言語発達理論（学習論・生得論・認知論・社会認知論）", "catOrder": 3}, {"id": 59, "category": "第7回　新生児期・前言語期のコミュニケーション", "star": true, "q": "マザリーズ（対乳児発話）の特徴として**誤っている**ものはどれか。", "options": ["ゆっくりしたテンポ", "高いピッチ", "誇張したイントネーション", "抽象的・複雑な内容を多く述べる", "少数の語や節を繰り返す"], "answer": 3, "explanation": "マザリーズは意味的制約により**具体的**なことを述べる。抽象的・複雑（4）は誤り。他にゆっくり・高ピッチ・誇張したイントネーション・反復が特徴。", "catShort": "新生児期・前言語期のコミュニケーション", "catOrder": 4}, {"id": 60, "category": "第7回　新生児期・前言語期のコミュニケーション", "star": false, "q": "前言語期の「原会 document.getElementById('starCount').textContent = ALL.filter(q=>q.star).length;

// build category list
const cats=[];
ALL.forEach(q=>{ if(!cats.find(c=>c.name===q.catShort)) cats.push({name:q.catShort,order:q.catOrder}); });
cats.sort((a,b)=>a.order-b.order);
const catList=document.getElementById('catList');
cats.forEach(c=>{
  const n=ALL.filter(q=>q.catShort===c.name).length;
  const b=document.createElement('button');
  b.className='cat-btn';
  b.innerHTML=`<span class="lbl">${c.name}</span><span class="n">${n}問</span>`;
  b.onclick=()=>startQuiz('cat',c.name);
  catList.appendChild(b);
});

let queue=[], idx=0, correct=0, answered=false, wrongList=[], results=[];

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(mode,arg){
  let pool;
  if(mode==='all') pool=ALL.slice();
  else if(mode==='random10') pool=shuffle(ALL).slice(0,10);
  else if(mode==='random20') pool=shuffle(ALL).slice(0,20);
  else if(mode==='star') pool=ALL.filter(q=>q.star);
  else if(mode==='cat') pool=ALL.filter(q=>q.catShort===arg);
  // keep original order for 'all'/'cat'/'star', shuffle randoms already done
  if(mode==='all'||mode==='star') pool.sort((a,b)=>a.id-b.id);
  else if(mode==='cat') pool.sort((a,b)=>a.id-b.id);
  beginWith(pool);
}
function startReview(){ beginWith(wrongList.slice().sort((a,b)=>a.id-b.id)); }

function beginWith(pool){
  queue=pool; idx=0; correct=0; wrongList=[]; results=[];
  document.getElementById('tot').textContent=queue.length;
  show('quiz'); renderQ();
}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goStart(){show('start');}
function confirmQuit(){ if(confirm('クイズを中断してメニューに戻りますか？')) goStart(); }

function renderQ(){
  answered=false;
  const q=queue[idx];
  document.getElementById('cur').textContent=idx+1;
  document.getElementById('prog').style.width=((idx)/queue.length*100)+'%';
  document.getElementById('live').textContent = idx>0 ? ('正解 '+correct) : '';
  // tags
  let t=`<span class="tag">${q.catShort}</span>`;
  if(q.star) t+=`<span class="tag star-tag">★頻出</span>`;
  document.getElementById('tags').innerHTML=t;
  // question: bold **..** -> em(marker)
  document.getElementById('qtext').innerHTML=fmt(q.q);
  // options
  const ow=document.getElementById('opts'); ow.innerHTML='';
  q.options.forEach((op,i)=>{
    const btn=document.createElement('button');
    btn.className='opt'; btn.dataset.i=i;
    btn.innerHTML=`<span class="num">${i+1}</span><span>${fmt(op)}</span>`;
    btn.onclick=()=>choose(i);
    ow.appendChild(btn);
  });
  const ex=document.getElementById('explain'); ex.className='explain'; ex.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('nextBtn').textContent = (idx===queue.length-1)?'結果を見る →':'次の問題へ →';
}
function fmt(s){return s.replace(/\*\*(.+?)\*\*/g,'<em>$1</em>');}

function choose(i){
  if(answered) return; answered=true;
  const q=queue[idx];
  const btns=document.querySelectorAll('#opts .opt');
  btns.forEach(b=>b.disabled=true);
  const ok = i===q.answer;
  if(ok){ correct++; }
  else { wrongList.push(q); }
  results.push({q,chosen:i,ok});
  btns[q.answer].classList.add('correct');
  btns[q.answer].insertAdjacentHTML('beforeend','<span class="mk">✓</span>');
  if(!ok){ btns[i].classList.add('wrong'); btns[i].insertAdjacentHTML('beforeend','<span class="mk">✕</span>'); }
  const ex=document.getElementById('explain');
  ex.className='explain show '+(ok?'ok':'ng');
  ex.innerHTML=`<div class="head">${ok?'⭕ 正解！':'❌ 不正解'}　正解は ${q.answer+1}</div>`+
    `<div>${fmt(q.explanation)}</div>`;
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('prog').style.width=((idx+1)/queue.length*100)+'%';
}
function nextQ(){
  if(idx<queue.length-1){ idx++; renderQ(); }
  else finish();
}
function finish(){
  const total=queue.length, pct=Math.round(correct/total*100);
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('frac').textContent=`${correct} / ${total} 問正解`;
  const msg=document.getElementById('msg');
  let m;
  if(pct>=90) m='お見事！主席レベルの仕上がりです🌸';
  else if(pct>=75) m='合格ラインをしっかり突破！この調子です✨';
  else if(pct>=60) m='あと一歩。間違えた問題を復習して定着させましょう💡';
  else m='今が伸びどき。復習で必ず伸びます。一緒にいきましょう🔥';
  msg.textContent=m;
  // breakdown by category
  const bd=document.getElementById('breakdown'); bd.innerHTML='';
  const byCat={};
  results.forEach(r=>{const c=r.q.catShort;if(!byCat[c])byCat[c]={ok:0,n:0};byCat[c].n++;if(r.ok)byCat[c].ok++;});
  Object.keys(byCat).sort((a,b)=>ALL.find(q=>q.catShort===a).catOrder-ALL.find(q=>q.catShort===b).catOrder)
    .forEach(c=>{
    const o=byCat[c], p=Math.round(o.ok/o.n*100);
    const row=document.createElement('div');row.className='brow';
    row.innerHTML=`<span class="lbl">${c}</span><span class="mini"><i style="width:${p}%"></i></span><span class="sc">${o.ok}/${o.n}</span>`;
    bd.appendChild(row);
  });
  document.getElementById('reviewBtn').disabled = wrongList.length===0;
  document.getElementById('reviewBtn').textContent = wrongList.length===0
    ? '全問正解！復習はありません 🎉'
    : `間違えた ${wrongList.length} 問だけ復習する`;
  show('result');
}

// keyboard
document.addEventListener('keydown',e=>{
  if(!document.getElementById('quiz').classList.contains('active'))return;
  if(!answered && e.key>='1' && e.key<='5'){const i=+e.key-1;const q=queue[idx];if(i<q.options.length)choose(i);}
  else if(answered && e.key==='Enter'){nextQ();}
});
</script>
