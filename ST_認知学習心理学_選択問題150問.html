<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認知・学習心理学 選択問題150問</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
#app{max-width:760px;margin:0 auto;padding:1rem}
h1{font-size:18px;font-weight:600;color:#1F4E79;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:2px solid #2E75B6}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin:1rem 0}
.cat-btn{background:#fff;border:1.5px solid #d0d0c8;border-radius:8px;padding:.6rem .9rem;font-size:13px;font-weight:500;color:#333;cursor:pointer;text-align:left;transition:all .15s}
.cat-btn:hover{background:#DEEAF1;border-color:#2E75B6;color:#1F4E79}
.cat-btn.active{background:#2E75B6;border-color:#2E75B6;color:#fff}
.btn{background:#1F4E79;border:none;border-radius:8px;padding:.65rem 1.25rem;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#154360}
.btn-outline{background:#fff;border:1.5px solid #2E75B6;border-radius:8px;padding:.6rem 1.1rem;font-size:13px;font-weight:500;color:#2E75B6;cursor:pointer;transition:all .15s}
.btn-outline:hover{background:#DEEAF1}
.progress-wrap{height:8px;background:#e0e0d8;border-radius:4px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:#2E75B6;border-radius:4px;transition:width .3s}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:6px}
.stat{font-size:13px;color:#555}
.q-card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.q-meta{font-size:11px;background:#DEEAF1;color:#1F4E79;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:.75rem;font-weight:600}
.q-text{font-size:15px;font-weight:600;line-height:1.65;margin-bottom:1rem;color:#111}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{background:#f9f9f6;border:1.5px solid #d8d8d0;border-radius:8px;padding:.75rem 1rem;font-size:13.5px;color:#222;cursor:pointer;text-align:left;transition:all .15s;line-height:1.55}
.choice:hover:not(:disabled){background:#DEEAF1;border-color:#2E75B6}
.choice.correct{background:#EAF5E9;border-color:#2E7D32;color:#1B5E20;font-weight:600}
.choice.wrong{background:#FFEBEE;border-color:#C62828;color:#B71C1C}
.choice.reveal{background:#EAF5E9;border-color:#2E7D32;color:#1B5E20;font-weight:600}
.choice:disabled{cursor:default}
.explain{background:#FFF9E6;border-left:4px solid #F9A825;border-radius:0 8px 8px 0;padding:.85rem 1rem;font-size:13px;color:#444;margin-top:.85rem;line-height:1.65;display:none}
.explain.show{display:block}
.nav-row{display:flex;gap:8px;margin-top:.85rem;flex-wrap:wrap}
.score-card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:2rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.score-big{font-size:52px;font-weight:700;color:#1F4E79;margin:.5rem 0}
.score-label{font-size:14px;color:#555;margin-bottom:.25rem}
.score-msg{font-size:18px;font-weight:600;margin-top:.5rem;color:#333}
.result-btns{display:flex;gap:8px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
#view-menu,#view-quiz,#view-result{display:none}
</style>
</head>
<body>
<div id="app">
  <h1>認知・学習心理学 選択問題 150問</h1>
  <div id="view-menu"></div>
  <div id="view-quiz"></div>
  <div id="view-result"></div>
</div>
<script>
const ALL_Q=[
{id:1,cat:"第1回【認知・学習入門】",q:"メドニックによる「学習」の特徴として誤っているものはどれか。",choices:["学習は結果として行動に変化を引き起こす","学習は練習または経験の結果として生じる","学習は一時的な変化である","学習は直接観察することができない"],ans:2,exp:"学習は「比較的永続的な変化」。一時的な変化（病気・疲労等）は学習ではない。"},
{id:2,cat:"第1回【認知・学習入門】",q:"次のうち「学習」に該当しないものはどれか。",choices:["自転車の乗り方を練習して乗れるようになった","風邪をひいて一時的に集中力が低下した","恐怖体験から同じ状況を避けるようになった","毎日単語帳を繰り返し読んで単語を覚えた"],ans:1,exp:"病気による一時的な変化は学習ではない。学習の条件：①経験・練習の結果②比較的永続的な変化。"},
{id:3,cat:"第1回【認知・学習入門】",q:"認知（cognition）の辞書的定義として最も適切なものはどれか。",choices:["感情や欲求に基づいて行動を選択する過程","感覚入力が変形・貯蔵・再生・使用されるようなすべての過程","脳の神経細胞間でシナプス結合が形成される過程","他者の行動を観察して模倣する過程"],ans:1,exp:"認知の辞書的定義：「感覚入力が変形され、減じられ、精緻化され、貯蔵され、再生され、使用されるようなすべての過程に関係するもの」"},
{id:4,cat:"第1回【認知・学習入門】",q:"学習心理学が臨床で応用されている技法として適切なものはどれか。",choices:["応用行動分析（ABA）","精神分析","クライエント中心療法","ゲシュタルト療法"],ans:0,exp:"学習心理学の研究から得た理論を利用した行動療法（応用行動分析等）は心理療法の一つ。STの臨床に直結する。"},
{id:5,cat:"第1回【認知・学習入門】",q:"認知心理学が「情報処理システム」として人を捉えるようになった背景は何か。",choices:["神経科学の発展","コンピューター科学の発展","遺伝子工学の発展","社会学の発展"],ans:1,exp:"1950年代以降、コンピューター科学の発展が情報処理アプローチからの人の心のモデル化に影響を与えた。"},
{id:6,cat:"第1回【認知・学習入門】",q:"ジョハリの窓において「盲点の窓」の説明として正しいものはどれか。",choices:["自分も他人も知っている自己","自分は知っているが他人は知らない自己","自分は気づいていないが他人は知っている自己","自分も他人も知らない自己"],ans:2,exp:"盲点の窓：自分は気づいていないが他人は知っている自己。多職種から情報を得て患者を多角的に捉える際に活用できる。"},
{id:7,cat:"第1回【認知・学習入門】",q:"認知的不協和理論を提唱した人物と年代として正しいものはどれか。",choices:["パブロフ（1903年）","フェスティンガー（1957年）","スキナー（1938年）","バンデューラ（1977年）"],ans:1,exp:"認知的不協和理論はFestinger（アメリカ・社会心理学者, 1957年）が提唱。2つの認知に矛盾が生じると不快感が起こりそれを解消しようとする。"},
{id:8,cat:"第1回【認知・学習入門】",q:"「学習」と「学修」の違いとして正しいのはどれか。",choices:["学習：learning、学修：studying","学習：習い学ぶこと（learning）　学修：学び修めること・身につけること（acquisition）","学習は学術的文脈のみで使用する","学習と学修は同義である"],ans:1,exp:"「学習」=習い学ぶこと（learning）。「学修」=学び修めること・身につけること（acquisition）。語学学習のパラドックスにも関連する重要な区別。"},
{id:9,cat:"第2回【記憶の仕組み】",q:"記憶の二重貯蔵モデルを提唱した研究者と年代として正しいのはどれか。",choices:["クレイクとタルビング（1975年）","アトキンソンとシフリン（1971年）","バデリー（1992年）","エビングハウス（1885年）"],ans:1,exp:"二重貯蔵モデル（短期貯蔵庫と長期貯蔵庫）はAtkinson & Shiffrin（1971）が提唱。"},
{id:10,cat:"第2回【記憶の仕組み】",q:"短期貯蔵庫の容量として正しいのはどれか。",choices:["3±1チャンク","5±2チャンク","7±2チャンク","10±2チャンク"],ans:2,exp:"短期貯蔵庫の容量は7±2チャンク（5〜9ケタ）。維持リハーサルなしでは数十秒で消失する。"},
{id:11,cat:"第2回【記憶の仕組み】",q:"エビングハウスの忘却曲線における「節約率」の定義として正しいのはどれか。",choices:["正確に再生できた割合","覚え直すのにかかった時間が初回と比べてどのくらい短縮されたかの割合","1日後に残存している記憶の割合","リハーサルによって転送された情報の割合"],ans:1,exp:"節約率：覚え直すのにかかった時間が初めに比べてどのくらい短くなったかの割合。"},
{id:12,cat:"第2回【記憶の仕組み】",q:"「初頭効果」が生じる理由として正しいのはどれか。",choices:["短期貯蔵庫に保持されたままアクセスしやすいため","長期貯蔵庫に転送されやすいため","感情的に印象深いため","繰り返し提示されるため"],ans:1,exp:"初頭効果→長期貯蔵庫に転送されやすいため。新近効果→短期貯蔵庫に保持されたまま。よく混同されるひっかけポイント！"},
{id:13,cat:"第2回【記憶の仕組み】",q:"「新近効果」の正しい漢字はどれか。",choices:["親近効果","新近効果","深近効果","真近効果"],ans:1,exp:"正しくは「新近（しんきん）効果」。「親近」ではない。新しく（最後に）提示されたものだから「新」近効果。"},
{id:14,cat:"第2回【記憶の仕組み】",q:"処理水準理論（Craik & Tulving, 1975）で最も深い処理に相当するのはどれか。",choices:["文字の形態に注目する処理","単語の音韻に注目する処理","単語の意味や文脈に注目する処理","単語の文字数を数える処理"],ans:2,exp:"処理水準：浅い→形態（文字の形）→音韻（音）→深い→意味（意味・文脈）。深い処理ほど記憶成績が高まる。"},
{id:15,cat:"第2回【記憶の仕組み】",q:"作動記憶（ワーキングメモリ）のモデルを提唱した研究者はどれか。",choices:["アトキンソンとシフリン","クレイクとタルビング","バデリー","エビングハウス"],ans:2,exp:"作動記憶（working memory）はBaddeley（1992）が提唱。音韻ループ・視空間スケッチパッド・中央実行系から構成される。"},
{id:16,cat:"第2回【記憶の仕組み】",q:"「志向的忘却」の例として最も適切なのはどれか。",choices:["単語リストの最後の項目を思い出しやすい","電話番号を調べて電話し終えた後は番号を忘れる","怖い体験の記憶が鮮明に残る","試験前夜に覚えた内容が翌日忘れている"],ans:1,exp:"志向的忘却：忘れてもよいと知らされた項目だけ記憶が失われること。電話番号の例が典型的。"},
{id:17,cat:"第2回【記憶の仕組み】",q:"「符号化特定性原理」の説明として正しいのはどれか。",choices:["処理の深さが記憶の定着度を決定する","記銘時の文脈と一致しないと検索に失敗すること","感情状態と一致した記憶が想起されやすいこと","記憶は時間経過とともに消失すること"],ans:1,exp:"符号化特定性原理：記銘時の文脈と一致していないと検索に失敗する。記銘時の場所・音楽・匂いが「検索手がかり」になる。"},
{id:18,cat:"第2回【記憶の仕組み】",q:"「転送の失敗」と「検索の失敗」の違いとして正しいのはどれか。",choices:["転送の失敗：長期記憶に保存されているのに取り出せない　検索の失敗：長期記憶への保存に失敗","転送の失敗：長期記憶への保存に失敗　検索の失敗：長期記憶に保存されているのに取り出せない","転送の失敗：短期記憶の容量超過　検索の失敗：感覚記憶からの転送に失敗","両者は同じ現象の別名"],ans:1,exp:"転送の失敗：短期→長期貯蔵庫への保存に失敗。検索の失敗：長期貯蔵庫に保存されているのに取り出せない状態（HDに保存されているのにアクセスできない例）。"},
{id:19,cat:"第2回【記憶の仕組み】",q:"「精緻化」の意味として正しいのはどれか。",choices:["情報をそのままの形で繰り返しつぶやくこと","短期から長期貯蔵庫への転送を促進するために意味や構造を理解すること","記憶した情報の一部を選択的に忘却すること","感覚登録から短期貯蔵庫への移行を促進すること"],ans:1,exp:"精緻化：概念や知識を身につけるために「意味や構造を理解する」こと。有意味化・体制化・物語化・イメージ化などが含まれる。"},
{id:20,cat:"第2回【記憶の仕組み】",q:"感覚登録（感覚記憶）の特徴として正しいのはどれか。",choices:["7±2チャンクの容量を持ち15秒保持される","全ての感覚情報が入力されるが約1秒で消失し一部が短期貯蔵庫へ移行する","意識的なリハーサルによって保持時間が延長される","言語情報のみを処理する"],ans:1,exp:"感覚登録（感覚記憶）：全て貯蔵されるが約1秒で消失。その一部が短期貯蔵庫へ移行し7チャンクまで・15秒以内で消失（リハーサルなしの場合）。"},
{id:21,cat:"第3回【学習の基礎研究】",q:"古典的条件づけを発見・体系化した研究者として正しいのはどれか。",choices:["ワトソン（アメリカ・行動主義心理学者）","スキナー（アメリカ・行動分析学者）","パブロフ（ロシア・生理学者）","ソーンダイク（アメリカ・教育心理学者）"],ans:2,exp:"古典的条件づけ（レスポンデント条件づけ）はロシアの生理学者パブロフが消化腺の研究の中で発見・体系化した。"},
{id:22,cat:"第3回【学習の基礎研究】",q:"条件刺激（CS）の定義として正しいのはどれか。",choices:["他の刺激と対呈示されなくても無条件反応を誘発する刺激","他の刺激と対呈示されることで条件反応を引き出すようになった刺激（元々は中性刺激）","条件刺激によって誘発された習得性反応","無条件反応を引き出す刺激"],ans:1,exp:"CS（Conditioned Stimulus）：対呈示されることで条件反応を引き出すようになった刺激。元々は中性刺激（NS）だった。"},
{id:23,cat:"第3回【学習の基礎研究】",q:"オペラント条件づけにおける行動の原因として正しいのはどれか。",choices:["行動の直前の環境刺激","行動の直後の環境変化","行動と同時に生じる刺激","行動の10秒後の環境変化"],ans:1,exp:"オペラント条件づけでは行動の「直後」の環境変化が行動頻度を変える。「直前」はレスポンデントの説明。国試頻出ひっかけ！"},
{id:24,cat:"第3回【学習の基礎研究】",q:"「嫌子消失による強化（負の強化）」の例として正しいのはどれか。",choices:["宿題をしたら先生に褒められた","頭が痛かったので薬を飲んだら痛みが消えた","ゲームを取り上げられた","廊下を走ったら転んで痛かった"],ans:1,exp:"嫌子（痛み）が消失することで「薬を飲む」行動が強化される。負の強化＝嫌子消失で行動が増える。"},
{id:25,cat:"第3回【学習の基礎研究】",q:"味覚嫌悪条件づけの特徴として誤っているものはどれか。",choices:["たった1度の対呈示で条件反応が起こる","消化器系の不調は成立に関係しない","CS-US間隔が数時間以上でも成立する","消去抵抗が大きい"],ans:1,exp:"消化器系の不調は「連合選択性」によって味覚・嗅覚刺激と連合されやすく、成立に深く関係している。"},
{id:26,cat:"第3回【学習の基礎研究】",q:"シェイピング（逐次的接近法）の説明として正しいのはどれか。",choices:["何回かに1回だけ強化を行うスケジュール","目標に近い行動にのみ肯定的フィードバックをして最終目標行動に近づける方法","低頻度行動の後に高頻度行動の機会を与えること","消去後にCSのみ呈示すること"],ans:1,exp:"シェイピング：強化を与える課題を少しずつ難しくして目標反応に導く方法。分化強化を用いる。部分強化と混同しないこと！"},
{id:27,cat:"第3回【学習の基礎研究】",q:"最も消去抵抗が強い強化スケジュールはどれか。",choices:["固定比率（FR）スケジュール","変動比率（VR）スケジュール","固定間隔（FI）スケジュール","変動間隔（VI）スケジュール"],ans:1,exp:"VR（変動比率）が最も消去抵抗が強い。ギャンブルがやめられない理由。"},
{id:28,cat:"第3回【学習の基礎研究】",q:"アルバート坊やの実験でCSとして用いられたのはどれか。",choices:["大きな音","白ネズミ","積木","電気ショック"],ans:1,exp:"CS＝白ネズミ、US＝大きな音。7回の対呈示でネズミを見て逃げ出すCRが形成された。積木（NS）には反応しなかった（弁別刺激）。"},
{id:29,cat:"第3回【学習の基礎研究】",q:"プレマックの原理として正しいのはどれか。",choices:["低頻度行動の後に高頻度行動の機会を与えると低頻度行動が増える","高頻度行動の後に低頻度行動の機会を与えると高頻度行動が増える","消去後にCSのみ呈示すると自発的回復が起きる","条件づけ後に消去すると完全に消失する"],ans:0,exp:"プレマックの原理：低頻度行動（嫌いな野菜を食べる）の後に高頻度行動（好きなデザート）の機会を与えると、低頻度行動が増える。"},
{id:30,cat:"第3回【学習の基礎研究】",q:"「自発的回復」の説明として正しいのはどれか。",choices:["消去が完了した後には条件反応が永久に消失する","消去後しばらく時間をおいてCSを呈示すると一時的に条件反応が復活する現象","新しい強化によって消去された条件反応が再形成されること","消去の過程で条件反応が逆に強くなる現象"],ans:1,exp:"自発的回復：消去後しばらく時間を空けてCSを呈示すると一時的にCRが強くなる。消去でも刺激を忘れたわけではないことを示す。"},
{id:31,cat:"第3回【学習の基礎研究】",q:"「逃避学習」と「回避学習」の違いとして正しいのはどれか。",choices:["逃避学習：嫌子が来てから逃げる　回避学習：予め行動して嫌子を受けない","逃避学習：嫌子を回避する　回避学習：嫌子が来てから逃げる","逃避学習：好子を得る　回避学習：嫌子を消失させる","逃避：能動的のみ　回避：受動的のみ"],ans:0,exp:"逃避学習：嫌子が来てから逃げる（嫌子消失による強化）。回避学習：能動回避（予め移動）と受動回避（何もしない）がある。"},
{id:32,cat:"第3回【学習の基礎研究】",q:"「刺激般化」と「弁別」の違いとして正しいのはどれか。",choices:["刺激般化：CSと異なる刺激には反応しない　弁別：類似した刺激にも反応する","刺激般化：CSと類似した刺激にもCRが生じる　弁別：CSとNSを区別して反応する","刺激般化：行動が増加する　弁別：行動が減少する","刺激般化：消去後の自発的回復　弁別：消去"],ans:1,exp:"刺激般化：CSと類似した刺激にもCRがみられること（アルバート坊やのウサギ・毛皮への般化）。弁別：CSとNS（積木）を区別して反応。"},
{id:33,cat:"第3回【学習の基礎研究】",q:"「準備性」（セリグマン, 1970）の説明として正しいのはどれか。",choices:["学習する準備が整っていないと条件づけが成立しない","連合選択性は動物の進化の所産であり特定のCS-US組み合わせに生得的な準備性がある","味覚嫌悪条件づけはいかなる刺激の組み合わせでも等しく成立する","条件づけの成立には必ず繰り返し呈示が必要"],ans:1,exp:"準備性（Seligman, 1970）：連合選択性は動物の進化の所産。味覚と内臓不快感の組み合わせには準備性があるがベルと胃の不快感の関係には準備性が低い。"},
{id:34,cat:"第4回【知識の構造】",q:"「心的表象」の定義として正しいのはどれか。",choices:["感覚器官から入力された刺激そのもの","そのものが無くても頭に浮かぶ対象のこと","神経細胞間のシナプス結合","言語によって表現された概念"],ans:1,exp:"心的表象：「そのものが無くても頭に浮かぶ対象のこと」「目の前にないものごとを頭の中で再現したもの」。"},
{id:35,cat:"第4回【知識の構造】",q:"プロトタイプ理論の説明として正しいのはどれか。",choices:["抽象的な表象を想定せず個々の事例の集合が概念である","その概念の典型的な特徴を集めた抽象的な表象（プロトタイプ）を想定する","概念がどのように説明されるかに着目する","類似性のみに注目してカテゴリーを理解する"],ans:1,exp:"プロトタイプ理論：典型的な特徴を集めた抽象的表象（プロトタイプ）を想定する。「事例理論は抽象的表象を想定しない」と混同しやすい！"},
{id:36,cat:"第4回【知識の構造】",q:"鳥カテゴリーにおいて「典型性が最も高い」鳥として適切なのはどれか。",choices:["ペンギン","ダチョウ","コマドリ","フクロウ"],ans:2,exp:"コマドリは他の多くの鳥が持っている特性をたくさん持っている典型性が高い鳥。ペンギン・ダチョウは典型性が低いが鳥カテゴリーから排除されない。"},
{id:37,cat:"第4回【知識の構造】",q:"記憶のネットワークモデルにおける検索時間に影響する要因として正しいのはどれか。",choices:["記憶した時刻","ノードにたどり着くのに必要なリンクの距離","記憶した場所の明るさ","記銘時の感情状態のみ"],ans:1,exp:"ネットワークモデル：リンクの距離が長くなるほど検索時間がかかる。距離だけでなく意味や音の特徴もネットワーク化されている。"},
{id:38,cat:"第4回【知識の構造】",q:"「プライミング効果」の説明として正しいのはどれか。",choices:["記銘時の文脈と一致しないと検索に失敗すること","事前に見聞きした情報によって知識ネットワークが活性化され後の情報処理が影響を受けること","深い処理をすることで記憶成績が高まること","覚えた場所と同じ場所でテストを受けると成績が上がること"],ans:1,exp:"プライミング効果：事前情報によって知識ネットワークが活性化され、その後の情報処理が影響を受けること。「医者」→「看護師」の認識が速くなる例が典型。"},
{id:39,cat:"第4回【知識の構造】",q:"「二重符号化理論」の説明として正しいのはどれか。",choices:["記憶は短期と長期の二つの貯蔵庫に保存される","見たもの・聞いたものをイメージと言語的意味の両方で保存・組み合わせている","意識的な記憶と無意識的な記憶の二種類がある","記憶の記銘と想起が二段階で行われる"],ans:1,exp:"二重符号化理論：一度見た映像をそのまま保存するのではなく、イメージと言語的意味の両方で保存し組み合わせている。"},
{id:40,cat:"第4回【知識の構造】",q:"「カテゴリー」と「概念」の関係として正しいのはどれか。",choices:["カテゴリーは個別事例のみを指す","概念に含まれる対象のグループがカテゴリー。概念はカテゴリーの事例に共通した特徴を抽象化したもの","カテゴリーと概念は同義","カテゴリーは概念の一種"],ans:1,exp:"カテゴリー：「イヌ」と言われた時それに当てはまる事例のグループ。概念：カテゴリーの事例に共通した特徴を抽象化したもの。人の意味記憶は概念とカテゴリーで成り立つ。"},
{id:41,cat:"第5回【知識獲得のメカニズム】",q:"「意味記憶」の説明として正しいのはどれか。",choices:["自分自身が体験した具体的な出来事の記憶","文字・数字・単語の意味などの経験から一般化された知識・情報に関する記憶","獲得した時のことを意識的に思い出さなくても利用可能な記憶","自転車の乗り方などの技術に関する記憶"],ans:1,exp:"意味記憶：文字・数字・単語・化学式等の経験から一般化された知識・情報に関する長期記憶・陳述的記憶。対応脳部位：側頭葉内側部（海馬）・間脳。"},
{id:42,cat:"第5回【知識獲得のメカニズム】",q:"エピソード記憶と意味記憶の関係として正しいのはどれか。",choices:["完全に独立しており相互に影響しない","経験回数が多くなるほどエピソード記憶は減少し意味記憶だけが残る","意味記憶はエピソード記憶に変換される","経験回数に関わらず常に両者が同時に存在する"],ans:1,exp:"意味記憶とエピソード記憶は相互に独立したものではなく、経験回数が多くなるほどエピソード記憶は減少し意味記憶だけが残る性質がある。"},
{id:43,cat:"第5回【知識獲得のメカニズム】",q:"「顕在記憶」の説明として正しいのはどれか。",choices:["獲得した時のことを意識的に思い出さなくても利用可能な記憶","記憶された情報が言葉で表現可能で覚えた時の文脈を思い出すという意識を伴う記憶","手続き記憶とも呼ばれる","非陳述的記憶とも呼ばれる"],ans:1,exp:"顕在記憶＝陳述的記憶（宣言記憶）：言葉で表現可能・意識を伴う。潜在記憶＝非陳述的記憶：意識的に思い出さなくても利用可能（例：手続き記憶）。"},
{id:44,cat:"第5回【知識獲得のメカニズム】",q:"「手続き記憶」の例として最も適切なのはどれか。",choices:["昨日の夕食のメニューを覚えていること","自転車の乗り方を身につけていること","化学式を記憶していること","友人の誕生日を覚えていること"],ans:1,exp:"手続き記憶は潜在記憶（非陳述的記憶）の一つ。意識的に思い出さなくても利用可能な技術・習慣（自転車・楽器演奏・タイピング等）。"},
{id:45,cat:"第5回【知識獲得のメカニズム】",q:"「チャンク」の定義として正しいのはどれか。",choices:["短期記憶から長期記憶へ転送される情報の総量","ひとまとまりの情報の単位（短期記憶に7±2貯蔵できる）","長期記憶の保持時間の単位","意味記憶と手続き記憶を結ぶ結合単位"],ans:1,exp:"チャンクは「ひとまとまり」の意味。短期記憶には7±2チャンクの情報を貯蔵できる。意味を理解して覚えることで9ケタ以上も暗記可能。"},
{id:46,cat:"第5回【知識獲得のメカニズム】",q:"「間接プライミング効果」の教育への応用として適切なのはどれか。",choices:["テスト前日に全範囲を一気に復習する","学習すべき新しい概念と関連する概念をあらかじめ処理させておく","睡眠前に学習内容を反復する","強い感情を伴う場面で学習する"],ans:1,exp:"間接プライミング効果の応用：学習すべき新しい概念と関連する概念をあらかじめ処理させておくと、新しい概念の習得が促進される。授業の教材配列が重要。"},
{id:47,cat:"第5回【知識獲得のメカニズム】",q:"意味記憶・エピソード記憶と対応する脳部位として正しいのはどれか。",choices:["前頭前野・帯状回","側頭葉内側部（海馬）・間脳","大脳基底核・小脳","扁桃体・線条体"],ans:1,exp:"意味記憶・エピソード記憶：側頭葉内側部（海馬）・間脳と対応。手続き記憶：大脳基底核・小脳。古典的条件づけ：扁桃体・小脳。"},
{id:48,cat:"第6回【出来事や経験の記憶】",q:"「スキーマ」の定義として正しいのはどれか。",choices:["衝撃的な出来事についての非常に鮮明な記憶","似たような経験を繰り返す中でその共通部分をまとめた記憶の認知的な枠組み","記憶を引き出すための手がかりとなる環境刺激","感情に基づいて記憶が選択的に想起される現象"],ans:1,exp:"スキーマ：類似した出来事を繰り返し経験する中でその共通部分をまとめた認知的枠組み。「いかにもありそうなもの」のイメージや知識のこと。"},
{id:49,cat:"第6回【出来事や経験の記憶】",q:"「フラッシュバルブ・メモリ」の説明として正しいのはどれか。",choices:["感覚記憶に一時的に保存される鮮明な視覚像","重大で感情を強く動かされた出来事についての非常に鮮明な記憶","抑圧された記憶が突然意識に上ってくる現象","睡眠中に記憶が強化・統合される現象"],ans:1,exp:"フラッシュバルブ・メモリ：重大で感情を動かされた出来事の非常に鮮明な記憶。しかし客観的には正確でないことが多い。"},
{id:50,cat:"第6回【出来事や経験の記憶】",q:"「気分一致効果」の説明として正しいのはどれか。",choices:["失敗して嫌な気分の時に成功体験を思い出して前向きになること","嫌なことがあって落ち込んでいる時に過去の嫌な出来事を思い出しやすくなること","楽しい気分の時に難しい課題に取り組めること","怒っている時に攻撃的な行動が増えること"],ans:1,exp:"気分一致効果：今の気分と同じ感情の記憶が想起されやすい現象。感情から自動的に生じる「活性化拡散」のために起きる。"},
{id:51,cat:"第6回【出来事や経験の記憶】",q:"「気分不一致効果」の説明として正しいのはどれか。",choices:["今の気分と同じ感情の記憶が想起されやすいこと","失敗して嫌な気分の時に挽回体験を思い出して前向きになること","楽しい気分の時に楽しかった記憶が浮かびやすいこと","気分が変化するにつれて記憶の想起内容も変化すること"],ans:1,exp:"気分不一致効果：気分緩和動機が生じ、快感情の関連情報へ選択的に注意を向ける感情スキーマが発動。失敗→挽回体験を思い出す例が典型。"},
{id:52,cat:"第6回【出来事や経験の記憶】",q:"ロフタスとパーマー（1974）の実験で「想起段階」の問題として示されたのはどれか。",choices:["衝撃的な場面では周辺情報よりも中心情報をよく覚えている","質問の言葉の違い（激突した/ぶつかった）で実際にないガラスが割れるのを見たという報告が変わった","記憶の保持は時間経過で減少する","衝撃的な記憶は一般的な記憶より正確"],ans:1,exp:"想起段階の問題：「車が激突した時」vs「ぶつかった時」という言葉の違いで実際にないガラスが割れるのを見たという報告割合が異なった→記憶は再構成される。"},
{id:53,cat:"第6回【出来事や経験の記憶】",q:"「凶器注目効果」の説明として正しいのはどれか。",choices:["衝撃的な場面では記憶が全般的に強化される","衝撃的な場面で凶器に注意が集中し周辺情報（犯人の顔等）の記憶が低下する","恐怖を感じると記憶力が全体的に低下する","ストレス下では短期記憶だけが影響を受ける"],ans:1,exp:"凶器注目効果：衝撃的な場面で凶器（脅威）に注意が集中し、周辺的な事物の記憶が低下する現象。記銘段階の問題。"},
{id:54,cat:"第6回【出来事や経験の記憶】",q:"「大学院生の部屋」実験（Brewer & Treyens, 1981）の結論として正しいのはどれか。",choices:["人はありのままを動画のように正確に記憶する","人の記憶はスキーマのフィルターを通して一部を強調・見過ごし・補った結果である","意外性のある項目は全く記憶されない","繰り返し見たものはより正確に記憶される"],ans:1,exp:"「大学院生の部屋」実験の結論：人の記憶はスキーマのフィルターを通して一部を強調・見過ごし・補った結果であり、動画・写真とは全く異なる。"},
{id:55,cat:"第7回【メタ認知】",q:"メタ認知を提唱した研究者として正しいのはどれか。",choices:["ピアジェ（スイス・発達心理学者）","フラヴェル（アメリカ・発達心理学者）","ウォルピ（南アフリカ・精神科医）","バデリー（イギリス・認知心理学者）"],ans:1,exp:"メタ認知はFlavell, J.H.（アメリカ・発達心理学者）が提唱。「メタ」は「上位のもの」を意味し、認知過程を制御する上位の心の働き。"},
{id:56,cat:"第7回【メタ認知】",q:"メタ認知の構成要素として正しいのはどれか。",choices:["意味記憶と手続き記憶","メタ認知的経験（コントロール・モニタリング）とメタ認知的知識","短期記憶と長期記憶","顕在記憶と潜在記憶"],ans:1,exp:"メタ認知の構成要素：①メタ認知的経験（コントロール・モニタリング）②メタ認知的知識（人・課題・方略に関する知識）。"},
{id:57,cat:"第7回【メタ認知】",q:"「心の理論」の説明として正しいのはどれか。",choices:["自分の思考の「くせ」を自覚して制御しようとする思考過程","他者が何かの行動を起こす時その背景に気持ちや考えなどの心の状態があるのだという理解・知識","集団の中で個人の認知が影響を受ける現象","感情が記憶の想起に影響を与える現象"],ans:1,exp:"心の理論：他者の行動の背景に心の状態があるという理解・知識。サリー・アンの誤信念課題で4〜7歳で正答率が上がる。メタ認知の発達における重要な初期ステージ。"},
{id:58,cat:"第7回【メタ認知】",q:"「自己中心性」（ピアジェ）の説明として正しいのはどれか。",choices:["自己中心的・利己主義的な性格特性","幼児は自分に見えているものは他の人にも見えていると思い込む認知特徴","青年期に強まる自己意識の高まり","他者への共感能力の欠如"],ans:1,exp:"自己中心性（Piaget）：幼い子どもの認知特徴であり、利己主義や自分勝手とは別の概念。誤解されやすいので注意！"},
{id:59,cat:"第7回【メタ認知】",q:"「外在化・図式化」がメタ認知に与える効果として正しいのはどれか。",choices:["記憶容量を増やす","認知にかかる負担を軽減し問題の理解や解決に役立つ","短期記憶から長期記憶への転送を促進する","無意識的な情報処理を意識化する"],ans:1,exp:"外在化・図式化：人間の内的体験を紙やホワイトボード等に置くことで認知負担が軽減され問題理解・解決に役立つ。認知行動療法と関連が高い。"},
{id:60,cat:"第7回【メタ認知】",q:"「メタ記憶」の例として最も適切なのはどれか。",choices:["昨日覚えた内容を翌日に想起すること","忘れてしまうと思い手帳に約束を書き込む時に機能する「頭の中だけでは覚えられない」という知識","深い処理を行うことで記憶定着を促すこと","感情と記憶が結びついて想起されやすくなること"],ans:1,exp:"メタ記憶：「記憶についての認識や知識」。「頭の中だけでは覚えておけない」という自分の記憶に関する知識が働き、手帳という外部記憶に覚えさせる行動。"},
{id:61,cat:"第8回【言葉の発達と役割】",q:"チョムスキーのLAD（Language Acquisition Device）の説明として正しいのはどれか。",choices:["外国語を学習するための記憶システム","人間の脳に備わった言語獲得装置で誰からも教わらずとも文法を理解し言語獲得できる","言語の意味を記憶するための専用モジュール","音韻情報を処理するための神経回路"],ans:1,exp:"LAD（言語獲得装置）はチョムスキー（アメリカ・言語学者）が提唱。人間の脳に備わっており誰からも教わらずとも文法を自分で理解できると考えた。"},
{id:62,cat:"第8回【言葉の発達と役割】",q:"母語の「言語獲得」と外国語の「言語学習」の違いとして正しいのはどれか。",choices:["言語獲得は意識的な学習、言語学習は自然な習得","言語獲得は自然に身につくこと、言語学習は意識的に勉強すること","言語獲得は幼児期のみ、言語学習は成人のみ","言語獲得は聴覚依存、言語学習は視覚依存"],ans:1,exp:"言語獲得（acquisition）：母語を自然に身につけること。言語学習（learning）：外国語を意識的に勉強すること。"},
{id:63,cat:"第8回【言葉の発達と役割】",q:"全身反応学習法（TPR）の特徴として正しいのはどれか。",choices:["文法規則を体系的に教える教授法","教師の命令や指示に学習者が身体を使って運動・反応する活動（SPTs効果）","母語を使って外国語を教える方法","映像を使って言語を教える方法"],ans:1,exp:"TPR（Total Physical Response）：教師の指示に反射的に身体で反応する活動。筋運動感覚という別の感覚を用いることで記憶成績を高める（SPTs効果）。"},
{id:64,cat:"第8回【言葉の発達と役割】",q:"「語学学習のパラドックス」の説明として正しいのはどれか。",choices:["語学学習を続けるほど母語が失われる","コミュニケーション能力を支えるのは無意識的に習得された技能であり教室での意識的学習だけでは身につかない","外国語は若い時期に始めるほど習得しやすい","文法重視の教授法の方がコミュニケーション能力が高まる"],ans:1,exp:"語学学習のパラドックス：コミュニケーション能力は無意識的な「習得」（acquisition）が支え、意識的な「学習」（learning）だけでは不十分。"},
{id:65,cat:"第8回【言葉の発達と役割】",q:"「イマージョン教育」の説明として正しいのはどれか。",choices:["母語で外国語の文法を体系的に教える教授法","全ての授業を目標言語で行うことで自然な言語習得を目指す教育","身体の動きを使って言語を習得する方法","潜在記憶レベルで学習効果を蓄積する方法"],ans:1,exp:"イマージョン教育：原則的に全ての授業を目標言語で行う。1960年代カナダでフランス語習得のプログラムとして開始。"},
{id:66,cat:"第9回【学習意欲】",q:"「内発的な学習意欲」の説明として正しいのはどれか。",choices:["他者からの指示やプレッシャーによって仕方なく学ぶ意欲","知的好奇心・興味関心に基づいて無意識的に面白いから学ぼうとする意欲","人生の目標を達成するために意識的に学ぼうとする意欲","褒め言葉や賞品によって学ぼうとする意欲"],ans:1,exp:"内発的学習意欲：知的好奇心・興味関心に基づく。自律的学習意欲の一つ。乳幼児期から働く。"},
{id:67,cat:"第9回【学習意欲】",q:"「褒め言葉」と「物質的報酬」の内発的学習意欲への効果の違いとして正しいのはどれか。",choices:["物質的報酬の方が内発的学習意欲を高める","褒め言葉の方が内発的学習意欲を損なわず高める","どちらも同じ効果がある","両方とも内発的学習意欲を下げる"],ans:1,exp:"褒め言葉（言語的報酬）＞物質的報酬。物質的報酬は自律的意欲が高い状態ではその意欲を削ぐ方向に作用する。"},
{id:68,cat:"第9回【学習意欲】",q:"相対評価が内発的学習意欲に与える効果として正しいのはどれか。",choices:["高い評価を得ることで内発的意欲が高まる","他者からコントロールされている意識が高まり内発的学習意欲にマイナスの効果がある","目標が明確になることで自律的意欲が高まる","結果によって変化しないため影響しない"],ans:1,exp:"相対評価：他者からコントロールされている意識が高くなることから、内発的学習意欲にはマイナスの効果がある。"},
{id:69,cat:"第9回【学習意欲】",q:"乳幼児期の学習意欲の育て方として正しいのはどれか。",choices:["早期から体系的な教育を開始する","母親との安定したアタッチメント形成が安全基地となり内発的学習意欲が育まれる","競争心を育てることで向社会的欲求が高まる","物質的報酬を積極的に使うことで高頻度行動が増える"],ans:1,exp:"乳幼児期：母親との安定したアタッチメントが安全基地となり内発的学習意欲の基盤が形成される。子どもの質問に即座に答えることで知的好奇心が育まれる。"},
{id:70,cat:"第9回【学習意欲】",q:"「向社会的欲求」の説明として正しいのはどれか。",choices:["競争に勝ちたいという欲求","他者のためになることをしたいという欲求","他者から認められたいという欲求","物事を自分でコントロールしたいという欲求"],ans:1,exp:"向社会的欲求：他者のためになることをしたいという欲求。自律的学習意欲の発現プロセスで「他者を援助するために学びたい」という気持ちに繋がる。"},
{id:71,cat:"第10回【問題解決】",q:"心理学における「問題」の定義として正しいのはどれか。",choices:["解決策がわからない状況全般","目標とする状態と現在の状態の間に差があること","複数の選択肢から一つを選ぶ必要がある状況","不快な感情を引き起こす出来事"],ans:1,exp:"心理学では「問題」を「目標とする状態と現在の状態の間に差があること」と定義する。"},
{id:72,cat:"第10回【問題解決】",q:"「手段—目標分析」の説明として正しいのはどれか。",choices:["あり得る手段を全て吟味して確実に解決に至る道筋を見つけること","最終目標からスタートして後ろ向きに進みながら下位目標を立て達成するオペレータを実行していく方略","問題をできるだけ多くの視点から捉え直すこと","専門知識を使って問題の物理的な状態をイメージすること"],ans:1,exp:"手段—目標分析：最終目標から逆算して下位目標を設定する方略。しらみつぶし方略より早く目標にたどり着ける場合が多い。"},
{id:73,cat:"第10回【問題解決】",q:"「洞察」（見通し）に関するケーラーの考えとして正しいのはどれか。",choices:["問題解決行動は試行錯誤により徐々に獲得される","問題場面の手段—目標関係を見抜いて行動する","問題解決は偶然生じることはなく全て経験による","エキスパートは初学者と同じ方略を用いる"],ans:1,exp:"ケーラー（ドイツ・ゲシュタルト心理学者）：問題解決は偶然生じるのではなく問題場面の手段—目標関係を見抜いて行動する（洞察/見通し）。"},
{id:74,cat:"第10回【問題解決】",q:"トールマンの「潜在学習」の説明として正しいのはどれか。",choices:["学習の効果が即座に行動として現れること","報酬がなくても環境への認知（認知地図）が学習されており、報酬が与えられた時にその知識を利用すること","意識的な反復練習によって技能が習得されること","条件づけなしに生じる生得的な行動変化"],ans:1,exp:"トールマンの潜在学習：ラットは報酬なしでも迷路の認知地図を学習していた。習得した知識は行動として現れないために「潜在」学習と呼ばれる。"},
{id:75,cat:"第10回【問題解決】",q:"エキスパートと初学者の問題解決の違いとして正しいのはどれか。",choices:["エキスパートは手段—目標分析を積極的に用い初学者は直感的に解く","エキスパートは問題の物理的状態を適切に表象でき初学者は意識的な手段—目標分析に頼る","エキスパートは試行錯誤を多用し初学者はアルゴリズムを用いる","エキスパートと初学者では使用知識量は同じだが処理速度が異なる"],ans:1,exp:"エキスパート：問題を読んで物理的状態を適切に表象（イメージ）できる。初学者：表象を作ることが難しいため意識的に手段—目標分析などで問題解決を行う。"},
{id:76,cat:"第10回【問題解決】",q:"ワラスの「創造的問題解決」の4段階として正しいのはどれか。",choices:["①準備→②実行→③評価→④修正","①心的準備→②孵化→③啓示→④検証","①問題発見→②仮説設定→③実験→④結論","①観察→②分析→③統合→④応用"],ans:1,exp:"ワラスの創造的問題解決（Wallas, 1926）：①心的準備→②孵化（温める）→③啓示（ひらめき）→④検証。"},
{id:77,cat:"第10回【問題解決】",q:"行動分析学における「行動の未学習・未定着」の例として正しいのはどれか。",choices:["止めたいのにどうしても間食してしまう","ある場面でその行動をすることが期待されているのに行えていない（例：挨拶をしない）","強化されてきた行動が急に変化すること","条件づけによって形成された行動が般化すること"],ans:1,exp:"行動の未学習・未定着：期待される行動をおこなえていない・定着していない状態（例：挨拶をしない、仕事が長続きしない）。"},
{id:78,cat:"第11回【心理臨床と学習心理学】",q:"エクスポージャー法（暴露法）の説明として正しいのはどれか。",choices:["習慣的な行為に対して拮抗行動の獲得を目指す介入技法","不安を起こす必要のない刺激に反応し不適切に回避されている状況に治療的に介入する方法","好子に触れる機会を遮断することで問題行動を弱化させる方法","段階的に課題を難しくして目標行動に近づける方法"],ans:1,exp:"エクスポージャー法：レスポンデント学習を基にした認知行動療法。不安を喚起させる強い脅威に自ら接触させ、不安が自然に下がることに気づかせる。"},
{id:79,cat:"第11回【心理臨床と学習心理学】",q:"SST（ソーシャルスキルトレーニング）の正しい手順はどれか。",choices:["⓪標的スキル決定→①モデリング→②言語的教示→③ロールプレイ→④フィードバック→⑤ホームワーク","⓪標的スキル決定→①言語的教示→②モデリング→③ロールプレイ（行動リハーサル）→④フィードバック強化→⑤ホームワーク","⓪ロールプレイ→①モデリング→②フィードバック→③言語的教示→④ホームワーク→⑤標的スキル決定","⓪言語的教示→①標的スキル決定→②フィードバック→③ロールプレイ→④モデリング→⑤ホームワーク"],ans:1,exp:"SST手順：⓪標的スキルの決定→①言語的教示→②モデリング（見本）→③ロールプレイ（行動リハーサル）→④フィードバック強化→⑤ホームワーク。"},
{id:80,cat:"第11回【心理臨床と学習心理学】",q:"「タイムアウト法」に対応するオペラント随伴性として正しいのはどれか。",choices:["好子出現による強化（正の強化）","嫌子消失による強化（負の強化）","嫌子出現による弱化（正の罰）","好子消失による弱化（負の罰）"],ans:3,exp:"タイムアウト法：好子消失による弱化（負の罰）。好子に触れる機会を遮断する（例：暴れた子を空き教室に移動→友達という好子が奪われる）。"},
{id:81,cat:"第11回【心理臨床と学習心理学】",q:"「ハビットリバーサル法」の対象となる問題行動として最も適切なのはどれか。",choices:["対人恐怖・社会不安","抜毛・チック・爪噛みなどの習慣的行為","アルコール依存","授業中の立ち歩き"],ans:1,exp:"ハビットリバーサル法：習慣的な行為（チック・抜毛・爪噛み等）に対して、同時に生じ得ない拮抗行動（掌をぎゅっと握る等）の獲得を目指す介入技法。"},
{id:82,cat:"第11回【心理臨床と学習心理学】",q:"「セルフエフィカシー（自己効力感）」の説明として正しいのはどれか。",choices:["自分の行動が他者の役に立つという信念","ある行動をすれば同じ結果になるという予期と、その行動を自分ができるかという予期の組み合わせ","自分の思考パターンを客観的に観察する能力","他者の行動を観察して模倣する傾向"],ans:1,exp:"セルフエフィカシー：結果予期（同じ行動→同じ結果）と効力予期（その行動を自分ができるか）の組み合わせ。バンデューラ（カナダ・社会学習理論）が提唱。"},
{id:83,cat:"第11回【心理臨床と学習心理学】",q:"「ルール支配行動」の説明として正しいのはどれか。",choices:["行動の直後の強化・弱化によってのみ維持される行動","他者の指示や自分の考えで形成されたルールによって制御される行動（随伴性がなくても維持される）","観察学習によって形成された行動","強い感情によって自動的に生じる行動"],ans:1,exp:"ルール支配行動：行動直後の強化や弱化の随伴性がなくても行動が維持される人間特有の学習。「白線の外を歩くと危険」→白線内を歩くなどが例。"},
{id:84,cat:"第11回【心理臨床と学習心理学】",q:"「嫌悪療法」に対応するオペラント随伴性として正しいのはどれか。",choices:["好子出現による強化（正の強化）","嫌子消失による強化（負の強化）","嫌子出現による弱化（正の罰）","好子消失による弱化（負の罰）"],ans:2,exp:"嫌悪療法：嫌子出現による弱化（正の罰）。飲酒直後に嫌酒薬（嫌子）を投与→飲酒行動が弱化。刺激統制も組み合わせる。"},
{id:85,cat:"第11回【心理臨床と学習心理学】",q:"STの臨床において「行動に注目する」意義として最も適切なのはどれか。",choices:["患者の内的体験よりも外見的な行動だけを評価するため","患者の問題を行動として具体的に記述することで多職種での問題共有が容易になるため","薬物療法との組み合わせを計画するため","統計的な評価を行いやすくするため"],ans:1,exp:"行動に注目する意義：患者の問題を「行動」に基づいて整理することで行動変容を目指せる。多職種での問題共有が容易になるメリットがある。"},
{id:86,cat:"第12回【協同の効果】",q:"「社会的手抜き（リンゲルマン効果）」の説明として正しいのはどれか。",choices:["集団で話し合いを行うと意見が極端な方向に偏ること","集団で課題を行うことで一人ひとりの働きが減ること","集団での話し合いで目的がズレていくこと","少数派が多数派の意見を変える現象"],ans:1,exp:"社会的手抜き（リンゲルマン効果）：集団の人数が大きくなるほど一人あたりの努力量が減衰する。課題達成への責任感が分散してしまうことも関与している。"},
{id:87,cat:"第12回【協同の効果】",q:"同調行動の実験を行ったアッシュ（1951）の結果として正しいのはどれか。",choices:["一時的に形成された集団でも多数派に意見を同調する結果だった","永続的な集団関係がある場合にのみ同調が生じた","人数が増えるほど同調の程度が比例して強まった","少数派に反論することで同調を完全に防ぐことができた"],ans:0,exp:"アッシュ（1951）：一時的な集団で同調が生じにくい設定にもかかわらず多数派に同調する結果。人が3人集まれば多数派として影響力を発揮するが人数と必ずしも比例しない。"},
{id:88,cat:"第12回【協同の効果】",q:"「集団思考」の説明として正しいのはどれか。",choices:["集団での意思決定が個人の意見の平均より極端な方向に偏ること","集団で話し合いをしていると目的がよい解決策の発見から意見の一致へとズレていくこと","集団規範に従わない人が排除されること","少数派の意見が多数派を変化させること"],ans:1,exp:"集団思考：集団で話し合うと目的が「よい解決策を見出すこと」から「集団で意見を一致させること」にズレる。少ない可能性しか検討しなくなる。"},
{id:89,cat:"第12回【協同の効果】",q:"「リスキー・シフト」の説明として正しいのはどれか。",choices:["集団での意思決定が個人の意見の平均よりも慎重・安全な方向に偏ること","集団での意思決定が個人の意見の平均よりも勇ましく・リスクのある方向に偏ること","少数派が多数派を変化させること","集団規範から逸脱した行動が現れること"],ans:1,exp:"集団極性化：コーシャスシフト（慎重方向）とリスキーシフト（リスク方向）がある。どちらの方向にも極端化しうる。"},
{id:90,cat:"第12回【協同の効果】",q:"チャン（1996）の実験で最も成績が高かったグループはどれか。",choices:["知っていることを話すグループ","自分の考えと根拠を述べるグループ","疑問を話し合うグループ","全員が個別に考えてから発表するグループ"],ans:2,exp:"チャン（1996）：「進化」について話し合わせた際、「疑問を話し合うグループ」が最も成績が高かった。話し合いさえすれば深まるわけではなく、一緒に説明を作り上げることが重要。"},
{id:91,cat:"第12回【協同の効果】",q:"同調が生じる2つの理由として正しいのはどれか。",choices:["記憶の歪みと認知の歪み","情報的影響（正しくありたい欲求）と規範的影響（排斥を避けたい欲求）","顕在記憶と潜在記憶の相互作用","個人の能力差と知識量の差"],ans:1,exp:"同調の理由：①情報的影響（自分の行動や判断について正しくありたい欲求）②規範的影響（集団から排斥されないよう多数派に合わせる欲求）。"},
{id:92,cat:"第12回【協同の効果】",q:"集団思考を防ぐための方策として最も適切なのはどれか。",choices:["会議の時間を短くする","強いリーダーシップを持つ人を中心に意見をまとめる","異なる意見を持つ人を意図的に入れたり反対意見を言う係を設置する","全員が同じ知識・能力を持つメンバーで構成する"],ans:2,exp:"集団思考の防止：①少数派を1人でも入れる②自由な意見が言える雰囲気③反対意見を言う係の設置④メンバーの多様性を保つ。"},
{id:93,cat:"第12回【協同の効果】",q:"社会的手抜きの予防策として誤っているものはどれか。",choices:["個人の貢献度を見える化する","活動の結果を個人にフィードバックする","集団の目標の魅力や意義を説明し個人の関与を高める","集団の人数を増やして責任感を分散させる"],ans:3,exp:"社会的手抜きの予防策：①見える化②個人へのフィードバック③目標の魅力・意義の説明。「人数を増やして責任感を分散」は手抜きを促進させる方向になる。"},
{id:94,cat:"第12回【協同の効果】",q:"「集団規範」の説明として正しいのはどれか。",choices:["集団が正式に制定した規則・制度","規則や制度とは別に集団のメンバーに暗黙の了解で共有されたルールや基準","集団の多数派が支持する意見","集団のリーダーが定めた行動指針"],ans:1,exp:"集団規範（group norm）：規則や制度とは別に、集団のメンバーに暗黙の了解で共有されたルールや基準。集団規範から逸脱すると集団圧力が働く。"},
{id:95,cat:"第12回【協同の効果】",q:"少数派影響が強くなる条件として正しいのはどれか。",choices:["少数派の人数が多い時","少数派の主張内容が論理的で一貫性を持ちつつ柔軟性があり利害関係が無い時","少数派がリーダーシップを持つ人物である時","少数派が多数派と長期間関係を持っている時"],ans:1,exp:"少数派影響が強くなる条件：①主張内容が論理的で一貫性がある②頑なになりすぎず柔軟性がある③少数派に利害関係がない。"},
{id:96,cat:"第3回【学習の基礎研究】",q:"オペラント条件づけを体系化した研究者として正しいのはどれか。",choices:["パブロフ（ロシア・生理学者）","ワトソン（アメリカ・行動主義心理学者）","スキナー（アメリカ・行動分析学者）","ソーンダイク（アメリカ・教育心理学者）"],ans:2,exp:"オペラント条件づけはSkinner, B.F.（アメリカ・行動分析学者）が体系化した。スキナー箱の実験が有名。"},
{id:97,cat:"第2回【記憶の仕組み】",q:"「維持的リハーサル」の説明として正しいのはどれか。",choices:["情報に意味を付与して長期記憶への転送を促進する方法","一時的に記憶できる容量と時間には限界があるため記憶を維持するために積極的に復唱したり思い浮かべる活動","記憶したい情報をグループ分けして体制化する方法","情報を映像化してイメージとして記憶する方法"],ans:1,exp:"維持的リハーサル：記憶が急速に消失しないよう復唱したり何度も思い浮かべる積極的活動。精緻化リハーサルの方が深い処理で長期記憶への転送効果が高い。"},
{id:98,cat:"第4回【知識の構造】",q:"「事例理論」の短所として正しいのはどれか。",choices:["典型的な例を挙げることができない","無数にある特徴の中からどこを注目して選んでいるか不明確でありカテゴリーの一貫性・関係性の説明に不十分","プロトタイプを設定するため個別事例を無視する","文脈によって典型例が変化することを説明できない"],ans:1,exp:"事例理論の短所：「車」と「電話機」には共通点も相違点も多いが無数にある特徴の中からどこを注目するか不明確。類似性のみに注目した理論はカテゴリーの一貫性説明に不十分。"},
{id:99,cat:"第6回【出来事や経験の記憶】",q:"「スクリプト」の例として最も適切なのはどれか。",choices:["「イヌ」という概念の典型的な特徴（4本足・毛がある等）","ピクニックに行こうと聞いて「お弁当を作る」「自然の豊かな場所」等を思い浮かべること","記銘時の珈琲の匂いが数学の公式の検索手がかりになること","他者の意見に影響されて自分の判断を変えること"],ans:1,exp:"スクリプト：行動についてのスキーマの枠組み。ピクニック→「お弁当・自然の場所」を連想する例が典型。"},
{id:100,cat:"第7回【メタ認知】",q:"「メタ認知的知識」の3種類として正しいのはどれか。",choices:["音韻ループ・視空間スケッチパッド・中央実行系","人に関する知識・課題に関する知識・方略に関する知識","意味記憶・エピソード記憶・手続き記憶","記銘・保持・想起"],ans:1,exp:"メタ認知的知識の3種類：①人に関する知識（個人内差・個人間差・人一般）②課題に関する知識（特性・要求・ゴール）③方略に関する知識。"},
{id:101,cat:"第5回【知識獲得のメカニズム】",q:"「直接プライミング効果」の説明として正しいのはどれか。",choices:["意味的に関連する語がプライムの方が語彙判断の処理が促進される現象","プライムが提示された実験条件が統制条件よりも単語完成テストの正答率が高い現象","記銘時の文脈が想起を促進する現象","深い処理によって記憶成績が向上する現象"],ans:1,exp:"直接プライミング効果：プライムが提示された実験条件が統制条件よりも単語完成テストの正答率が高い現象。間接プライミングは意味的関連語によるもの。"},
{id:102,cat:"第9回【学習意欲】",q:"青年期初期（中学校時代）の学習意欲の特徴として正しいのはどれか。",choices:["母親との安定したアタッチメントが基盤となる","メタ認知能力・自己評価能力の発達に基づき自学者として学習を進める","競争心の発達により集団内での相対評価が有効","内発的学習意欲は低下し他律的意欲が主になる"],ans:1,exp:"青年期初期（中学校時代）：①自己理解に基づく人生目標設定②メタ認知能力の発達により自学者として学習を進める。環境変化への適応も重要。"},
{id:103,cat:"第3回【学習の基礎研究】",q:"「拮抗条件づけ」と「系統的脱感作法」の関係として正しいのはどれか。",choices:["拮抗条件づけはオペラント学習ベース・系統的脱感作法はレスポンデント学習ベース","系統的脱感作法は拮抗条件づけ（逆制止）を応用した技法","系統的脱感作法はシェイピングを用いた技法","拮抗条件づけは正の強化を用いた技法"],ans:1,exp:"系統的脱感作法（ウォルピ）は逆制止（不安・恐怖と逆の心身状態を対呈示する）という拮抗条件づけの手続きを応用した技法。不安階層表とSUDを用いる。"},
{id:104,cat:"第11回【心理臨床と学習心理学】",q:"「観察学習」のバンデューラの実験として正しいのはどれか。",choices:["ラットに電気ショックを与えて学習を研究した実験","オモチャの人形に暴力をふるう大人の行動を映像で観察した4歳の子供が同様の遊びをした実験","白ネズミに恐怖反応を条件づけた実験","鳩にレバーを押す行動を形成した実験"],ans:1,exp:"バンデューラ（カナダ・社会学習理論）の観察学習実験：大人の暴力行動を映像で観察した4歳の子供が同様の遊びをした。自身に経験がなくても他者の観察で行動変化が起きる。"},
{id:105,cat:"第8回【言葉の発達と役割】",q:"「コミュニカティブ・アプローチ」の特徴として正しいのはどれか。",choices:["文法規則の体系的な教授を優先する","感情を抑制するのではなく場面や状況に合った感情を学習者に喚起することに注意を払う","母語訳を積極的に使用して理解を促す","反復練習（ドリル）を中心とした教授法"],ans:1,exp:"コミュニカティブ・アプローチ：機能重視の教授法でコミュニケーション能力育成を目標。感情を抑制せず場面に合った感情を喚起することに注意が払われる。"},
{id:106,cat:"第10回【問題解決】",q:"「行動形成（未学習・未定着への解決）」の7ステップで最初に行うこととして正しいのはどれか。",choices:["好子を探る","行動が起こりやすくなるような事前の手助けをする","目標行動を具体的に決める","複雑な行動を単純な単位に分ける"],ans:2,exp:"行動形成7ステップ：①目標行動を具体的に決める→②行動に結果を伴わせる→③好子を探る→④まだ獲得していない行動を形成する→⑤複雑な行動を単純な単位に分ける→⑥単純な行動をつなげる→⑦事前の手助けをする。"},
{id:107,cat:"第12回【協同の効果】",q:"「協同の効果の要点」として正しいのはどれか。",choices:["同じ知識・能力を持つメンバーが集まることで効果が最大になる","取り組む課題の性質として「わかったつもり」や「手詰まり」から抜け出す必要がある時に効果が発揮される","協同の効果は課題の種類に関わらず常に個人作業より優れている","人数が多いほど協同の効果が高まる"],ans:1,exp:"協同の効果の要点：「わかったつもり」や「手詰まり」から抜け出す必要がある課題で効果が発揮される。多様な背景知識を持つメンバーが異なる視点から取り組む姿勢が重要。"},
{id:108,cat:"第2回【記憶の仕組み】",q:"「作動記憶の中央実行系」の役割として正しいのはどれか。",choices:["言語・音声情報を保持する","視覚・空間情報を保持する","従属システムを制御し長期記憶の情報へのアクセスを行う","感覚入力を一時的に保持する"],ans:2,exp:"中央実行系：従属システム（音韻ループ・視空間スケッチパッド）を制御し長期記憶の情報へのアクセスを行う。"},
{id:109,cat:"第6回【出来事や経験の記憶】",q:"「活性化拡散」の説明として最も正しいのはどれか。",choices:["ある概念が活性化されると関連概念も連鎖的に活性化される現象","感情状態が変化すると関連した記憶が想起されやすくなる現象","記憶が時間の経過とともに失われていく現象","繰り返し学習によって記憶が強化される現象"],ans:0,exp:"活性化拡散：ある概念（ノード）が活性化されると、ネットワーク上で関連する概念も連鎖的に活性化される現象。気分一致効果が生じる仕組み（感情から自動的に生じる）。"},
{id:110,cat:"第9回【学習意欲】",q:"「自律的な学習意欲のプロセスモデル」において「認知・感情」の役割として正しいのはどれか。",choices:["学習環境の安全性を評価する","面白さ・楽しさ・有能感・充実感が後続の授業で自発的学習が展開されることを促す","学習内容の難易度を評価する","他者との比較によって動機づけが生じる"],ans:1,exp:"認知・感情：面白さ・楽しさ・有能感・充実感は後続の授業での自発的学習を促す。学習行動がうまく終了しない場合、動機が修正されて新たな学習行動が展開される。"},
{id:111,cat:"第7回【メタ認知】",q:"「既知感」の説明として正しいのはどれか。",choices:["完全に記憶している内容についての確信","思い出せない時でも自分は確かに知っていると感じる感覚（既知感が強いほど後の再認課題が良い）","以前に会ったことがある人に感じる親しみの感覚","記憶の正確さについての評価"],ans:1,exp:"既知感：思い出せない時でも「自分は確かに知っている」と感じる感覚。既知感が強い問題ほど後の再認課題が良かった（Lachman et al., 1979）。「喉まで出かかる」状態に近い。"},
{id:112,cat:"第4回【知識の構造】",q:"「説明に基づく概念理論」の特徴として正しいのはどれか。",choices:["典型的な事例との類似性に基づいてカテゴリーを理解する","個々の事例の集合として概念を捉える","類似性ではなく概念がどのように説明されるかに着目する","カテゴリー間の関係をネットワークとして捉える"],ans:2,exp:"説明に基づく概念理論：プロトタイプや事例の「類似性」ではなく、概念がどのように説明されるかに着目した理論。本質や説明に焦点を当てる。"},
{id:113,cat:"第5回【知識獲得のメカニズム】",q:"「結果予期」と「効力予期」の違いとして正しいのはどれか。",choices:["結果予期：その行動を自分ができるかという予期　効力予期：行動と結果の関係についての予期","結果予期：ある行動をすれば同じ結果になるという予期　効力予期：その行動を自分ができるかという予期","結果予期と効力予期は同義","結果予期：強化の効果についての予期　効力予期：弱化の効果についての予期"],ans:1,exp:"結果予期：同じことをすれば同じ結果になるという予期。効力予期：その行動を自分ができるかという予期。結果予期＋効力予期→セルフエフィカシー（バンデューラ）につながる。"},
{id:114,cat:"第11回【心理臨床と学習心理学】",q:"「好ましくない行動維持の背景」（立ち歩きの例）において維持されている随伴性として正しいのはどれか。",choices:["好子出現による強化のみ","嫌子消失による強化のみ","好子出現による強化（正の強化）と嫌子消失による強化（負の強化）の両方","嫌子出現による弱化のみ"],ans:2,exp:"立ち歩きの維持：①先生が助けてくれる（正の強化・好子出現）②問題を解かずに済む（負の強化・嫌子消失）の両方が逃避条件づけとして問題行動を維持している。"},
{id:115,cat:"第3回【学習の基礎研究】",q:"連続強化と部分強化の違いとして正しいのはどれか。",choices:["連続強化は行動するたびに強化、部分強化はより強力に条件づける","連続強化は時間間隔で強化、部分強化は行動回数で強化","連続強化は消去抵抗が強く部分強化は弱い","両者に消去抵抗の差はない"],ans:0,exp:"連続強化：行動するたびに好子出現・嫌子消失。部分強化：何回かに1回だけ強化され、行動をより強力に条件づける。部分強化の方が消去抵抗が強い。"},
{id:116,cat:"第8回【言葉の発達と役割】",q:"「臨界期仮説」の説明として正しいのはどれか。",choices:["特定の年齢を超えると外国語習得能力が完全になくなることが証明されている","外国語習得能力は年齢的限界があり特定の年齢を超えると習得できなくなるという主張（支持しない研究も多い）","幼少期から英語学習を始めた方が必ず有利","母語の習得にも臨界期が存在し過ぎると習得できなくなる"],ans:1,exp:"臨界期仮説：外国語習得能力は年齢的限界があるという主張。しかしこれを支持しない研究結果も多く示されている。"},
{id:117,cat:"第10回【問題解決】",q:"「誤学習行動を減らす4ステップ」で最初に行うこととして正しいのはどれか。",choices:["予防策を取る・前もって状況を変えておく","その行動が生じる理由を知る（機能分析）","ダブルの対応で効率アップ（分化強化と消去）","弱化を適用する"],ans:1,exp:"誤学習行動を減らす4ステップ：①機能分析→②予防策・状況変更→③ダブルの対応（分化強化と消去）→④最後の手段として弱化。まず機能分析が最初。"},
{id:118,cat:"第1回【認知・学習入門】",q:"認知科学の説明として正しいのはどれか。",choices:["認知心理学と同義の学問","認知心理学・言語学・脳科学・情報工学など多様な隣接領域が合流した学際的・総合的な科学","脳の神経細胞の働きだけを研究する学問","行動の変化のみを研究する行動主義的な学問"],ans:1,exp:"認知科学：認知心理学・言語学・脳科学・情報工学など多様な隣接領域が合流した学際的・総合的な科学。認知心理学よりも広範囲に定義される。"},
{id:119,cat:"第3回【学習の基礎研究】",q:"「高次条件づけ」の日常的な例として適切なのはどれか。",choices:["電話番号を調べた後で番号を忘れる","好感度の高いタレントをCM起用して新商品の好感度を上げる","嫌いな食べ物を食べると気分が悪くなる","音楽を聴きながら勉強することで記憶が深まる"],ans:1,exp:"高次条件づけ：既に形成された条件づけをもとに新たな条件づけを形成すること。好感度の高いタレント（CS1）→商品（CS2）への好感度転移が典型例。"},
{id:120,cat:"第4回【知識の構造】",q:"「知識の構造の3層モデル」（Collins & Quillian, 1969）において検索時間が長くなる条件として正しいのはどれか。",choices:["概念間の意味的類似性が高いほど","ノードにたどり着くのに必要なリンクの距離が長いほど","記憶した回数が少ないほど","感情的な関連が強いほど"],ans:1,exp:"3層モデル（Collins & Quillian, 1969）：リンクの距離が長くなるほど検索時間がかかる。距離だけでなく意味・音の特徴もネットワーク化されている。"},
{id:121,cat:"第5回【知識獲得のメカニズム】",q:"「行動主義心理学」が捉えた学習の定義として正しいのはどれか。",choices:["学習を情報処理として捉える","学習を刺激と反応の連合として捉える","学習を概念のネットワーク形成として捉える","学習を認知的スキーマの更新として捉える"],ans:1,exp:"行動主義心理学：学習を「刺激と反応の連合」として捉える。認知心理学は「学習を情報処理として捉える」。両立場はそれぞれに学習の重要な側面を表している。"},
{id:122,cat:"第6回【出来事や経験の記憶】",q:"「記憶の再構成」について正しいのはどれか。",choices:["人間の記憶の再生はレコーダーに録音した情報の再生と同じ","人間の記憶は事実に基づいて他の部分を推量し「再構成」されるプロセスが生じる","記憶の再構成は病的な状態でのみ生じる","記憶の再構成は高齢者にのみ起こる"],ans:1,exp:"記憶の再構成：人間の記憶の再生はレコーダーと異なり、いくつかの事実に基づき他の部分を推量して「再構成」するプロセスが生じる。日常記憶においても同様。"},
{id:123,cat:"第7回【メタ認知】",q:"「相互教授法」の説明として正しいのはどれか。",choices:["教師が一方的に知識を伝達する方法","先生の視点に立って相手の学習状況をモニターし適切な読み方を指導することでメタ認知能力を高め熟達者の知識の内在化を目指す方法","グループで互いに教え合う学習方法","コンピューターを使って個別に学習を進める方法"],ans:1,exp:"相互教授法：先生の視点に立って相手の学習状況をモニターし、適切な読み方を指導することでメタ認知の能力を高め、熟達者のメタ認知的知識の内在化を目指す。"},
{id:124,cat:"第8回【言葉の発達と役割】",q:"「SPTs効果（Self-Performed Tasks効果）」の説明として正しいのはどれか。",choices:["社会的手抜きが生じることで集団の成果が低下する現象","筋運動感覚のような視覚や聴覚とは異なった別の感覚を用いることで記憶成績を高める効果","繰り返し提示によって記憶が強化される現象","手話による符号化が記憶成績を向上させる現象"],ans:1,exp:"SPTs効果：被験者が課題で指示される行為を実演すると記憶がよく想起される。筋運動感覚という別の感覚を用いることで記憶成績が高まる。TPRの効果の背景。"},
{id:125,cat:"第9回【学習意欲】",q:"「他律的な学習意欲」と「外発的な学習意欲」の関係として正しいのはどれか。",choices:["他律的と外発的は全く異なる概念","他律的と外発的は同様の意味だが本授業では「他律的」という表現を採用する","外発的は自律的意欲の一種","他律的は内発的意欲の一種"],ans:1,exp:"本授業では「controlled（被統制的）」の訳として「外発的な学習意欲」と「他律的な学習意欲」は同様の意味だが、ニュアンスを考慮して「他律的」という表現を採用している。"},
{id:126,cat:"第10回【問題解決】",q:"「不良定義問題」の説明として正しいのはどれか。",choices:["解決策が存在しない問題","問題空間を構成する要素が明確でない問題（日常の問題の多くはこれ）","答えが複数存在する問題","倫理的な判断が必要な問題"],ans:1,exp:"不良定義問題：問題空間が明確にされていない問題。日常生活の中で取り組む問題の多くはこれに該当する。問題空間が明確な場合は「良定義問題」。"},
{id:127,cat:"第11回【心理臨床と学習心理学】",q:"産業現場での心理臨床の役割として正しいのはどれか。",choices:["2020年よりストレスチェックが義務化された","2015年12月よりストレスチェック義務化に伴う実施者としての役割・産業保健面談・復職支援プログラム等","精神疾患患者のみを対象とする","チーム医療には参加しない"],ans:1,exp:"産業現場：2015年12月よりストレスチェック義務化。産業保健面談・スクリーニング面接・事業所内外の心理カウンセリング・休職中支援・復職支援プログラム等。"},
{id:128,cat:"第12回【協同の効果】",q:"「親和動機（所属欲求）」の説明として正しいのはどれか。",choices:["競争に勝ちたいという基本的欲求","他者と密接に関係を築いたり誰かに受け入れられたいという基本的欲求","自分の能力を証明したいという欲求","物事を自分でコントロールしたいという欲求"],ans:1,exp:"親和動機（所属欲求）：人が集団を形成する基本的欲求。不安な状況で顕在化し、集団から孤立すると心身の健康を損なう可能性がある。"},
{id:129,cat:"第2回【記憶の仕組み】",q:"「転送の失敗」を防ぐために有効な記銘方略として正しいのはどれか。",choices:["無精緻化リハーサル（そのまま繰り返す）","精緻化リハーサル（有意味化・体制化・物語化等）","感覚登録から注意を外す","短期貯蔵庫への情報量を増やす"],ans:1,exp:"転送の失敗を防ぐ：精緻化リハーサル（有意味化・体制化・チャンク化・物語化・イメージ化等）によって深い処理を行うことで長期貯蔵庫への転送が促進される。"},
{id:130,cat:"第3回【学習の基礎研究】",q:"「行動の機能（働き）」の4つとして正しいのはどれか。",choices:["強化・弱化・消去・般化","物や活動が得られる・注目が得られる・逃避・回避できる・感覚が得られる","好子出現・嫌子出現・好子消失・嫌子消失","記銘・保持・想起・忘却"],ans:1,exp:"行動の機能（働き）4つ：①物や活動が得られる（例：飲み物・ケアの獲得）②注目が得られる③逃避・回避できる④感覚が得られる。4つのどれか・または複数が重なっている。"},
{id:131,cat:"第4回【知識の構造】",q:"「意味記憶のネットワーク」（Collins & Loftus, 1975）において距離以外にネットワーク化されているものとして正しいのはどれか。",choices:["記憶した時刻と場所","意味や音の特徴も情報としてネットワーク化されている","記憶に伴った感情のみ","記憶の鮮明度のみ"],ans:1,exp:"Collins & Loftus（1975）の意味記憶のネットワーク：「距離」だけでなく「意味」や「音」の特徴も情報としてネットワーク化されている。"},
{id:132,cat:"第5回【知識獲得のメカニズム】",q:"エピソード記憶と意味記憶が共に対応する脳部位として正しいのはどれか。",choices:["前頭前野・帯状回","側頭葉内側部（海馬）・間脳","大脳基底核・小脳","扁桃体・線条体"],ans:1,exp:"エピソード記憶・意味記憶：側頭葉内側部（海馬）・間脳と対応。手続き記憶（技能・習慣）：小脳・大脳基底核。古典的条件づけ：扁桃体・小脳。プライミング：大脳新皮質。"},
{id:133,cat:"第6回【出来事や経験の記憶】",q:"「目撃証言の保持段階」における問題として正しいのはどれか。",choices:["衝撃的な場面では中心情報より周辺情報をよく覚えている","スキーマの元でまとめられた記憶は変容しやすいが衝撃的な出来事は忘却が起きにくいともいわれる","質問の言葉の違いによって記憶の再構成が変わる（想起段階の問題）","凶器に注意が集中して他の情報が記憶されない（記銘段階の問題）"],ans:1,exp:"保持段階：スキーマの元でまとめられた記憶は変容しやすい。しかし衝撃的な出来事は忘却が起きにくいともいわれ、目撃証言は意外性があり注意が向けられた内容でむしろ正確な情報という可能性もある。"},
{id:134,cat:"第7回【メタ認知】",q:"「TOTEユニット」を提唱した研究者と年代として正しいのはどれか。",choices:["フラヴェル（1979年）","ミラーら（1960年）","バデリー（1992年）","アッシュ（1951年）"],ans:1,exp:"TOTEユニット（テストする—操作する—テストする—抜け出す）はMiller et al.（1960年）が提唱。メタ認知研究の先駆的な研究。"},
{id:135,cat:"第8回【言葉の発達と役割】",q:"コミュニケーションの6機能のうち「メタ言語機能」の例として正しいのはどれか。",choices:["「ねえねえ」（受信者への働きかけ）","「なんて嬉しいんだ！」（発信者の感情）","「Sophomore ってどういう意味？」（言語の意味について）","「◯◯さんから電話がありました」（状況の伝達）"],ans:2,exp:"コミュニケーション6機能：①指示的（文脈/状況）②主情的（発信者の感情）③働きかけ（受信者への影響）④メタ言語（言語の意味について）⑤詩的（表現）⑥交話的（コミュニケーション維持）。"},
{id:136,cat:"第9回【学習意欲】",q:"「自律的な学習意欲の発現プロセスモデル」における「欲求・動機」として正しいのはどれか。",choices:["不安の解消","知的好奇心・有能さへの欲求・向社会的欲求","他者からの評価への期待","環境への適応"],ans:1,exp:"自律的学習意欲の発現プロセス（欲求・動機）：知的好奇心・もっとわかるようになりたい・学びたいという有能さへの欲求・向社会的欲求が喚起される。"},
{id:137,cat:"第10回【問題解決】",q:"「認知地図」の説明として正しいのはどれか。",choices:["頭の中に保持された地理的な空間情報のみを指す概念","環境への認知の成立として、どのような手段を取るべきかという手段—目標関係の知識","問題解決のための体系的な手順（アルゴリズム）","他者の行動を観察して形成された行動マップ"],ans:1,exp:"トールマンの認知地図：ある環境で目的を達成するためにどのような手段を取るべきかという手段—目標関係を知ること＝環境への認知の成立。迷路学習で証明された。"},
{id:138,cat:"第11回【心理臨床と学習心理学】",q:"「暴露反応妨害法」の説明として正しいのはどれか。",choices:["エクスポージャー法に加えて不安への回避行動（嫌子消失による強化の悪循環）も断ち切ることを目指す","不安階層表を作成して段階的に脱感作を行う","認知の歪みを修正して不安を軽減する","薬物療法と組み合わせて行う暴露療法"],ans:0,exp:"暴露反応妨害法：エクスポージャー法＋不安への回避行動（嫌子消失による強化の悪循環）を断ち切る。強迫症患者に手を汚させ洗わずに過ごさせる例が典型。"},
{id:139,cat:"第12回【協同の効果】",q:"「集団規範の効果」として「目的達成機能」の説明として正しいのはどれか。",choices:["集団メンバーの服装・価値観・態度が類似する","規範が他メンバーの行動を予測しやすくし協力関係を促進する装置として機能する","少数派の意見が多数派に影響を与える","集団の人数が増加する"],ans:1,exp:"集団規範の効果②目的達成機能：規範が存在することで他のメンバーの行動を予測し、メンバー間の相互作用や協力関係を容易にする。しかし規範内容が望ましくないと「諸刃の剣」にもなる。"},
{id:140,cat:"第9回【学習意欲】",q:"「反転項目」の例として「勉強は苦手ですか」があるが、この質問で「有能感が高い」を示すのはどれか。",choices:["「はい」と回答","「いいえ」と回答","「ややあてはまる」と回答","「どちらでもない」と回答"],ans:1,exp:"反転項目：「勉強は苦手ですか」という負の方向の質問に「いいえ」と答えることが有能感が高いことを意味する。回答傾向の歪みを防ぐために使用される。"},
{id:141,cat:"第3回【学習の基礎研究】",q:"「弱化（罰）の副作用」として誤っているものはどれか。",choices:["特定反応だけでなく他の多くの反応も抑制してしまうことがある","弱化によって反応が完全に消失した後は再び出現しない","強い嫌悪刺激が恐怖反応・攻撃反応・不適応行動を起こすことがある","嫌悪刺激が実際は好子になり誤って強化してしまうことがある"],ans:1,exp:"弱化の副作用②：弱化によって反応が抑制されても弱化が来ない状況になればその反応は回復し一時的に顕著な反応増加を起こす。つまり完全消失はしない。"},
{id:142,cat:"第2回【記憶の仕組み】",q:"「処理水準理論」の研究者と年代として正しいのはどれか。",choices:["アトキンソンとシフリン（1971年）","クレイクとタルビング（1975年）","バデリー（1992年）","コリンズとキリアン（1969年）"],ans:1,exp:"処理水準理論はCraik & Tulving（1975年）が提唱。形態→音韻→意味の処理水準が深いほど記憶成績が高まることを示した。"},
{id:143,cat:"第4回【知識の構造】",q:"人の「意味記憶」は何によって成り立っていると考えられているか。",choices:["エピソード記憶と手続き記憶","概念とカテゴリー","顕在記憶と潜在記憶","短期記憶と長期記憶"],ans:1,exp:"人の意味記憶は概念とカテゴリーによって成り立っていると考えられる。概念はカテゴリーの事例に共通した特徴を抽象化したもの。"},
{id:144,cat:"第6回【出来事や経験の記憶】",q:"日常記憶（自伝的記憶）の研究が生まれた背景として正しいのはどれか。",choices:["実験室での研究が日常場面では役立たないという批判が起きたこと","実験室での研究が日常場面で完全に適用できることが証明されたこと","日常記憶の方が実験室記憶より劣ることが明らかになったこと","コンピューターの発展によって日常記憶の研究が可能になったこと"],ans:0,exp:"日常記憶（自伝的記憶）の研究背景：実験で解明された記憶の知見が日常場面では役立たないという批判から日常認知（everyday cognition）アプローチが生まれた。"},
{id:145,cat:"第7回【メタ認知】",q:"メタ記憶の発達研究（フラヴェル）において10歳頃に達成される段階として正しいのはどれか。",choices:["覚えることを求められていると理解するⅠの段階のみ","ⅡⅢは実行困難","課題が記憶することを求められていると理解しふさわしい方略を選択し実行できる（Ⅰ〜Ⅲ全段階）","体制化方略のみを自発的に使用できる"],ans:2,exp:"メタ記憶の発達：5歳はⅠの段階のみ通過。ⅡⅢは実行困難。10歳頃にはⅠ〜Ⅲの段階を自発的に遂行できる（課題を理解→ふさわしい方略を選択→実行）。"},
{id:146,cat:"第8回【言葉の発達と役割】",q:"「身体の動きを活用した手話学習」について正しいのはどれか。",choices:["手話は視覚情報のみで記憶され身体の動きは関係しない","手話言語を使用するろう者が単語を記憶する時に実際に手を動かして手話的な形態に情報を符号化することで記憶成績が上昇する","手話は音韻ループを使用する","手話の習得には特別な言語獲得装置（LAD）が必要"],ans:1,exp:"手話学習と符号化：ろう者が単語を記憶する時に実際に手を動かして手話的な形態に情報を符号化することで記憶成績が上昇する。看護やリハビリ領域にも応用できる視点。"},
{id:147,cat:"第9回【学習意欲】",q:"「学習意欲の測定」において「方向」と「エネルギー」に対応するものとして正しいのはどれか。",choices:["方向→有能感　エネルギー→学習理由","方向→学習理由　エネルギー→学習に対する有能感","方向→内発的意欲　エネルギー→他律的意欲","方向→動機　エネルギー→強化"],ans:1,exp:"学習意欲の測定：学習意欲は方向（自律的/他律的）とエネルギー（意欲の力）で示す。学習理由は方向に対応し、学習に対する有能感はエネルギーに対応している。"},
{id:148,cat:"第10回【問題解決】",q:"「ヒューリスティック」の説明として正しいのはどれか。",choices:["正しく実行すれば必ず解決にたどり着くことが保証されている方略","成功が確実ではないものの効率的な問題解決の方略","あり得るオペレータを全て吟味する方略","問題空間を明確にしてから解決策を探す方略"],ans:1,exp:"ヒューリスティック：成功が確実ではないものの、効率的な問題解決の方略（P191）。手段—目標分析などがこれに当たる。アルゴリズムは必ず解決するが時間がかかる。"},
{id:149,cat:"第11回【心理臨床と学習心理学】",q:"「行動の誤学習」の例として最も適切なのはどれか。",choices:["挨拶ができない","仕事が長続きしない","止めたいのにどうしても間食してしまう","言語発達が遅れている"],ans:2,exp:"行動の誤学習：ある場面で行動することで何らかのよい結果が生じるために行動が強化されていて、その行動がその場面では相応しくなかった場合（例：間食で満足感→間食行動が強化）。"},
{id:150,cat:"第12回【協同の効果】",q:"「集団実体性」の説明として正しいのはどれか。",choices:["集団が設定した目標の具体性の程度","特徴を多く強く備える集団ほどまとまりがよく集団としての存在感が強いこと","集団内での役割分担の明確さ","集団の人数の多さ"],ans:1,exp:"集団実体性：特徴を多く強く備える集団ほどまとまりがよく集団としての存在感が強い。"}
];

const CATS=["すべて",...new Set(ALL_Q.map(q=>q.cat))];
let filtered=[],idx=0,answered=false,score=0,total=0,wrong=[],curCat="すべて";

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function setFiltered(){
  filtered=curCat==="すべて"?[...ALL_Q]:ALL_Q.filter(q=>q.cat===curCat);
  shuffle(filtered);idx=0;score=0;total=0;wrong=[];
}

function show(id){
  ["view-menu","view-quiz","view-result"].forEach(v=>{
    document.getElementById(v).style.display=v===id?"":"none";
  });
}

function renderMenu(){
  show("view-menu");
  document.getElementById("view-menu").innerHTML=`
<p style="font-size:14px;color:#555;margin-bottom:.75rem">カテゴリーを選択してスタート</p>
<div class="cat-grid">${CATS.map(c=>`<button class="cat-btn${c===curCat?" active":""}" onclick="selectCat('${c}')">${c}</button>`).join("")}</div>
<div style="display:flex;gap:10px;margin-top:1.25rem;flex-wrap:wrap">
  <button class="btn" onclick="startQuiz()">▶ ${curCat==="すべて"?"全150問":"このカテゴリーで"}スタート</button>
  ${wrong.length>0?`<button class="btn-outline" onclick="retryWrong()">↩ 間違えた問題を復習（${wrong.length}問）</button>`:""}
</div>`;
}

function selectCat(c){curCat=c;renderMenu();}

function startQuiz(){setFiltered();show("view-quiz");renderQ();}

function retryWrong(){
  filtered=[...wrong];shuffle(filtered);
  idx=0;score=0;total=0;wrong=[];
  show("view-quiz");renderQ();
}

function renderQ(){
  if(idx>=filtered.length){renderResult();return;}
  const q=filtered[idx];answered=false;
  const pct=Math.round(idx/filtered.length*100);
  document.getElementById("view-quiz").innerHTML=`
<div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="stat-row">
  <span class="stat">${idx+1} / ${filtered.length}問</span>
  <span class="stat">正解率 ${total>0?Math.round(score/total*100):0}%（${score}/${total}）</span>
  <button class="btn-outline" onclick="renderMenu()" style="font-size:12px;padding:.3rem .75rem">メニューへ</button>
</div>
<div class="q-card">
  <div class="q-meta">${q.cat}</div>
  <p class="q-text">Q${q.id}. ${q.q}</p>
  <div class="choices" id="choices">
    ${q.choices.map((c,i)=>`<button class="choice" onclick="answer(${i})" id="c${i}">${["①","②","③","④"][i]} ${c}</button>`).join("")}
  </div>
  <div class="explain" id="explain">💡 ${q.exp}</div>
</div>
<div id="nav" style="display:none;margin-top:.75rem">
  <button class="btn" onclick="next()">次の問題 →</button>
</div>`;
}

function answer(i){
  if(answered)return;answered=true;total++;
  const q=filtered[idx];
  document.querySelectorAll(".choice").forEach(b=>b.disabled=true);
  if(i===q.ans){score++;document.getElementById("c"+i).classList.add("correct");}
  else{document.getElementById("c"+i).classList.add("wrong");document.getElementById("c"+q.ans).classList.add("reveal");wrong.push(q);}
  document.getElementById("explain").classList.add("show");
  document.getElementById("nav").style.display="block";
}

function next(){idx++;renderQ();}

function renderResult(){
  show("view-result");
  const pct=Math.round(score/total*100);
  const msg=pct>=90?"🎉 すばらしい！合格圏内です！":pct>=70?"👍 よくできました！":pct>=50?"📖 もう少し復習しましょう":"💪 もう一度チャレンジ！";
  document.getElementById("view-result").innerHTML=`
<div class="score-card">
  <p class="score-label">${curCat==="すべて"?"全カテゴリー":curCat}</p>
  <div class="score-big">${pct}%</div>
  <p class="score-label">${score} / ${total} 問正解</p>
  <p class="score-msg">${msg}</p>
  ${wrong.length>0?`<p style="font-size:13px;color:#888;margin-top:.5rem">間違えた問題：${wrong.length}問</p>`:""}
  <div class="result-btns">
    ${wrong.length>0?`<button class="btn" onclick="retryWrong()">↩ 間違えた問題を復習</button>`:""}
    <button class="btn" onclick="startQuiz()">▶ もう一度</button>
    <button class="btn-outline" onclick="renderMenu()">メニューへ</button>
  </div>
</div>`;
}

renderMenu();
</script>
</body>
</html>
