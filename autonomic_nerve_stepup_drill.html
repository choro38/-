
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--text-primary);font-size:15px;line-height:1.8}
.wrap{padding:1rem 0}
.mode-row{display:flex;gap:8px;margin-bottom:1.25rem}
.mode-btn{padding:.35rem .9rem;font-size:13px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-secondary);cursor:pointer}
.mode-btn.active{background:var(--fill-accent);color:var(--on-accent);border-color:transparent}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:.75rem;overflow:hidden}
.progress-fill{height:100%;background:var(--fill-accent);border-radius:2px;transition:width .3s}
.counter{font-size:13px;color:var(--text-secondary);margin-bottom:1rem}
.block-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem;line-height:2}
.block-title{font-size:12px;font-weight:500;color:var(--text-accent);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.04em}
.blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--border-accent);margin:0 4px;vertical-align:bottom;text-align:center;color:var(--text-accent);font-weight:500;cursor:pointer;padding:0 4px}
.blank.filled{border-bottom-color:var(--border-success);color:var(--text-success)}
.blank.wrong{border-bottom-color:var(--border-danger);color:var(--text-danger)}
.blank input{border:none;outline:none;background:transparent;font-family:var(--font-sans);font-size:15px;color:var(--text-primary);width:100%;text-align:center}
.choices{display:flex;flex-wrap:wrap;gap:8px;margin-top:1rem}
.choice{padding:.3rem .8rem;font-size:13px;border:0.5px solid var(--border-strong);border-radius:20px;cursor:pointer;background:var(--surface-1);color:var(--text-primary)}
.choice:hover{background:var(--bg-accent);border-color:var(--border-accent);color:var(--text-accent)}
.choice.used{opacity:.35;pointer-events:none}
.btn-row{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap}
button{padding:.4rem .9rem;font-size:13px;font-family:var(--font-sans);border-radius:var(--radius);border:0.5px solid var(--border-strong);background:transparent;color:var(--text-primary);cursor:pointer}
button:hover{background:var(--surface-1)}
button.primary{background:var(--fill-accent);color:var(--on-accent);border-color:transparent}
button.primary:hover{opacity:.9}
.answer-box{display:none;margin-top:1rem;padding:1rem;background:var(--bg-success);border-left:3px solid var(--border-success);font-size:14px;line-height:1.8;color:var(--text-primary)}
.answer-box.show{display:block}
.answer-label{font-size:11px;font-weight:500;color:var(--text-success);margin-bottom:.4rem}
.result-badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:var(--radius);margin-left:8px}
.badge-ok{background:var(--bg-success);color:var(--text-success)}
.badge-ng{background:var(--bg-danger);color:var(--text-danger)}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem}
.nav-row button{min-width:80px}
.done-box{text-align:center;padding:2rem 1rem}
.done-box .big{font-size:26px;font-weight:500;margin-bottom:.5rem}
.done-box .sub{font-size:14px;color:var(--text-secondary);margin-bottom:1.5rem}
textarea{width:100%;min-height:100px;padding:.6rem .75rem;font-size:14px;font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-1);border:0.5px solid var(--border-strong);border-radius:var(--radius);resize:vertical;line-height:1.8;margin-top:.5rem}
textarea:focus{outline:none;border-color:var(--border-accent)}
</style>

<div class="wrap">
  <div class="mode-row">
    <button class="mode-btn active" onclick="setMode('select',this)">Step1 選択式</button>
    <button class="mode-btn" onclick="setMode('write',this)">Step2 記述式</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="counter" id="counter">1 / 5</div>
  <div id="card"></div>
  <div class="nav-row">
    <button onclick="go(-1)" id="btn-prev" disabled>← 前へ</button>
    <button class="primary" onclick="go(1)" id="btn-next">次へ →</button>
  </div>
  <div class="done-box" id="done-box" style="display:none">
    <div class="big" id="done-title">完了！</div>
    <div class="sub" id="done-sub"></div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button onclick="restart()">もう一度</button>
      <button class="primary" onclick="nextMode()">次のステップへ →</button>
    </div>
  </div>
</div>

<script>
const blocks=[
  {
    title:"末梢自律神経系の構成",
    template:"末梢自律神経系は[交感神経系]、[副交感神経系]、[内臓求心性線維]の3つで構成される。交感・副交感は[遠心路]として自律機能を調節し、内臓求心性線維は[求心路]として情報を中枢へ送る。",
    answer:"末梢自律神経系は交感神経系、副交感神経系、内臓求心性線維の3つで構成される。交感・副交感は遠心路として自律機能を調節し、内臓求心性線維は求心路として情報を中枢へ送る。",
    choices:["交感神経系","副交感神経系","内臓求心性線維","遠心路","求心路","運動神経","感覚神経"],
  },
  {
    title:"自律神経系の特徴",
    template:"自律神経系の特徴として、①[自律性]（不随意）、②[二重支配]、③[拮抗支配]の3点があげられる。ほとんどの内臓器官は交感・副交感の両方から支配を受け（二重支配）、互いに[逆]の作用をする（拮抗支配）。",
    answer:"自律神経系の特徴として、①自律性（不随意）、②二重支配、③拮抗支配の3点があげられる。ほとんどの内臓器官は交感・副交感の両方から支配を受け（二重支配）、互いに逆の作用をする（拮抗支配）。",
    choices:["自律性","二重支配","拮抗支配","逆","同じ","緊張性支配","随意性"],
  },
  {
    title:"交感神経系の経路と伝達物質",
    template:"交感神経節前線維は第[1]胸髄から第[3]腰髄の側柱に始まり、[交感神経節]（傍脊椎・椎前）でニューロンをかえ節後線維となる。節前はACh（[アセチルコリン]）、節後は一般に[NA]（ノルアドレナリン）を放出する。ただし[汗腺]のみ節後もAChを放出する。",
    answer:"交感神経節前線維は第1胸髄から第3腰髄の側柱に始まり、交感神経節（傍脊椎・椎前）でニューロンをかえ節後線維となる。節前はACh（アセチルコリン）、節後は一般にNA（ノルアドレナリン）を放出する。ただし汗腺のみ節後もAChを放出する。",
    choices:["1","3","交感神経節","アセチルコリン","NA","汗腺","副腎髄質","2","4"],
  },
  {
    title:"副交感神経系の経路と伝達物質",
    template:"副交感神経節前線維は[脳幹]および第[2]〜[4]仙髄の側柱に始まり、効果器の近くにある[壁内神経節]でニューロンをかえる。節前・節後ともに[ACh]（アセチルコリン）を放出する。節前ニューロンが[長く]、節後ニューロンが短いことが特徴である。",
    answer:"副交感神経節前線維は脳幹および第2〜4仙髄の側柱に始まり、効果器の近くにある壁内神経節でニューロンをかえる。節前・節後ともにACh（アセチルコリン）を放出する。節前ニューロンが長く、節後ニューロンが短いことが特徴である。",
    choices:["脳幹","2","4","壁内神経節","ACh","長く","短く","傍脊椎神経節","NA"],
  },
  {
    title:"内臓求心性線維と副交感の中枢核",
    template:"内臓求心性線維は交感・副交感に平行して[脊髄]または[脳幹]へ投射する求心路であり、情報は[意識されない]ことが殆どであるが、[反射性]の反応を引き起こす。副交感の中枢核はEdinger-Westphal核（[Ⅲ]）、上唾液核（[Ⅶ]）、下唾液核（[Ⅸ]）、迷走神経背側核・疑核（[Ⅹ]）である。",
    answer:"内臓求心性線維は交感・副交感に平行して脊髄または脳幹へ投射する求心路であり、情報は意識されないことが殆どであるが、反射性の反応を引き起こす。副交感の中枢核はEdinger-Westphal核（Ⅲ）、上唾液核（Ⅶ）、下唾液核（Ⅸ）、迷走神経背側核・疑核（Ⅹ）である。",
    choices:["脊髄","脳幹","意識されない","反射性","Ⅲ","Ⅶ","Ⅸ","Ⅹ","Ⅱ","Ⅵ"],
  },
];

let mode='select', idx=0;

function setMode(m, el){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  idx=0;
  document.getElementById('done-box').style.display='none';
  document.getElementById('card').style.display='block';
  document.querySelector('.nav-row').style.display='flex';
  render();
}

function parseTemplate(tpl){
  const parts=[];
  let last=0, bi=0;
  const re=/\[([^\]]+)\]/g;
  let m;
  while((m=re.exec(tpl))!==null){
    if(m.index>last) parts.push({type:'text',text:tpl.slice(last,m.index)});
    parts.push({type:'blank',answer:m[1],idx:bi++});
    last=m.index+m[0].length;
  }
  if(last<tpl.length) parts.push({type:'text',text:tpl.slice(last)});
  return parts;
}

function render(){
  const b=blocks[idx];
  const total=blocks.length;
  document.getElementById('prog').style.width=((idx)/total*100)+'%';
  document.getElementById('counter').textContent=(idx+1)+' / '+total;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').textContent=idx===total-1?'完了':'次へ →';

  if(mode==='select') renderSelect(b);
  else renderWrite(b);
}

function renderSelect(b){
  const parts=parseTemplate(b.template);
  const answers=parts.filter(p=>p.type==='blank').map(p=>p.answer);
  const chosen=new Array(answers.length).fill(null);

  let html=`<div class="block-card"><div class="block-title">${b.title}</div><div id="sentence">`;
  parts.forEach(p=>{
    if(p.type==='text') html+=p.text.replace(/\n/g,'<br>');
    else html+=`<span class="blank" id="bl${p.idx}" onclick="clearBlank(${p.idx})">　　　</span>`;
  });
  html+=`</div><div class="choices" id="choices">`;
  const shuffled=[...b.choices].sort(()=>Math.random()-.5);
  shuffled.forEach((c,i)=>{ html+=`<span class="choice" id="ch${i}" onclick="fillBlank(${i},'${c}',${answers.indexOf(c)})">${c}</span>`; });
  html+=`</div>`;
  html+=`<div class="btn-row"><button class="primary" onclick="checkSelect()">答え合わせ</button><button onclick="showAns()">解答を見る</button></div>`;
  html+=`<div class="answer-box" id="ans-box"><div class="answer-label">模範解答</div>${b.answer}</div></div>`;
  document.getElementById('card').innerHTML=html;

  window._answers=answers;
  window._chosen=chosen;
  window._choiceMap={};
  shuffled.forEach((c,i)=>{ window._choiceMap[i]=c; });
}

function fillBlank(ci, val, bi){
  if(bi<0) return;
  const ch=document.getElementById('ch'+ci);
  if(ch.classList.contains('used')) return;
  const empty=window._chosen.indexOf(null);
  const target=empty>=0?empty:null;
  if(target===null) return;
  window._chosen[target]=val;
  const bl=document.getElementById('bl'+target);
  bl.textContent=val;
  bl.dataset.ci=ci;
  ch.classList.add('used');
}

function clearBlank(bi){
  const bl=document.getElementById('bl'+bi);
  const ci=bl.dataset.ci;
  if(ci===undefined) return;
  window._chosen[bi]=null;
  bl.textContent='　　　';
  bl.classList.remove('filled','wrong');
  delete bl.dataset.ci;
  document.getElementById('ch'+ci).classList.remove('used');
}

function checkSelect(){
  let ok=true;
  window._answers.forEach((ans,i)=>{
    const bl=document.getElementById('bl'+i);
    if(window._chosen[i]===ans){
      bl.classList.add('filled');
      bl.classList.remove('wrong');
    } else {
      bl.classList.add('wrong');
      bl.classList.remove('filled');
      ok=false;
    }
  });
  if(ok) document.getElementById('ans-box').classList.add('show');
}

function showAns(){
  document.getElementById('ans-box').classList.add('show');
}

function renderWrite(b){
  let html=`<div class="block-card"><div class="block-title">${b.title}</div>`;
  html+=`<div style="font-size:13px;color:var(--text-secondary);margin-bottom:.5rem">下の文章を自分の言葉で書いてみよう</div>`;
  html+=`<div style="font-size:13px;color:var(--text-muted);margin-bottom:.75rem">${b.title}について説明しなさい</div>`;
  html+=`<textarea id="user-text" placeholder="ここに書いてみよう…"></textarea>`;
  html+=`<div class="btn-row"><button onclick="showAnsWrite()">模範解答を確認</button></div>`;
  html+=`<div class="answer-box" id="ans-box"><div class="answer-label">模範解答</div>${b.answer}</div></div>`;
  document.getElementById('card').innerHTML=html;
}

function showAnsWrite(){
  document.getElementById('ans-box').classList.add('show');
}

function go(d){
  const total=blocks.length;
  if(d===1&&idx===total-1){
    document.getElementById('card').style.display='none';
    document.querySelector('.nav-row').style.display='none';
    const box=document.getElementById('done-box');
    box.style.display='block';
    document.getElementById('prog').style.width='100%';
    document.getElementById('counter').textContent=total+' / '+total;
    if(mode==='select'){
      document.getElementById('done-title').textContent='選択式 完了！';
      document.getElementById('done-sub').textContent='次は記述式で自分の言葉で書いてみよう💪';
    } else {
      document.getElementById('done-title').textContent='記述式 完了！';
      document.getElementById('done-sub').textContent='試験本番もこの調子で！お疲れ様でした🎉';
      document.querySelector('#done-box .primary').style.display='none';
    }
    return;
  }
  idx=Math.max(0,Math.min(total-1,idx+d));
  render();
}

function restart(){
  idx=0;
  document.getElementById('card').style.display='block';
  document.querySelector('.nav-row').style.display='flex';
  document.getElementById('done-box').style.display='none';
  render();
}

function nextMode(){
  const btn=document.querySelector('.mode-btn:nth-child(2)');
  setMode('write',btn);
}

render();
</script>
