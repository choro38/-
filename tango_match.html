<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認知・学習心理学 用語マッチングクイズ</title>
<style>
:root{
  --bg:#f0f4f0;--card:#fff;--primary:#1b5e20;--mid:#2e7d32;
  --light:#e8f5e9;--accent:#f57f17;--accent-l:#fff8e1;
  --danger:#b71c1c;--danger-l:#ffebee;
  --text:#1a1a1a;--sub:#666;--border:#cfd8dc;
  --r:10px;--sh:0 2px 10px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* ヘッダー */
header{background:var(--primary);color:#fff;padding:14px 16px 12px;
  text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{font-size:1.05rem;font-weight:700}
header p{font-size:.72rem;margin-top:3px;opacity:.85}

/* 単元タブ */
#unit-screen{max-width:560px;margin:24px auto;padding:0 14px}
#unit-screen h2{text-align:center;font-size:1.2rem;color:var(--primary);margin-bottom:6px}
#unit-screen p{text-align:center;color:var(--sub);font-size:.85rem;margin-bottom:18px}
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.unit-btn{
  background:var(--card);border:2px solid var(--border);border-radius:var(--r);
  padding:14px 12px;cursor:pointer;text-align:left;
  transition:all .15s;box-shadow:var(--sh)
}
.unit-btn:hover{border-color:var(--mid);background:var(--light);transform:translateY(-2px)}
.unit-btn .u-icon{font-size:1.5rem;display:block;margin-bottom:6px}
.unit-btn .u-name{font-size:.88rem;font-weight:700;color:var(--primary);display:block}
.unit-btn .u-count{font-size:.72rem;color:var(--sub);margin-top:3px}
.unit-btn .u-tag{
  display:inline-block;font-size:.68rem;font-weight:700;
  background:var(--accent-l);color:var(--accent);
  border-radius:4px;padding:2px 7px;margin-top:6px
}

/* クイズ画面 */
#quiz-screen{display:none;max-width:600px;margin:0 auto;padding:14px 14px 48px}

/* 上部バー */
.q-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.btn-back{background:none;border:none;color:var(--sub);font-size:.82rem;
  cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .15s}
.btn-back:hover{background:var(--border)}
.q-unit-name{font-size:.78rem;font-weight:700;color:var(--primary)}
.q-prog{margin-left:auto;font-size:.75rem;color:var(--sub)}

/* プログレスバー */
.prog-wrap{height:5px;background:#ddd;border-radius:3px;margin-bottom:16px}
.prog-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}

/* 用語カード */
.word-card{
  background:var(--primary);color:#fff;border-radius:var(--r);
  padding:22px 20px;margin-bottom:14px;text-align:center;
  box-shadow:0 4px 16px rgba(27,94,32,.25)
}
.word-label{font-size:.7rem;opacity:.75;letter-spacing:.1em;margin-bottom:8px}
.word-main{font-size:1.25rem;font-weight:800;line-height:1.5}
.word-hint{font-size:.75rem;opacity:.7;margin-top:8px;font-style:italic}
.confuse-badge{
  display:inline-block;background:var(--accent);color:#fff;
  font-size:.65rem;font-weight:700;border-radius:4px;
  padding:2px 8px;margin-top:8px
}

/* 選択肢 */
.choices{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.choice{
  background:var(--card);border:2px solid var(--border);border-radius:var(--r);
  padding:13px 15px;cursor:pointer;font-size:.88rem;line-height:1.65;
  text-align:left;transition:all .15s;display:flex;align-items:flex-start;gap:10px
}
.choice:hover:not(:disabled){border-color:var(--mid);background:var(--light);transform:translateX(3px)}
.choice:disabled{cursor:default}
.choice.correct{border-color:var(--mid);background:var(--light)}
.choice.wrong{border-color:var(--danger);background:var(--danger-l)}
.choice.dim{opacity:.4}
.choice-mark{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;
  background:var(--border);font-size:.72rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  color:var(--sub);margin-top:1px
}
.choice.correct .choice-mark{background:var(--mid);color:#fff}
.choice.wrong   .choice-mark{background:var(--danger);color:#fff}

/* フィードバック */
.feedback{
  border-radius:var(--r);padding:13px 15px;margin-bottom:14px;
  font-size:.86rem;line-height:1.75;display:none
}
.feedback.ok{background:var(--light);border-left:4px solid var(--mid)}
.feedback.ng{background:var(--danger-l);border-left:4px solid var(--danger)}
.fb-head{font-weight:800;margin-bottom:5px;font-size:.92rem}
.feedback.ok .fb-head{color:var(--primary)}
.feedback.ng .fb-head{color:var(--danger)}
/* 混同ポイント枠 */
.confuse-box{
  background:#fff3e0;border-left:3px solid var(--accent);
  border-radius:6px;padding:9px 12px;margin-top:9px;font-size:.82rem;color:#5d4037
}
.confuse-box strong{color:var(--accent)}

.btn-next{
  width:100%;background:var(--primary);color:#fff;border:none;
  border-radius:var(--r);padding:13px;font-size:.95rem;font-weight:700;
  cursor:pointer;display:none;transition:background .2s
}
.btn-next:hover{background:#0a3d0a}

/* 結果 */
#result-screen{display:none;max-width:500px;margin:24px auto;padding:0 14px 48px;text-align:center}
.res-card{background:var(--card);border-radius:var(--r);padding:28px 20px;box-shadow:var(--sh);margin-bottom:16px}
.score-big{font-size:3rem;font-weight:900;color:var(--primary)}
.res-msg{font-size:.95rem;margin:10px 0;line-height:1.7}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;text-align:left}
.rg{background:var(--bg);border-radius:8px;padding:10px 13px;font-size:.82rem}
.rg span{font-weight:800;font-size:1.1rem;display:block}
.res-btns{display:grid;gap:9px}
.btn-r{border:none;border-radius:var(--r);padding:12px;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s}
.btn-r.green{background:var(--primary);color:#fff}
.btn-r.green:hover{background:#0a3d0a}
.btn-r.red{background:#fff;color:var(--danger);border:2px solid var(--danger)}
.btn-r.red:hover{background:var(--danger-l)}
.btn-r.gray{background:var(--border);color:var(--sub)}
.btn-r.gray:hover{background:#b0bec5}

/* 間違い一覧 */
#wrong-list{text-align:left;margin-top:18px}
#wrong-list h3{font-size:.88rem;color:var(--danger);font-weight:800;margin-bottom:10px}
.wrong-item{background:var(--danger-l);border-left:3px solid var(--danger);
  border-radius:8px;padding:10px 13px;margin-bottom:8px;font-size:.82rem;line-height:1.65}
.wrong-item .wi-word{font-weight:800;color:var(--danger);margin-bottom:3px}
.wrong-item .wi-ans{color:var(--primary)}
</style>
</head>
<body>
<header>
  <h1>🔗 認知・学習心理学 用語マッチングクイズ</h1>
  <p>単元を選んで集中練習 ／ 混同しやすい用語を徹底比較</p>
</header>

<!-- 単元選択 -->
<div id="unit-screen">
  <h2>単元を選んでください</h2>
  <p>各単元で混同しやすい用語をしっかり確認しよう！</p>
  <div class="unit-grid" id="unit-grid"></div>
</div>

<!-- クイズ -->
<div id="quiz-screen">
  <div class="q-bar">
    <button class="btn-back" onclick="goHome()">← 単元選択に戻る</button>
    <span class="q-unit-name" id="q-unit-name"></span>
    <span class="q-prog" id="q-prog">1 / 10</span>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div class="word-card">
    <div class="word-label">📌 この用語の正しい説明はどれ？</div>
    <div class="word-main" id="word-main"></div>
    <div class="word-hint" id="word-hint"></div>
    <div id="confuse-badge"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback">
    <div class="fb-head" id="fb-head"></div>
    <div id="fb-body"></div>
    <div id="confuse-box"></div>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQ()">次の問題 →</button>
</div>

<!-- 結果 -->
<div id="result-screen">
  <div class="res-card">
    <div class="score-big" id="score-big">0/0</div>
    <div style="color:var(--sub);font-size:.85rem">正解数 / 全問題数</div>
    <div class="res-msg" id="res-msg"></div>
    <div class="res-grid">
      <div class="rg">正解 ✅<span id="rc">0</span>問</div>
      <div class="rg">不正解 ❌<span id="wc">0</span>問</div>
    </div>
  </div>
  <div class="res-btns">
    <button class="btn-r green" onclick="retryAll()">🔁 この単元をもう一度</button>
    <button class="btn-r red"  id="retry-weak-btn" onclick="retryWeak()">❌ 間違えた問題だけ</button>
    <button class="btn-r gray" onclick="goHome()">← 別の単元を選ぶ</button>
  </div>
  <div id="wrong-list"></div>
</div>

<script>
// ===================================================
// 単元データ
// ===================================================
const UNITS = [

// ① オペラント条件づけ
{id:"op", icon:"🎯", name:"オペラント条件づけ", tag:"最重要★★★",
 qs:[
  {w:"好子（こうし）",
   hint:"強化に使われる刺激のこと",
   confuse:"嫌子との違いに注意！",
   correct:"行動の直後に出現することで、その行動の頻度を【増やす】環境刺激。例：褒め言葉・おやつ・笑顔。",
   wrongs:[
     "行動の直後に消失することで、その行動の頻度を増やす環境刺激。例：電撃が止まる。",
     "行動の直後に出現することで、その行動の頻度を【減らす】環境刺激。例：叱責・電撃。",
     "行動の直前に提示されることで、行動を誘発する弁別刺激のこと。",
   ]},

  {w:"嫌子（けんし）",
   hint:"不快な刺激のこと",
   confuse:"好子との違いに注意！出現で弱化、消失で強化。",
   correct:"行動の直後に消失することで行動の頻度を増やすか、または出現することで行動の頻度を減らす環境刺激。例：電撃・叱責・痛み。",
   wrongs:[
     "行動の直後に出現することで行動の頻度を増やす環境刺激。例：褒め言葉・おやつ。",
     "行動の直前に提示されることで、特定の行動を誘発する先行刺激のこと。",
     "行動後に提示されることで、次回の行動を誘発するモデル刺激のこと。",
   ]},

  {w:"好子出現による強化（正の強化）",
   hint:"4随伴性のひとつ。行動が増える。",
   confuse:"「嫌子消失による強化（負の強化）」とどちらも行動が増えるので混同注意！",
   correct:"行動の直後に【好子が出現】することで、その行動の頻度が増加すること。例：座って食べたら褒められた→着席行動が増える。",
   wrongs:[
     "行動の直後に【嫌子が消失】することで、その行動の頻度が増加すること。例：薬を飲んだら頭痛が消えた→服薬行動が増える。",
     "行動の直後に【好子が消失】することで、その行動の頻度が減少すること。例：タイムアウト法。",
     "行動の直後に【嫌子が出現】することで、その行動の頻度が減少すること。例：叱責・体罰。",
   ]},

  {w:"嫌子消失による強化（負の強化）",
   hint:"行動が増える。「負」＝嫌子が消える。",
   confuse:"「正の強化」もどちらも行動が増える！「正負」は好子か嫌子か、ではなく出現(＋)か消失(-)かを指す。",
   correct:"行動の直後に【嫌子が消失】することで、その行動の頻度が増加すること。例：薬を飲んだら頭痛(嫌子)が消えた→服薬行動が増える。",
   wrongs:[
     "行動の直後に【好子が出現】することで、その行動の頻度が増加すること。例：褒められた→行動が増える。",
     "行動の直後に【好子が消失】することで、その行動の頻度が減少すること。例：タイムアウト法。",
     "行動の直後に【嫌子が出現】することで、その行動の頻度が減少すること。例：叱責・火傷。",
   ]},

  {w:"好子消失による弱化（負の罰）",
   hint:"タイムアウト法がこれ。行動が減る。",
   confuse:"「嫌子出現による弱化（正の罰）＝嫌悪療法」と混同しやすい！",
   correct:"行動の直後に【好子が消失（奪われる）】ことで、行動の頻度が減少すること。タイムアウト法（友人との関わりや試合出場を奪う）がこれ。",
   wrongs:[
     "行動の直後に【嫌子が出現】することで、行動の頻度が減少すること。嫌悪療法がこれ。例：飲酒後に不快感を生じさせる薬を飲む。",
     "行動の直後に【好子が出現】することで、行動の頻度が増加すること。正の強化がこれ。",
     "行動の直後に【嫌子が消失】することで、行動の頻度が増加すること。負の強化がこれ。",
   ]},

  {w:"嫌子出現による弱化（正の罰）",
   hint:"嫌悪療法がこれ。行動が減る。",
   confuse:"「好子消失による弱化（タイムアウト法）」と混同しやすい！",
   correct:"行動の直後に【嫌子が出現】することで、行動の頻度が減少すること。嫌悪療法（飲酒後に不快感を生じさせる）がこれ。",
   wrongs:[
     "行動の直後に【好子が消失（奪われる）】ことで、行動の頻度が減少すること。タイムアウト法がこれ。",
     "行動の直後に【嫌子が消失】することで、行動の頻度が増加すること。負の強化がこれ。",
     "行動の直後に【好子が出現】することで、行動の頻度が増加すること。正の強化がこれ。",
   ]},

  {w:"逃避学習",
   hint:"嫌子が来た「後」",
   confuse:"「回避学習（嫌子が来る前）」との時系列の違いが最重要ポイント！",
   correct:"嫌子が【呈示された後】に行動してその嫌子をなくすこと。嫌子消失による強化の一種。例：電撃を受けてから隣の部屋へ移動する。",
   wrongs:[
     "嫌子が【呈示される前】に行動して嫌子の出現を防ぐこと。例：警告音が鳴った段階で隣の部屋へ移動する。",
     "好子が消失した後に行動して好子を取り戻すこと。タイムアウト法が終わった後の行動がこれ。",
     "中性刺激と無条件刺激を対呈示することで形成される条件反応のこと。",
   ]},

  {w:"能動回避（回避学習）",
   hint:"嫌子が来る「前」に行動する",
   confuse:"「逃避学習（嫌子が来た後）」との違い。「逃げる」か「避ける」かで覚える！",
   correct:"嫌子が【呈示される前】に行動して嫌子の出現を防ぐこと。例：電撃の警告音が鳴った時点で（電撃が来る前に）隣の部屋へ移動する。",
   wrongs:[
     "嫌子が【呈示された後】に行動してその嫌子をなくすこと。例：電撃を受けてから隣の部屋へ移動する。",
     "好子が出現した後に同じ行動を繰り返すことで行動が増加すること。正の強化がこれ。",
     "条件刺激のみを繰り返し呈示することで条件反応を弱める手続きのこと。",
   ]},

  {w:"シェイピング（逐次的接近法）",
   hint:"目標行動へ段階的に近づける",
   confuse:"「部分強化（一部の反応のみ強化）」と混同しないこと。シェイピングは段階的な分化強化。",
   correct:"目標行動に近い反応に対してのみ【分化強化】を段階的に与え、最終的な目標行動の獲得を目指す手続き。例：靴下をはく動作を10ステップに分けて強化。",
   wrongs:[
     "何回かに1回だけ行動に好子を与えることで、消去抵抗を高める強化スケジュールのこと。",
     "条件刺激と無条件刺激を繰り返し対呈示することで、条件反応を形成する手続きのこと。",
     "問題行動と同時に生じ得ない拮抗行動の獲得を目指す技法のこと。ハビットリバーサル法がこれ。",
   ]},

  {w:"タイムアウト法",
   hint:"どの随伴性を使う？嫌悪療法と混同しない！",
   confuse:"嫌悪療法は「嫌子出現」、タイムアウト法は「好子消失」——この区別が頻出！",
   correct:"問題行動の後に、友人との関わりや試合出場などの【好子を一定時間奪う（好子消失）】ことで問題行動を弱化させる技法。",
   wrongs:[
     "問題行動の後に不快感を生じさせる薬などの【嫌子を出現させる】ことで問題行動を弱化させる技法。嫌悪療法がこれ。",
     "目標行動に近い反応を段階的に強化して、最終的な目標行動を獲得させる技法。シェイピングがこれ。",
     "条件刺激のみを繰り返し呈示して、条件反応を消去する手続き。曝露反応妨害法がこれ。",
   ]},
 ]
},

// ② 記憶・WM
{id:"mem", icon:"🧠", name:"記憶・WM", tag:"先生が明示★★",
 qs:[
  {w:"作動記憶（WM: Working Memory）",
   hint:"短期記憶との最大の違いは？",
   confuse:"「短期記憶（保持のみ）」と「WM（保持＋処理）」の違いがポイント！",
   correct:"情報の一時的な【保持】と同時に【情報処理】も行う二重の機能を持つ記憶システム。コンピュータのメモリに相当。",
   wrongs:[
     "情報を一時的に保持するだけの記憶。容量は7±2チャンク、約15秒で消失する。これは短期記憶のこと。",
     "体験した出来事を「いつ・どこで・何をした」という文脈とともに保持する長期記憶のこと。エピソード記憶がこれ。",
     "言葉の意味や一般的な事実・知識を保持する長期記憶のこと。意味記憶がこれ。",
   ]},

  {w:"短期貯蔵庫の容量と持続時間",
   hint:"7±2チャンク、何秒？",
   confuse:"「数分」ではなく「数十秒（約15秒）」——この数字が頻出の引っかけ！",
   correct:"容量は【7±2チャンク】。維持リハーサルなしでは【約15秒（数十秒）】で消失する。「数分」ではない。",
   wrongs:[
     "容量は7±2チャンク。維持リハーサルなしでは約1秒で消失する。これは感覚記憶の説明。",
     "容量は7±2チャンク。維持リハーサルなしでは数分で消失する。「数分」は誤り——「数十秒」が正しい。",
     "容量は制限なし。リハーサルをすることで半永久的に保持できる。これは長期貯蔵庫の説明。",
   ]},

  {w:"精緻化リハーサル",
   hint:"長期記憶化に有効な深い処理",
   confuse:"「維持リハーサル（繰り返し復唱するだけ）」との違いが重要！",
   correct:"新しい情報を既有の知識と【関連づけて意味を理解する】処理。深い処理になるため、長期記憶への定着が促進される。",
   wrongs:[
     "記憶したい情報をそのまま繰り返し声に出して復唱する処理。短期保持には有効だが長期記憶化には限界がある。これは維持リハーサル。",
     "記憶情報をグループや階層に分類・整理する体制化方略のこと。",
     "テストで解答を求めることで想起練習を繰り返し、記憶定着を促進する効果のこと。テスト効果がこれ。",

  {w:"診断的評価",
   hint:"学習の「前」に行う評価",
   confuse:"「形成的評価（学習中）」と混同しやすい！BDA（Before・During・After）が鉄則。",
   correct:"新しい学習に入る【前】に、必要な知識や技能が習得されているかを評価すること。",
   wrongs:[
     "授業中につまずきを発見した場合、授業プランを修正したりつまずきを支援すること。形成的評価がこれ。",
     "1つの単元や学期が終わった後に行う総合的なテストのこと。総括的評価がこれ。",
     "学習者が自分自身の理解度を◎〇△×などで自己報告する活動のこと。自己評価がこれ。",
   ]},

  {w:"アンダーマイニング効果（過剰正当化効果）",
   hint:"楽しかったことに報酬を与えると…内発的動機が下がる",
   confuse:"「物質的報酬が常に悪い」わけではない。もともと【内発的動機が高かった】ときに生じる！",
   correct:"もともと【内発的に動機づけられていた】活動（楽しいからやっていた）に物質的報酬を与えると、「報酬のためにやっている」と認知が変わり、内発的動機づけが低下する効果。",
   wrongs:[
     "外発的動機づけが低い状態の活動に報酬を与えることで、動機づけがさらに下がる効果のこと。これはアンダーマイニング効果の説明として誤り。",
     "集団で作業すると一人ひとりの努力量が減少する現象のこと。社会的手抜きがこれ。",
     "強い嫌子の提示によって恐怖反応が生じ、他の行動まで抑制されてしまう弱化の副作用のこと。",
   ]},
 ]
},

];

// ===================================================
// アプリ制御
// ===================================================
let currentUnit=null, questions=[], cur=0, score=0, wrongs=[];

function buildUnitGrid(){
  const g=document.getElementById('unit-grid');
  g.innerHTML='';
  UNITS.forEach(u=>{
    const b=document.createElement('button');
    b.className='unit-btn';
    b.innerHTML=`<span class="u-icon">${u.icon}</span>
      <span class="u-name">${u.name}</span>
      <span class="u-count">${u.qs.length}問</span>
      <span class="u-tag">${u.tag}</span>`;
    b.onclick=()=>startUnit(u);
    g.appendChild(b);
  });
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startUnit(unit, qs){
  currentUnit=unit;
  questions=shuffle(qs||unit.qs);
  cur=0;score=0;wrongs=[];
  show('quiz-screen');
  document.getElementById('q-unit-name').textContent=unit.name;
  showQ();
}

function showQ(){
  const q=questions[cur];
  document.getElementById('q-prog').textContent=`${cur+1} / ${questions.length}`;
  document.getElementById('prog-bar').style.width=((cur/questions.length)*100)+'%';
  document.getElementById('word-main').textContent=q.w;
  document.getElementById('word-hint').textContent=`💡 ${q.hint}`;

  const cb=document.getElementById('confuse-badge');
  cb.innerHTML=q.confuse?`<span class="confuse-badge">⚠️ 混同注意</span>`:'';

  // 選択肢シャッフル（正解位置をランダムに）
  const opts=shuffle([
    {text:q.correct,ok:true},
    ...q.wrongs.map(w=>({text:w,ok:false}))
  ]);

  const box=document.getElementById('choices');
  box.innerHTML='';
  const labels=['ア','イ','ウ','エ'];
  opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.innerHTML=`<span class="choice-mark">${labels[i]}</span><span>${o.text}</span>`;
    btn.onclick=()=>answer(o.ok,btn,opts);
    box.appendChild(btn);
  });

  document.getElementById('feedback').style.display='none';
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').style.display='none';
}

function answer(ok,clicked,opts){
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);

  // 色付け
  document.querySelectorAll('.choice').forEach((b,i)=>{
    if(opts[i].ok){
      b.classList.add('correct');
      b.querySelector('.choice-mark').textContent='✅';
    } else if(b===clicked&&!ok){
      b.classList.add('wrong');
      b.querySelector('.choice-mark').textContent='❌';
    } else {
      b.classList.add('dim');
    }
  });

  if(ok) score++;
  else wrongs.push({n:cur+1,q:questions[cur]});

  const fb=document.getElementById('feedback');
  const q=questions[cur];
  fb.className='feedback '+(ok?'ok':'ng');
  document.getElementById('fb-head').textContent=ok?'✅ 正解！':'❌ 不正解';
  document.getElementById('fb-body').textContent=ok
    ?'正しい定義を選べました！'
    :`正解は「${q.correct.slice(0,30)}…」でした。`;

  const cbox=document.getElementById('confuse-box');
  if(q.confuse){
    cbox.innerHTML=`<div class="confuse-box"><strong>⚠️ 混同ポイント：</strong>${q.confuse}</div>`;
  } else { cbox.innerHTML=''; }

  fb.style.display='block';
  const nb=document.getElementById('btn-next');
  nb.textContent=cur+1<questions.length?'次の問題 →':'結果を見る 📊';
  nb.style.display='block';
}

function nextQ(){
  cur++;
  if(cur<questions.length){showQ();window.scrollTo(0,0);}
  else showResult();
}

function showResult(){
  show('result-screen');
  document.getElementById('prog-bar').style.width='100%';
  const total=questions.length, pct=Math.round(score/total*100);
  document.getElementById('score-big').textContent=`${score}/${total}`;
  document.getElementById('rc').textContent=score;
  document.getElementById('wc').textContent=total-score;
  const msgs=[[90,'🎉 完璧！用語マスターです！'],[70,'👏 よくできました！混同ポイントを再確認！'],[0,'💪 解説をよく読んで再挑戦しよう！']];
  document.getElementById('res-msg').textContent=`正答率 ${pct}%　${msgs.find(m=>pct>=m[0])[1]}`;

  const wb=document.getElementById('retry-weak-btn');
  wb.style.display=wrongs.length>0?'block':'none';
  wb.textContent=`❌ 間違えた${wrongs.length}問だけ復習`;

  const wl=document.getElementById('wrong-list');
  if(wrongs.length>0){
    wl.innerHTML=`<h3>❌ 間違えた用語（${wrongs.length}問）</h3>`+
      wrongs.map(w=>`<div class="wrong-item">
        <div class="wi-word">${w.q.w}</div>
        <div class="wi-ans">✅ ${w.q.correct}</div>
        ${w.q.confuse?`<div style="font-size:.78rem;color:#e65100;margin-top:4px">⚠️ ${w.q.confuse}</div>`:''}
      </div>`).join('');
  } else {
    wl.innerHTML='<div class="wrong-item" style="background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;">🎊 全問正解！完璧です！</div>';
  }
}

function retryAll(){ startUnit(currentUnit); }
function retryWeak(){ if(wrongs.length>0) startUnit(currentUnit,wrongs.map(w=>w.q)); }
function goHome(){ show('unit-screen'); }

function show(id){
  ['unit-screen','quiz-screen','result-screen'].forEach(s=>{
    document.getElementById(s).style.display=s===id?'block':'none';
  });
}

buildUnitGrid();
</script>
