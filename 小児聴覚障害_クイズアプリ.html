<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小児聴覚障害 国試対策クイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #2b6cb0, #2c7a7b);
    color: white;
    padding: 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  header h1 {
    font-size: 1.4em;
    letter-spacing: 0.05em;
  }

  header p {
    font-size: 0.85em;
    opacity: 0.85;
    margin-top: 4px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* スタート画面 */
  #start-screen {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    margin-top: 24px;
  }

  #start-screen h2 {
    font-size: 1.3em;
    color: #2b6cb0;
    margin-bottom: 12px;
  }

  #start-screen p {
    color: #718096;
    font-size: 0.9em;
    margin-bottom: 28px;
    line-height: 1.7;
  }

  .version-select {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .version-btn {
    flex: 1;
    min-width: 140px;
    max-width: 200px;
    padding: 20px 16px;
    border-radius: 12px;
    border: 3px solid #e2e8f0;
    background: white;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.95em;
    font-weight: bold;
    color: #4a5568;
  }

  .version-btn:hover {
    border-color: #2b6cb0;
    color: #2b6cb0;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(43,108,176,0.15);
  }

  .version-btn.selected {
    border-color: #2b6cb0;
    background: #ebf8ff;
    color: #2b6cb0;
  }

  .version-btn .badge {
    display: inline-block;
    font-size: 0.75em;
    background: #e2e8f0;
    color: #718096;
    border-radius: 20px;
    padding: 2px 10px;
    margin-top: 6px;
    font-weight: normal;
  }

  .version-btn.selected .badge {
    background: #bee3f8;
    color: #2b6cb0;
  }

  .start-btn {
    background: linear-gradient(135deg, #2b6cb0, #2c7a7b);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 40px;
    font-size: 1.05em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(43,108,176,0.3);
  }

  .start-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* 進捗バー */
  .progress-bar-wrap {
    background: white;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar {
    flex: 1;
    height: 8px;
    background: #e2e8f0;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2b6cb0, #2c7a7b);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 0.85em;
    color: #718096;
    white-space: nowrap;
  }

  .score-badge {
    background: #ebf8ff;
    color: #2b6cb0;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.85em;
    font-weight: bold;
    white-space: nowrap;
  }

  /* 問題カード */
  .quiz-card {
    background: white;
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  .quiz-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .q-num {
    background: linear-gradient(135deg, #2b6cb0, #2c7a7b);
    color: white;
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 0.85em;
    font-weight: bold;
  }

  .q-topic {
    color: #718096;
    font-size: 0.85em;
  }

  .q-version {
    margin-left: auto;
    font-size: 0.75em;
    color: #a0aec0;
    background: #f7fafc;
    border-radius: 20px;
    padding: 2px 10px;
  }

  .question-text {
    font-size: 1.0em;
    font-weight: bold;
    color: #2d3748;
    margin-bottom: 18px;
    line-height: 1.6;
    padding-bottom: 14px;
    border-bottom: 2px solid #e2e8f0;
  }

  .question-direction {
    display: inline-block;
    background: #fed7d7;
    color: #c53030;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.82em;
    margin-bottom: 8px;
    font-weight: bold;
  }

  .question-direction.correct {
    background: #c6f6d5;
    color: #276749;
  }

  /* 選択肢 */
  .choices {
    list-style: none;
    margin-bottom: 18px;
  }

  .choices li {
    background: #f7fafc;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.92em;
    line-height: 1.5;
  }

  .choices li:hover:not(.disabled) {
    border-color: #2b6cb0;
    background: #ebf8ff;
  }

  .choices li.selected {
    border-color: #2b6cb0;
    background: #ebf8ff;
    font-weight: bold;
  }

  .choices li.disabled {
    cursor: not-allowed;
  }

  /* 答え合わせ表示 */
  .answer-section {
    margin-top: 4px;
  }

  .answer-label {
    font-size: 0.85em;
    color: #718096;
    margin-bottom: 8px;
  }

  .items-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 0.88em;
  }

  .items-table th {
    background: #f7fafc;
    padding: 8px 12px;
    text-align: left;
    font-weight: bold;
    color: #4a5568;
    border-bottom: 2px solid #e2e8f0;
  }

  .items-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #e2e8f0;
    vertical-align: top;
    line-height: 1.5;
  }

  .items-table tr:last-child td {
    border-bottom: none;
  }

  .mark-correct { color: #276749; font-weight: bold; }
  .mark-wrong { color: #c53030; font-weight: bold; }

  .result-banner {
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 14px;
    font-weight: bold;
    font-size: 0.95em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-banner.correct {
    background: #c6f6d5;
    color: #276749;
    border-left: 4px solid #276749;
  }

  .result-banner.wrong {
    background: #fed7d7;
    color: #c53030;
    border-left: 4px solid #c53030;
  }

  .explanation {
    background: #fffaf0;
    border-left: 4px solid #ed8936;
    border-radius: 0 10px 10px 0;
    padding: 12px 16px;
    font-size: 0.88em;
    line-height: 1.7;
    color: #4a5568;
    margin-bottom: 16px;
  }

  .explanation strong {
    color: #c05621;
  }

  /* ボタン */
  .btn-next {
    width: 100%;
    background: linear-gradient(135deg, #2b6cb0, #2c7a7b);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1.0em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-next:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(43,108,176,0.3);
  }

  /* 答え確認ボタン */
  .btn-check {
    width: 100%;
    background: #ed8936;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1.0em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .btn-check:hover {
    background: #dd6b20;
    transform: translateY(-1px);
  }

  /* 選択肢グループ */
  .choice-group {
    margin-bottom: 16px;
  }

  .choice-group-label {
    font-size: 0.82em;
    color: #718096;
    margin-bottom: 8px;
  }

  .choice-group-items {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .choice-chip {
    background: #f7fafc;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.9em;
    transition: all 0.15s;
    font-weight: bold;
  }

  .choice-chip:hover:not(.disabled) {
    border-color: #2b6cb0;
    background: #ebf8ff;
  }

  .choice-chip.selected {
    border-color: #2b6cb0;
    background: #ebf8ff;
    color: #2b6cb0;
  }

  .choice-chip.disabled {
    cursor: not-allowed;
  }

  /* 結果画面 */
  #result-screen {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    margin-top: 24px;
  }

  .result-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2b6cb0, #2c7a7b);
    margin: 0 auto 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .result-circle .score-num {
    font-size: 2.2em;
    font-weight: bold;
    line-height: 1;
  }

  .result-circle .score-denom {
    font-size: 0.85em;
    opacity: 0.85;
  }

  .result-message {
    font-size: 1.2em;
    font-weight: bold;
    color: #2b6cb0;
    margin-bottom: 8px;
  }

  .result-sub {
    color: #718096;
    font-size: 0.9em;
    margin-bottom: 28px;
  }

  .wrong-list {
    text-align: left;
    margin-bottom: 24px;
  }

  .wrong-list h3 {
    font-size: 0.95em;
    color: #c53030;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #fed7d7;
  }

  .wrong-item {
    background: #fff5f5;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 0.88em;
    color: #4a5568;
    line-height: 1.5;
  }

  .wrong-item strong {
    color: #c53030;
  }

  .btn-retry {
    background: linear-gradient(135deg, #2b6cb0, #2c7a7b);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-size: 1.0em;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    margin: 6px;
  }

  .btn-retry:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(43,108,176,0.3);
  }

  .hidden { display: none; }

  /* キーワードタグ */
  .keyword-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .keyword-tag {
    background: #ebf8ff;
    color: #2b6cb0;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.78em;
    font-weight: bold;
  }
</style>
</head>
<body>

<header>
  <h1>🦻 小児聴覚障害 国試対策クイズ</h1>
  <p>1 SLHT｜2026年度 小テスト・過去問 統合版</p>
</header>

<div class="container">

  <!-- スタート画面 -->
  <div id="start-screen">
    <h2>バージョンを選んでください</h2>
    <p>旧バージョン（昨年の過去問）または<br>新バージョン（2026年度 小テスト）を選んで<br>問1〜問20に挑戦しましょう！</p>

    <div class="version-select">
      <div class="version-btn" id="btn-old" onclick="selectVersion('old')">
        📋 旧バージョン
        <br><span class="badge">昨年の過去問</span>
      </div>
      <div class="version-btn" id="btn-new" onclick="selectVersion('new')">
        📝 新バージョン
        <br><span class="badge">2026年度 小テスト</span>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>
      クイズをスタート →
    </button>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz-screen" class="hidden">
    <div class="progress-bar-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text">1 / 20</div>
      <div class="score-badge" id="score-badge">0 正解</div>
    </div>

    <div class="quiz-card">
      <div class="quiz-meta">
        <span class="q-num" id="q-num">問1</span>
        <span class="q-topic" id="q-topic"></span>
        <span class="q-version" id="q-version"></span>
      </div>

      <div class="question-text">
        <div id="q-direction"></div>
        <div id="q-text"></div>
      </div>

      <!-- 選択肢（個別） -->
      <ul class="choices" id="choices-list"></ul>

      <!-- 選択肢グループ（a〜e） -->
      <div class="choice-group">
        <div class="choice-group-label">▼ 答えを選んでください</div>
        <div class="choice-group-items" id="choice-chips"></div>
      </div>

      <!-- 確認ボタン -->
      <button class="btn-check" id="btn-check" onclick="checkAnswer()">答えを確認する</button>

      <!-- 結果表示 -->
      <div id="answer-section" class="answer-section hidden">
        <div class="result-banner" id="result-banner"></div>

        <div class="answer-label">📊 各選択肢の解説</div>
        <table class="items-table" id="items-table"></table>

        <div class="explanation" id="explanation"></div>

        <div class="keyword-tags" id="keyword-tags"></div>

        <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
      </div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" class="hidden">
    <div class="result-circle">
      <div class="score-num" id="final-score">0</div>
      <div class="score-denom" id="final-denom">/ 20問</div>
    </div>
    <div class="result-message" id="result-message"></div>
    <div class="result-sub" id="result-sub"></div>

    <div class="wrong-list" id="wrong-list"></div>

    <button class="btn-retry" onclick="retryQuiz()">🔄 もう一度挑戦</button>
    <button class="btn-retry" onclick="switchVersion()">📋 バージョンを変える</button>
  </div>

</div>

<script>
// ===== 問題データ =====
const questions = [
  {
    num: 1, topic: '選別検査',
    old: {
      direction: '正しいのはどれか',
      type: 'correct',
      items: [
        'BOA（聴性行動反応聴力検査）の刺激音は90dB・3000Hz・バンドノイズ',
        '学校保健は1kHz 30dB・4kHz 25dB',
        '難聴のリスク因子を有する児には必要と思われる場合のみ行う',
        '新生児では中等度未満の難聴は選別が容易である',
        '言語聴覚士の診療補助行為から除外される'
      ],
      correct_marks: [true, true, false, false, true],
      choices: ['a.(1)(2)(3)', 'b.(1)(2)(5)', 'c.(2)(3)(4)', 'd.(2)(4)(5)', 'e.(3)(4)(5)'],
      answer: 'b',
      explanation: '(3)誤：リスク児のみならず全新生児への実施が推奨される（任意だが重要）。(4)誤：新生児では中等度未満の難聴は選別が困難。',
      keywords: ['BOA＝90dB・3000Hz・バンドノイズ/ワーブルトーン', '学校保健1kHz30dB・4kHz25dB', 'NHS＝任意（法制化されていない）']
    },
    new: {
      direction: '間違っているのはどれか',
      type: 'wrong',
      items: [
        '新生児では中等度未満の難聴は選別が困難である',
        '言語聴覚士の診療補助行為である',
        '難聴のリスク因子を有する児には重点的に行う',
        'BOA（聴性行動反応聴力検査）では90dB、1000Hzの純音を用いる',
        '学校保健は1kHz 30dBと4kHz 40dBである'
      ],
      correct_marks: [true, false, true, false, false],
      choices: ['a.(1)(2)(3)', 'b.(1)(3)(4)', 'c.(2)(3)(4)', 'd.(2)(4)(5)', 'e.(3)(4)(5)'],
      answer: 'd',
      explanation: '(2)誤：STが主体的に実施できる（診療補助行為ではない）。(4)誤：BOAは3000Hz・バンドノイズ（1000Hzの純音は誤り）。(5)誤：4kHzは25dB（40dBではない）。',
      keywords: ['BOA＝3000Hz・バンドノイズ', '4kHz25dB', 'STは主体的に実施できる']
    }
  },
  {
    num: 2, topic: 'ティンパノメトリー',
    old: {
      direction: '正しいのはどれか',
      type: 'correct',
      items: [
        '中耳内の圧を変化させて測定する',
        '耳小骨離断症はティンパノグラムAD型である',
        '中耳腔が陰圧状態では、ティンパノグラムC型が出現する',
        '耳硬化症はティンパノグラムAs型である',
        '鼓膜穿孔がある場合は、測定可能である'
      ],
      correct_marks: [false, true, true, true, false],
      choices: ['a.すべて', 'b.(1)(2)(3)', 'c.(2)(3)(4)', 'd.(3)(4)(5)', 'e.なし'],
      answer: 'c',
      explanation: '(1)誤：外耳道内の圧を変化させて測定する（中耳内ではない）。(5)誤：鼓膜穿孔があると密閉できず測定不能。',
      keywords: ['外耳道内の圧を変化', 'As型＝耳硬化症', 'AD型＝耳小骨離断症', 'C型＝陰圧', 'B型＝液体貯留']
    },
    new: {
      direction: '間違っているのはどれか',
      type: 'wrong',
      items: [
        '鼓膜穿孔がある場合は、測定不可能である',
        '外耳道内の圧を変化させて測定する',
        '中耳腔が陰圧状態では、ティンパノグラムB型が出現する',
        '耳硬化症はティンパノグラムAD型である',
        '耳小骨離断症はティンパノグラムAs型である'
      ],
      correct_marks: [true, true, false, false, false],
      choices: ['a.すべて', 'b.(1)(2)(3)', 'c.(2)(3)(4)', 'd.(3)(4)(5)', 'e.なし'],
      answer: 'd',
      explanation: '(3)誤：陰圧ではC型（B型は液体貯留）。(4)誤：耳硬化症はAs型（AD型は耳小骨離断症）。(5)誤：耳小骨離断症はAD型（As型は耳硬化症）。',
      keywords: ['C型→B型（滲出性中耳炎の進行）', 'As型＝耳硬化症', 'AD型＝耳小骨離断症']
    }
  },
  {
    num: 3, topic: '新生児聴覚スクリーニング（NHS）',
    old: {
      direction: '間違っているのはどれか（NHSに使用しない検査）',
      type: 'wrong',
      items: [
        '耳音響放射（OAE: Otoacoustic Emissions）',
        'ティンパノメトリー',
        '自動聴性脳幹反応（AABR: Automated Auditory Brainstem Response）',
        '標準純音聴力検査',
        '内耳機能検査'
      ],
      correct_marks: [true, false, true, false, false],
      choices: ['a.(1)(2)(3)', 'b.(1)(2)(5)', 'c.(2)(3)(4)', 'd.(2)(4)(5)', 'e.(3)(4)(5)'],
      answer: 'd',
      explanation: 'NHSで使用するのはOAEとAABRのみ。(2)ティンパノメトリー・(4)標準純音聴力検査・(5)内耳機能検査はNHSには使用しない。',
      keywords: ['NHSはOAEとAABRのみ', 'ティンパノメトリーはNHSに使わない', '標準純音聴力検査は新生児に不可']
    },
    new: {
      direction: '正しいのはどれか（NHS後の精密検査）',

// ===== 状態管理 =====
let selectedVersion = null;
let currentIndex = 0;
let score = 0;
let selectedAnswer = null;
let answered = false;
let wrongQuestions = [];

function selectVersion(v) {
  selectedVersion = v;
  document.getElementById('btn-old').classList.toggle('selected', v === 'old');
  document.getElementById('btn-new').classList.toggle('selected', v === 'new');
  document.getElementById('start-btn').disabled = false;
}

function startQuiz() {
  currentIndex = 0;
  score = 0;
  wrongQuestions = [];
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  answered = false;
  selectedAnswer = null;

  const q = questions[currentIndex];
  const data = selectedVersion === 'old' ? q.old : q.new;

  // 進捗
  const pct = (currentIndex / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / ' + questions.length;
  document.getElementById('score-badge').textContent = score + ' 正解';

  // 問題
  document.getElementById('q-num').textContent = '問' + q.num;
  document.getElementById('q-topic').textContent = q.topic;
  document.getElementById('q-version').textContent = selectedVersion === 'old' ? '旧バージョン' : '新バージョン';

  const dirEl = document.getElementById('q-direction');
  dirEl.textContent = data.direction;
  dirEl.className = 'question-direction ' + (data.type === 'wrong' ? '' : 'correct');

  document.getElementById('q-text').textContent = '';

  // 個別選択肢
  const list = document.getElementById('choices-list');
  list.innerHTML = '';
  data.items.forEach((item, i) => {
    const li = document.createElement('li');
    li.textContent = '(' + (i+1) + ') ' + item;
    list.appendChild(li);
  });

  // 選択肢チップ
  const chips = document.getElementById('choice-chips');
  chips.innerHTML = '';
  data.choices.forEach(ch => {
    const btn = document.createElement('div');
    btn.className = 'choice-chip';
    btn.textContent = ch;
    btn.onclick = () => selectChip(btn, ch);
    chips.appendChild(btn);
  });

  document.getElementById('btn-check').classList.remove('hidden');
  document.getElementById('answer-section').classList.add('hidden');
}

function selectChip(el, val) {
  if (answered) return;
  document.querySelectorAll('.choice-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedAnswer = val.charAt(0); // a, b, c, d, e
}

function checkAnswer() {
  if (!selectedAnswer) {
    alert('答えを選んでください！');
    return;
  }
  answered = true;

  const q = questions[currentIndex];
  const data = selectedVersion === 'old' ? q.old : q.new;
  const isCorrect = selectedAnswer === data.answer;

  if (isCorrect) {
    score++;
  } else {
    wrongQuestions.push({ num: q.num, topic: q.topic, yourAnswer: selectedAnswer, correct: data.answer });
  }

  // スコア更新
  document.getElementById('score-badge').textContent = score + ' 正解';

  // チップ無効化
  document.querySelectorAll('.choice-chip').forEach(c => c.classList.add('disabled'));

  // 結果バナー
  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner ' + (isCorrect ? 'correct' : 'wrong');
  banner.textContent = isCorrect ? '✅ 正解！' : '❌ 不正解…　正答：' + data.answer.toUpperCase() + '　' + data.choices.find(c => c.startsWith(data.answer));

  // 各選択肢解説表
  const table = document.getElementById('items-table');
  table.innerHTML = '<tr><th>選択肢</th><th>正誤</th><th>内容</th></tr>';
  data.items.forEach((item, i) => {
    const tr = document.createElement('tr');
    const isOk = data.correct_marks[i];
    tr.innerHTML = `
      <td style="white-space:nowrap">（${i+1}）</td>
      <td class="${isOk ? 'mark-correct' : 'mark-wrong'}">${isOk ? '○' : '×'}</td>
      <td>${item}</td>
    `;
    table.appendChild(tr);
  });

  // 解説
  document.getElementById('explanation').innerHTML = '💡 ' + data.explanation;

  // キーワード
  const kw = document.getElementById('keyword-tags');
  kw.innerHTML = '<div style="font-size:0.8em;color:#718096;margin-bottom:4px;width:100%">★ キーワード</div>';
  data.keywords.forEach(k => {
    const tag = document.createElement('span');
    tag.className = 'keyword-tag';
    tag.textContent = k;
    kw.appendChild(tag);
  });

  document.getElementById('btn-check').classList.add('hidden');
  document.getElementById('answer-section').classList.remove('hidden');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');

  document.getElementById('final-score').textContent = score;
  document.getElementById('final-denom').textContent = '/ ' + questions.length + '問';

  const pct = Math.round(score / questions.length * 100);
  let msg = '', sub = '';
  if (pct === 100) { msg = '🎉 満点！パーフェクト！'; sub = '国試も絶対合格できます！'; }
  else if (pct >= 80) { msg = '👏 すばらしい！'; sub = '自信を持って本番に臨みましょう！'; }
  else if (pct >= 60) { msg = '💪 もう一息！'; sub = '間違えた問題を復習してみましょう！'; }
  else { msg = '📚 もう一度チャレンジ！'; sub = '繰り返し解くことで必ず定着します！'; }

  document.getElementById('result-message').textContent = msg;
  document.getElementById('result-sub').textContent = sub;

  const wrongList = document.getElementById('wrong-list');
  if (wrongQuestions.length > 0) {
    wrongList.innerHTML = '<h3>❌ 間違えた問題（' + wrongQuestions.length + '問）</h3>';
    wrongQuestions.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<strong>問${w.num}</strong>　${w.topic}<br>あなたの答え：${w.yourAnswer.toUpperCase()}　→　正解：${w.correct.toUpperCase()}`;
      wrongList.appendChild(div);
    });
  } else {
    wrongList.innerHTML = '';
  }
}

function retryQuiz() {
  startQuiz();
}

function switchVersion() {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('btn-old').classList.remove('selected');
  document.getElementById('btn-new').classList.remove('selected');
  document.getElementById('start-btn').disabled = true;
  selectedVersion = null;
}
</script>
</body>
</html>
